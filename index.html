<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabCard v10.0 - Dungeon Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #636e72; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; color: var(--text); }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(9,132,227,0.2); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: transparent; }

        /* 字庫列表 */
        .word-list-item { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .word-info { flex: 1; }
        .word-eng { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .word-chi { font-size: 0.9rem; color: var(--gray); margin-left: 8px; }

        /* 地下城戰鬥動畫 */
        .monster-box { text-align: center; margin: 10px 0; min-height: 150px; display: flex; align-items: center; justify-content: center; }
        .monster-img { 
            width: 120px; height: auto; 
            image-rendering: pixelated; 
            transition: transform 0.2s;
        }
        .boss-img { width: 180px; }

        /* 答對晃動消失動畫 */
        @keyframes hit-shake {
            0% { transform: translateX(0) scale(1); }
            20% { transform: translateX(-10px) scale(1.1); filter: brightness(2); }
            40% { transform: translateX(10px) scale(1.1); }
            100% { transform: scale(0); opacity: 0; }
        }
        .anim-hit { animation: hit-shake 0.5s forwards; }

        /* 答錯閃紅動畫 */
        @keyframes hurt-red {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5) sepia(1) saturate(10) hue-rotate(-50deg); transform: translateY(5px); }
            100% { filter: brightness(1); }
        }
        .anim-hurt { animation: hurt-red 0.4s; }

        /* 卡片區域 */
        .card { background: #fff; border-radius: 24px; padding: 25px; margin: 10px 0; min-height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; position: relative; cursor: pointer; border: 1px solid #eee; }
        .timer-line { position: absolute; top: 0; left: 0; height: 5px; background: var(--danger); transition: width 0.1s linear; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        
        input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>
