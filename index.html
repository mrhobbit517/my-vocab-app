<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v11.5 - Enhanced Combat</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #636e72; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; z-index: 1; }
        
        .global-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://i.imgur.com/SwmBCNA.jpeg"); background-size: cover; background-position: center; z-index: 0; }
        .dungeon-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://i.imgur.com/6FeeRyP.jpeg"); background-size: cover; background-position: center; z-index: 0; }

        .splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .splash-img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
        .enter-btn-container { position: absolute; bottom: 15%; width: 100%; display: flex; justify-content: center; }
        .btn-rpg { background: #2d3436; color: #fff; border: 4px solid #fff; padding: 12px 40px; font-size: 1.5rem; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 0 4px #2d3436; transition: 0.1s; }

        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.96); background: #f0f0f0; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: rgba(255,255,255,0.8); }
        
        .battle-scene { position: relative; width: 100%; height: 240px; margin: 10px 0; background: rgba(255, 255, 255, 0.5); border-radius: 15px; }
        .monster-box { position: absolute; top: 10px; right: 40px; text-align: center; }
        .monster-img { width: 90px; height: auto; image-rendering: pixelated; }
        .player-box { position: absolute; bottom: -10px; left: -20px; }
        .player-img { width: 270px; height: auto; }
        
        /* 受傷閃動動畫 - 使用 gsR29ty.png */
        @keyframes hurt-blink {
            0% { opacity: 1; }
            25% { opacity: 0; }
            50% { opacity: 1; }
            75% { opacity: 0; }
            100% { opacity: 1; }
        }
        .hurt-overlay {
            position: absolute; inset: 0; width: 100%; height: 100%;
            background: url("https://i.imgur.com/gsR29ty.png") no-repeat center;
            background-size: contain; pointer-events: none; opacity: 0;
            z-index: 10;
        }
        .anim-hurt-flash { animation: hurt-blink 0.4s steps(2, start); opacity: 1 !important; }
        
        @keyframes hit-shake { 0% { transform: translateX(0); } 50% { transform: translateX(20px); filter: brightness(2); } 100% { transform: translateX(0); } }
        .anim-hit { animation: hit-shake 0.3s; }

        .timer-line { position: absolute; top: 0; left: 0; height: 6px; background: var(--danger); transition: width 0.1s linear; border-radius: 15px 15px 0 0; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input { width: 100%; padding: 14px; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 5px; box-sizing: border-box; font-size: 1.2rem; text-align: center; }
        .hint-text { color: var(--danger); font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const monsterImages = ["https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png", "https://i.imgur.com/ToQhBZL.png", "https://i.imgur.com/72Hr4rn.png", "https://i.imgur.com/3jsF7It.png", "https://i.imgur.com/4TfXx0t.png", "https://i.imgur.com/bI7Y6tX.png"];
        const bossImages = ["https://i.imgur.com/LNZ46Uc.png", "https://i.imgur.com/ArFodUT.png"];
        const playerImg = "https://i.imgur.com/PBcBCFv.png";
        const splashImg = "https://i.imgur.com/8MUpGMJ.jpeg";

        // 音效網址
        const SFX = {
            attack: "https://actions.google.com/sounds/v1/foley/sword_clank.ogg",
            hurt: "https://actions.google.com/sounds/v1/impacts/foley_impact_wood_on_wood.ogg"
        };

        const initialWords = [
            {eng:"apple", chi:"蘋果"}, {eng:"book", chi:"書"}, {eng:"cat", chi:"貓"}, {eng:"dog", chi:"狗"},
            {eng:"egg", chi:"蛋"}, {eng:"fish", chi:"魚"}, {eng:"girl", chi:"女孩"}, {eng:"house", chi:"房子"},
            {eng:"ice", chi:"冰"}, {eng:"jump", chi:"跳"}, {eng:"kite", chi:"風箏"}, {eng:"lion", chi:"獅子"},
            {eng:"moon", chi:"月亮"}, {eng:"nest", chi:"鳥巢"}, {eng:"orange", chi:"橙子"}, {eng:"pen", chi:"筆"},
            {eng:"queen", chi:"女王"}, {eng:"river", chi:"河流"}, {eng:"sun", chi:"太陽"}, {eng:"tree", chi:"樹"}
        ].map((w, i) => ({ ...w, id: Date.now() + i }));

        const App = () => {
            const [view, setView] = useState('splash');
            const [wordBank, setWordBank] = useState(initialWords);
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(10);
            const [mode, setMode] = useState('low');
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [userInput, setUserInput] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const [monsterAnim, setMonsterAnim] = useState("");
            const [hurtAnim, setHurtAnim] = useState("");
            const [mImg, setMImg] = useState(monsterImages[0]);
            const [wrongCount, setWrongCount] = useState(0); // 記錄連續答錯次數
            const timerRef = useRef(null);

            const playSound = (url) => {
                const audio = new Audio(url);
                audio.volume = 0.6;
                audio.play().catch(e => console.log("Audio play blocked"));
            };

            const getNewQuestion = (isBoss) => {
                const word = wordBank[Math.floor(Math.random() * wordBank.length)];
                setCurrentWord(word);
                setUserInput("");
                setWrongCount(0); // 換題重置錯題數
                if (!isBoss) {
                    const others = wordBank.filter(w => w.eng !== word.eng);
                    const picks = [];
                    while(picks.length < 3) {
                        const r = others[Math.floor(Math.random() * others.length)].eng;
                        if(!picks.includes(r)) picks.push(r);
                    }
                    setOptions([word.eng, ...picks].sort(() => Math.random() - 0.5));
                }
            };

            const checkIsBoss = (f, m) => {
                if (m === 'mid') return f === 7 || f === 15;
                if (m === 'high') return [5, 10, 15, 20].includes(f);
                return false;
            };

            const startDungeon = (diff) => {
                const targetFloor = diff === 'low' ? 10 : diff === 'mid' ? 15 : 20;
                setMode(diff); setMaxFloor(targetFloor); setFloor(1); setHp(10);
                const isB = checkIsBoss(1, diff);
                setMImg(isB ? bossImages[0] : monsterImages[0]);
                getNewQuestion(isB);
                setView('dungeon');
                resetTimer(isB ? 7 : 5);
            };

            const resetTimer = (seconds) => {
                clearInterval(timerRef.current);
                setTimeLeft(100);
                const step = 100 / (seconds * 10);
                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) {
                            handleAnswer(false);
                            return 100;
                        }
                        return prev - step;
                    });
                }, 100);
            };

            const handleAnswer = (isCorrect) => {
                if (isCorrect) {
                    // 正確反饋：聲音 + 震動 + 動畫
                    playSound(SFX.attack);
                    if (window.navigator.vibrate) window.navigator.vibrate(50);
                    setMonsterAnim("anim-hit");
                    clearInterval(timerRef.current);
                    
                    setTimeout(() => {
                        setMonsterAnim("");
                        if (floor >= maxFloor) {
                            setView('win');
                        } else {
                            const nextFloor = floor + 1;
                            setFloor(nextFloor);
                            const isB = checkIsBoss(nextFloor, mode);
                            setMImg(isB ? bossImages[Math.floor(Math.random()*bossImages.length)] : monsterImages[Math.floor(Math.random()*monsterImages.length)]);
                            getNewQuestion(isB);
                            resetTimer(isB ? 7 : 5);
                        }
                    }, 400);
                } else {
                    // 錯誤反饋：受傷聲音 + 閃動
                    playSound(SFX.hurt);
                    setWrongCount(prev => prev + 1);
                    setHp(prev => {
                        if (prev <= 1) { setView('lose'); return 0; }
                        return prev - 1;
                    });
                    setHurtAnim("anim-hurt-flash");
                    setTimeout(() => setHurtAnim(""), 400);
                    resetTimer(checkIsBoss(floor, mode) ? 7 : 5); // 停留原地，計時器重置
                }
            };

            if (view === 'splash') return (
                <div className="splash-screen">
                    <img src={splashImg} className="splash-img" alt="splash" />
                    <div className="enter-btn-container">
                        <button className="btn-rpg" onClick={() => setView('home')}>ENTER DUNGEON</button>
                    </div>
                </div>
            );

            return (
                <div style={{minHeight: '100vh'}}>
                    {view === 'dungeon' ? <div className="dungeon-bg"></div> : <div className="global-bg"></div>}
                    <div className="container">
                        {view === 'home' && (
                            <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center'}}>
                                <h1 style={{textAlign:'center', color:'white', textShadow:'2px 2px #000', fontSize:'2.5rem'}}>VOCAB DUNGEON</h1>
                                <button className="btn btn-primary" onClick={()=>startDungeon('low')}>初級: 10關 (全選擇題)</button>
                                <button className="btn btn-primary" onClick={()=>startDungeon('mid')}>中級: 15關 (有BOSS關)</button>
                                <button className="btn btn-primary" onClick={()=>startDungeon('high')}>高級: 20關 (強敵出沒)</button>
                                <div style={{textAlign:'center', color:'#ccc', marginTop:'10px'}}>答錯將停在原地直到擊敗敵人</div>
                            </div>
                        )}

                        {view === 'dungeon' && (
                            <div>
                                <div style={{background: '#2d3436', color: 'white', padding: '12px', borderRadius: '15px', display:'flex', justifyContent:'space-between', marginBottom: '15px', border:'2px solid #fff'}}>
                                    <span>{"❤️".repeat(hp)}</span>
                                    <span>B{floor}/{maxFloor}</span>
                                </div>

                                <div className="battle-scene">
                                    <div className="timer-line" style={{width: timeLeft + '%'}}></div>
                                    <div className="monster-box">
                                        <img src={mImg} className={`monster-img ${monsterAnim}`} />
                                    </div>
                                    <div className="player-box">
                                        <img src={playerImg} className="player-img" />
                                        <div className={`hurt-overlay ${hurtAnim}`}></div>
                                    </div>
                                </div>

                                <div style={{background:'rgba(255,255,255,0.95)', padding:'20px', borderRadius:'15px', textAlign:'center', marginBottom:'10px', boxShadow:'0 4px 0 #ccc'}}>
                                    <div style={{fontSize:'1.8rem', fontWeight:'bold', color:'#333'}}>{currentWord?.chi}</div>
                                </div>

                                {checkIsBoss(floor, mode) ? (
                                    <div style={{textAlign:'center'}}>
                                        <input 
                                            placeholder="拼寫英文..." 
                                            value={userInput} 
                                            onChange={e => setUserInput(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && handleAnswer(userInput.toLowerCase().trim() === currentWord.eng.toLowerCase())}
                                            autoFocus
                                        />
                                        {wrongCount >= 3 && <div className="hint-text">💡 提示：以 "{currentWord.eng.charAt(0).toUpperCase()}" 開頭</div>}
                                        <button className="btn btn-primary" onClick={() => handleAnswer(userInput.toLowerCase().trim() === currentWord.eng.toLowerCase())}>⚡ 釋放技能擊退 BOSS</button>
                                    </div>
                                ) : (
                                    <div className="quiz-grid">
                                        {options.map(o => (
                                            <button key={o} className="btn btn-outline" onClick={() => handleAnswer(o === currentWord.eng)}>{o}</button>
                                        ))}
                                    </div>
                                )}
                                
                                <button className="btn" style={{marginTop:'20px', opacity:0.8}} onClick={()=>{clearInterval(timerRef.current); setView('home')}}>🏳️ 逃離地牢</button>
                            </div>
                        )}

                        {(view === 'win' || view === 'lose') && (
                            <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center', textAlign:'center', color:'white', textShadow:'2px 2px #000'}}>
                                <h1 style={{fontSize:'4rem', margin:0}}>{view === 'win' ? "🏆" : "💀"}</h1>
                                <h2>{view === 'win' ? "挑戰成功！" : "你倒下了..."}</h2>
                                <button className="btn btn-primary" onClick={()=>setView('home')}>回到主選單</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
