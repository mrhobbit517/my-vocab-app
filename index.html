<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Dungeon v11.0 - Full Restoration</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --danger: #d63031; --gold: #ffd700; --dark: #2d3436; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; user-select: none; }

        /* 封面樣式 - 確保比例與疊加按鈕 */
        .splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 99999; display: flex; justify-content: center; }
        .splash-content { position: relative; width: 100%; max-width: 500px; height: 100%; }
        .splash-img { width: 100%; height: 100%; object-fit: contain; }
        .enter-btn {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            background: linear-gradient(180deg, #5d4037 0%, #3e2723 100%);
            color: var(--gold); border: 3px solid var(--gold); padding: 15px 40px;
            font-size: 1.5rem; font-weight: 900; border-radius: 8px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); text-shadow: 2px 2px #000;
            font-family: 'Courier New', Courier, monospace; white-space: nowrap;
        }

        /* v10.6 核心 UI */
        .container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin: 15px 0; position: relative; min-height: 220px; display: flex; flex-direction: column; justify-content: center; border: 1px solid #eee; }
        .hp-bar { display: flex; justify-content: space-between; background: var(--dark); color: #fff; padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; font-weight: bold; font-family: monospace; }
        .btn { padding: 14px; margin: 8px 0; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 0 #0769b5; }
        .btn-primary:active { transform: translateY(3px); box-shadow: none; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .monster-img { width: 120px; height: auto; margin: 10px auto; image-rendering: pixelated; display: block; }
        .timer-line { position: absolute; top: 0; left: 0; height: 6px; background: var(--danger); transition: width 0.1s linear; border-radius: 20px 20px 0 0; }
        
        /* 管理頁面樣式 */
        .input-group { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .word-item { display: flex; justify-content: space-between; background: #fff; padding: 12px; margin-bottom: 8px; border-radius: 10px; align-items: center; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SPLASH_URL = "https://i.imgur.com/8MUpGMJ.jpeg";
        const MONSTER_URLS = ["https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png"];
        const BOSS_URL = "https://i.imgur.com/LNZ46Uc.png";

        const App = () => {
            const [showSplash, setShowSplash] = useState(true);
            const [view, setView] = useState('home');
            const [wordBank, setWordBank] = useState([]);
            const [game, setGame] = useState({ list: [], idx: 0, hp: 10, floor: 1, mode: '' });
            const [inputWord, setInputWord] = useState({ eng: '', chi: '' });
            const [quizOpts, setQuizOpts] = useState([]);
            const [spellInput, setSpellInput] = useState('');
            const [timeLeft, setTimeLeft] = useState(100);
            const timerRef = useRef(null);

            // 10.6 數據持久化
            useEffect(() => {
                const saved = localStorage.getItem('vocab_dungeon_v10_6');
                if (saved) setWordBank(JSON.parse(saved));
                else setWordBank([{eng: "apple", chi: "蘋果"}, {eng: "banana", chi: "香蕉"}, {eng: "cat", chi: "貓"}, {eng: "dog", chi: "狗"}]);
            }, []);

            useEffect(() => {
                localStorage.setItem('vocab_dungeon_v10_6', JSON.stringify(wordBank));
            }, [wordBank]);

            const speak = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; window.speechSynthesis.speak(u); };

            // 10.6 自動翻譯功能
            const handleTranslate = async () => {
                if (!inputWord.eng) return;
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURI(inputWord.eng)}`);
                    const data = await res.json();
                    setInputWord({ ...inputWord, chi: data[0][0][0] });
                } catch (e) { alert("翻譯失敗，請檢查網路"); }
            };

            const startDungeon = (mode) => {
                if (wordBank.length < 4) return alert("單字庫至少需要 4 個單字！");
                const list = [...wordBank].sort(() => Math.random() - 0.5);
                setGame({ list, idx: 0, hp: 10, floor: 1, mode });
                loadLevel(list[0], mode);
                setView('dungeon');
            };

            const loadLevel = (word, mode) => {
                setSpellInput('');
                if (mode !== 'high') {
                    const others = wordBank.filter(w => w.eng !== word.eng).sort(() => Math.random() - 0.5).slice(0, 3);
                    setQuizOpts([...others, word].sort(() => Math.random() - 0.5));
                }
                clearInterval(timerRef.current);
                if (mode === 'high') {
                    setTimeLeft(100);
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 0) { handleAns(false); return 0; }
                            return prev - 2;
                        });
                    }, 100);
                }
            };

            const handleAns = (correct) => {
                clearInterval(timerRef.current);
                if (correct) {
                    speak(game.list[game.idx].eng);
                    if (game.idx + 1 >= game.list.length) return setView('win');
                    const next = game.idx + 1;
                    setGame(p => ({ ...p, idx: next, floor: p.floor + 1 }));
                    loadLevel(game.list[next], game.mode);
                } else {
                    const newHp = game.hp - 1;
                    setGame(p => ({ ...p, hp: newHp }));
                    if (newHp <= 0) return setView('lose');
                    const next = game.idx + 1;
                    if (next >= game.list.length) return setView('win');
                    setGame(p => ({ ...p, idx: next, floor: p.floor + 1 }));
                    loadLevel(game.list[next], game.mode);
                }
            };

            if (showSplash) return (
                <div className="splash-screen">
                    <div className="splash-content">
                        <img src={SPLASH_URL} className="splash-img" />
                        <button className="enter-btn" onClick={() => setShowSplash(false)}>ENTER DUNGEON</button>
                    </div>
                </div>
            );

            if (view === 'home') return (
                <div className="container" style={{justifyContent:'center'}}>
                    <h1 style={{textAlign:'center', color:'var(--primary)'}}>VOCAB DUNGEON</h1>
                    <button className="btn btn-primary" onClick={() => startDungeon('low')}>初級挑戰 (選擇題)</button>
                    <button className="btn btn-primary" onClick={() => startDungeon('high')}>高級挑戰 (拼字限時)</button>
                    <button className="btn btn-outline" onClick={() => setView('admin')}>字庫管理 ({wordBank.length})</button>
                </div>
            );

            if (view === 'admin') return (
                <div className="container">
                    <button onClick={() => setView('home')} className="btn btn-outline">← 返回主選單</button>
                    <h3>新增單字 (10.6 自動翻譯)</h3>
                    <div className="input-group">
                        <input placeholder="英文" value={inputWord.eng} onChange={e => setInputWord({...inputWord, eng: e.target.value})} />
                        <button className="btn btn-outline" onClick={handleTranslate}>✨ 自動翻譯中文</button>
                        <input placeholder="中文" value={inputWord.chi} onChange={e => setInputWord({...inputWord, chi: e.target.value})} />
                        <button className="btn btn-primary" onClick={() => {
                            if(!inputWord.eng || !inputWord.chi) return;
                            setWordBank([inputWord, ...wordBank]);
                            setInputWord({eng:'', chi:''});
                        }}>確認加入</button>
                    </div>
                    <h3>CSV 數據管理</h3>
                    <div style={{display:'flex', gap:'10px'}}>
                        <button className="btn btn-outline" onClick={() => {
                            const csv = "英文,中文\n" + wordBank.map(w => `${w.eng},${w.chi}`).join("\n");
                            const blob = new Blob(["\uFEFF"+csv], {type: 'text/csv'});
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a'); a.href=url; a.download="vocab_export.csv"; a.click();
                        }}>匯出 CSV</button>
                        <label className="btn btn-outline" style={{textAlign:'center', cursor:'pointer'}}>
                            匯入 CSV <input type="file" style={{display:'none'}} accept=".csv" onChange={(e) => {
                                const file = e.target.files[0];
                                const reader = new FileReader();
                                reader.onload = (evt) => {
                                    const rows = evt.target.result.split('\n').slice(1);
                                    const news = rows.map(r => {
                                        const [e, c] = r.split(',');
                                        return e && c ? {eng: e.trim(), chi: c.trim()} : null;
                                    }).filter(x => x);
                                    setWordBank([...news, ...wordBank]);
                                };
                                reader.readAsText(file);
                            }} />
                        </label>
                    </div>
                    <div style={{marginTop:'20px'}}>
                        {wordBank.map((w, i) => (
                            <div key={i} className="word-item">
                                <span><b>{w.eng}</b> - {w.chi}</span>
                                <button onClick={() => setWordBank(wordBank.filter((_, idx) => idx !== i))} style={{color:'red', border:'none', background:'none'}}>刪除</button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'dungeon') {
                const cur = game.list[game.idx];
                return (
                    <div className="container">
                        <div className="hp-bar">
                            <span>HP: {"❤️".repeat(game.hp)}</span>
                            <span>FLOOR: {game.floor}</span>
                        </div>
                        <img src={game.mode === 'high' ? BOSS_URL : MONSTER_URLS[game.idx % 3]} className="monster-img" />
                        <div className="card">
                            {game.mode === 'high' && <div className="timer-line" style={{width: `${timeLeft}%`}}></div>}
                            <h2 style={{fontSize: '2.5rem', margin: 0}}>{cur.chi}</h2>
                        </div>
                        {game.mode === 'high' ? (
                            <div>
                                <input value={spellInput} onChange={e => setSpellInput(e.target.value)} placeholder="輸入英文拼寫..." autoFocus />
                                <button className="btn btn-primary" onClick={() => handleAns(spellInput.toLowerCase().trim() === cur.eng.toLowerCase())}>發動攻擊</button>
                            </div>
                        ) : (
                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                                {quizOpts.map((o, i) => (
                                    <button key={i} className="btn btn-outline" onClick={() => handleAns(o.eng === cur.eng)}>{o.eng}</button>
                                ))}
                            </div>
                        )}
                        <button className="btn" style={{marginTop:'auto', opacity:0.5}} onClick={() => {clearInterval(timerRef.current); setView('home');}}>逃避戰鬥</button>
                    </div>
                );
            }

            if (view === 'win' || view === 'lose') return (
                <div className="container" style={{justifyContent:'center', textAlign:'center'}}>
                    <h1 style={{fontSize:'3rem'}}>{view === 'win' ? "🏆" : "💀"}</h1>
                    <h2>{view === 'win' ? "挑戰成功！" : "你倒下了..."}</h2>
                    <button className="btn btn-primary" onClick={() => setView('home')}>返回主選單</button>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
