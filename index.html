<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v10.4 - Zero Crash</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #636e72; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* 基本 UI */
        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.96); background: #f0f0f0; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(9,132,227,0.2); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: transparent; }

        .speaker-btn { background: #e1f0ff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* 卡片系統 */
        .card { background: #fff; border-radius: 24px; padding: 25px; margin: 10px 0; min-height: 260px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); text-align: center; position: relative; border: 1px solid #eee; }
        .card-eng { font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        .example-box { margin-top: 15px; padding: 12px; background: #f9f9f9; border-radius: 10px; border-left: 4px solid var(--primary); text-align: left; font-style: italic; font-size: 0.95rem; width: 100%; box-sizing: border-box; }

        /* 戰鬥動畫 */
        .monster-box { text-align: center; margin: 10px 0; min-height: 160px; display: flex; align-items: center; justify-content: center; }
        .monster-img { width: 130px; height: auto; image-rendering: pixelated; transition: 0.3s; }
        @keyframes hit-shake { 0% { transform: translateX(0); } 20% { transform: translateX(-15px) scale(1.1); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }
        .anim-hit { animation: hit-shake 0.5s forwards; }
        @keyframes hurt-red { 0% { filter: brightness(1); } 50% { filter: brightness(1.2) sepia(1) saturate(8); transform: translateY(10px); } 100% { filter: brightness(1); } }
        .anim-hurt { animation: hurt-red 0.4s; }

        .timer-line { position: absolute; top: 0; left: 0; height: 6px; background: var(--danger); transition: width 0.1s linear; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const monsterImages = [
            "https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png",
            "https://i.imgur.com/ToQhBZL.png", "https://i.imgur.com/72Hr4rn.png", "https://i.imgur.com/3jsF7It.png",
            "https://i.imgur.com/4TfXx0t.png", "https://i.imgur.com/bI7Y6tX.png"
        ];
        const bossImages = ["https://i.imgur.com/LNZ46Uc.png", "https://i.imgur.com/ArFodUT.png"];

        // 預設資料 (確保格式完整)
        const defaultWords = [
            {eng:"apple", chi:"蘋果", example:"I eat an apple every day.", id:1},
            {eng:"book", chi:"書本 / 預訂", example:"I like reading this book.", id:2},
            {eng:"cat", chi:"貓", example:"The cat is sleeping.", id:3},
            {eng:"dog", chi:"狗", example:"The dog is barking.", id:4}
        ];

        const App = () => {
            const [view, setView] = useState('home');
            const [wordBank, setWordBank] = useState([]);
            
            // 地下城與溫習狀態
            const [studyList, setStudyList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(20);
            const [mode, setMode] = useState('');
            const [bossIn, setBossIn] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const [monsterAnim, setMonsterAnim] = useState("");
            const [mImg, setMImg] = useState(monsterImages[0]);
            const timerRef = useRef(null);

            const [newEng, setNewEng] = useState("");
            const [newChi, setNewChi] = useState("");
            const [newExample, setNewExample] = useState("");

            // 初始化與防錯讀取
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('vocab_v10_4');
                    let parsed = saved ? JSON.parse(saved) : defaultWords;
                    // 資料清洗：確保每個單字都有必要的 key，防止渲染時 crash
                    const cleaned = parsed.map(w => ({
                        eng: w.eng || "Unknown",
                        chi: w.chi || "未定義",
                        example: w.example || "No example.",
                        id: w.id || Date.now() + Math.random()
                    }));
                    setWordBank(cleaned);
                } catch (e) {
                    setWordBank(defaultWords);
                }
            }, []);

            useEffect(() => {
                if (wordBank.length > 0) {
                    localStorage.setItem('vocab_v10_4', JSON.stringify(wordBank));
                }
            }, [wordBank]);

            const speak = (text) => {
                if(!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                window.speechSynthesis.speak(u);
            };

            const shuffle = (a) => [...a].sort(() => Math.random() - 0.5);

            const autoFetch = async () => {
                if(!newEng) return;
                try {
                    const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(newEng)}&langpair=en|zh-TW`);
                    const tData = await tRes.json();
                    setNewChi(tData.responseData.translatedText);

                    const dRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(newEng)}`);
                    const dData = await dRes.json();
                    if(Array.isArray(dData)) {
                        const ex = dData[0].meanings[0].definitions.find(d => d.example)?.example;
                        setNewExample(ex || "No example found.");
                    }
                } catch(e) { alert("抓取失敗"); }
            };

            const startNormal = (m) => {
                if(wordBank.length < 4) return alert("單字不足4個");
                const q = shuffle(wordBank);
                setCurrentWord(q[0]);
                setStudyList(q.slice(1));
                setIsFlipped(false);
                setFeedback("");
                if(m === 'quiz') setOptions(shuffle([q[0].eng, ...wordBank.filter(x=>x.eng!==q[0].eng).slice(0,3).map(x=>x.eng)]));
                setView(m);
            };

            const startDungeon = (diff) => {
                if(wordBank.length < 4) return alert("單字不足4個");
                let mf = diff==='low'?20 : diff==='mid'?30 : 40;
                let list = []; while(list.length < mf) list = [...list, ...shuffle(wordBank)];
                list = list.slice(0, mf);
                setMode(diff); setMaxFloor(mf); setHp(10); setFloor(1); setStudyList(list);
                loadDungeonLevel(1, list[0], diff);
                setView('dungeon');
            };

            const loadDungeonLevel = (f, word, m) => {
                if(!word) return;
                setCurrentWord(word); setBossIn(""); setFeedback(""); setMonsterAnim("");
                const isB = (m==='mid' && (f===15 || f===30)) || (m==='high' && (f===20 || f===40));
                setMImg(isB ? bossImages[Math.floor(Math.random()*bossImages.length)] : monsterImages[Math.floor(Math.random()*monsterImages.length)]);
                if(!isB) setOptions(shuffle([word.eng, ...wordBank.filter(x=>x.eng!==word.eng).slice(0,3).map(x=>x.eng)]));
                
                clearInterval(timerRef.current);
                if(m==='high') {
                    setTimeLeft(100);
                    timerRef.current = setInterval(() => {
                        setTimeLeft(p => { if(p <= 0) { handleDungeonAns(false); return 0; } return p-2.5; });
                    }, 100);
                }
            };

            const handleDungeonAns = (correct) => {
                clearInterval(timerRef.current);
                if(correct) {
                    setMonsterAnim("anim-hit");
                    setFeedback("⚔️ SUCCESS!");
                    speak(currentWord?.eng);
                    setTimeout(() => {
                        if(floor >= maxFloor) return setView('win');
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 500);
                } else {
                    setMonsterAnim("anim-hurt");
                    setHp(h => h - 1);
                    setFeedback("💥 DAMAGED!");
                    if(hp <= 1) setTimeout(() => setView('lose'), 600);
                    else setTimeout(() => {
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 800);
                }
            };

            // 首頁
            if(view === 'home') return (
                <div className="container" style={{justifyContent:'center'}}>
                    <h1 style={{textAlign:'center', color:'var(--primary)'}}>VOCAB DUNGEON</h1>
                    <button className="btn btn-primary" onClick={()=>setView('menu')}>開始挑戰 / 溫習</button>
                    <button className="btn" onClick={()=>setView('add')}>新增單字與例句</button>
                    <button className="btn" onClick={()=>setView('list')}>字庫管理 ({wordBank.length})</button>
                </div>
            );

            // 模式選擇
            if(view === 'menu') return (
                <div className="container">
                    <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                    <h2>選擇模式</h2>
                    <button className="btn btn-outline" onClick={()=>startNormal('card')}>生字卡 (讀音/例句)</button>
                    <button className="btn btn-outline" onClick={()=>startNormal('quiz')}>選擇題</button>
                    <hr style={{width:'100%', border:'none', borderTop:'1px solid #ddd', margin:'20px 0'}}/>
                    <h3 style={{color:'var(--danger)'}}>🏰 地下城戰鬥</h3>
                    <button className="btn" onClick={()=>startDungeon('low')}>初級 (20層)</button>
                    <button className="btn" onClick={()=>startDungeon('mid')}>中級 (30層+Boss)</button>
                    <button className="btn" onClick={()=>startDungeon('high')}>高級 (40層+限時)</button>
                </div>
            );

            // 新增單字
            if(view === 'add') return (
                <div className="container">
                    <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                    <h2>新增單字</h2>
                    <input placeholder="英文單字" value={newEng} onChange={e=>setNewEng(e.target.value)} />
                    <button className="btn btn-outline" onClick={autoFetch}>✨ 自動抓取</button>
                    <textarea placeholder="中文意思" value={newChi} onChange={e=>setNewChi(e.target.value)} />
                    <textarea placeholder="例句" rows="3" value={newExample} onChange={e=>setNewExample(e.target.value)} />
                    <button className="btn btn-primary" onClick={()=>{
                        if(!newEng || !newChi) return alert("內容不全");
                        setWordBank([{eng:newEng, chi:newChi, example:newExample, id:Date.now()}, ...wordBank]);
                        setNewEng(""); setNewChi(""); setNewExample(""); alert("儲存成功");
                    }}>💾 儲存</button>
                </div>
            );

            // 字庫管理
            if(view === 'list') return (
                <div className="container">
                    <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                    <h3>我的字庫 ({wordBank.length})</h3>
                    {wordBank.map(w => (
                        <div key={w.id} style={{background:'#fff', padding:'12px', borderRadius:'12px', marginBottom:'8px', display:'flex', alignItems:'center', border:'1px solid #eee'}}>
                            <div style={{flex:1}}><strong>{w.eng}</strong> - {w.chi}</div>
                            <button className="speaker-btn" style={{width:'32px', height:'32px', fontSize:'0.9rem'}} onClick={()=>speak(w.eng)}>🔊</button>
                            <button style={{color:'red', border:'none', background:'none', marginLeft:'10px', fontSize:'1.2rem'}} onClick={()=>setWordBank(wordBank.filter(x=>x.id!==w.id))}>×</button>
                        </div>
                    ))}
                </div>
            );

            // 溫習界面 (卡片/選擇)
            if(view === 'card' || view === 'quiz') return (
                <div className="container">
                    <div className="card" onClick={()=>{if(view==='card') setIsFlipped(!isFlipped)}}>
                        {!isFlipped ? (
                            <div>
                                <div className="card-eng">{currentWord?.eng}</div>
                                <button className="speaker-btn" onClick={(e)=>{e.stopPropagation(); speak(currentWord?.eng);}}>🔊</button>
                            </div>
                        ) : (
                            <div style={{textAlign:'left', width:'100%'}}>
                                <strong>【中文】</strong><p>{currentWord?.chi}</p>
                                <div className="example-box"><strong>【例句】</strong><p>{currentWord?.example}</p></div>
                            </div>
                        )}
                    </div>
                    {view === 'quiz' && !isFlipped && (
                        <div className="quiz-grid">
                            {options.map(o => <button key={o} className="btn btn-outline" onClick={()=>{setFeedback(o===currentWord.eng?"✅ 正確":"❌ 錯誤"); setIsFlipped(true); speak(currentWord?.eng);}}>{o}</button>)}
                        </div>
                    )}
                    {feedback && <div style={{textAlign:'center', fontWeight:'bold', margin:'10px'}}>{feedback}</div>}
                    <button className="btn btn-primary" onClick={()=>{
                        if(studyList.length === 0) return setView('home');
                        const next = studyList[0];
                        setStudyList(studyList.slice(1)); setCurrentWord(next); setIsFlipped(false); setFeedback("");
                        if(view==='quiz') setOptions(shuffle([next.eng, ...wordBank.filter(x=>x.eng!==next.eng).slice(0,3).map(x=>x.eng)]));
                    }}>下一個</button>
                    <button className="btn" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            // 地下城界面
            if(view === 'dungeon') {
                const isB = (mode==='mid' && (floor===15 || floor===30)) || (mode==='high' && (floor===20 || floor===40));
                return (
                    <div className="container">
                        <div style={{background: '#2d3436', color: 'white', padding: '12px', borderRadius: '15px', display:'flex', justifyContent:'space-between'}}>
                            <span>{"❤️".repeat(hp)}</span>
                            <span>B{floor}</span>
                        </div>
                        <div className="monster-box">
                            <img src={mImg} className={`monster-img ${isB?'boss-img':''} ${monsterAnim}`} />
                        </div>
                        <div className="card" style={{minHeight:'120px'}}>
                            {mode==='high' && <div className="timer-line" style={{width:timeLeft+'%'}}></div>}
                            <div style={{fontSize:'1.3rem', fontWeight:'bold'}}>{currentWord?.chi}</div>
                        </div>
                        {isB ? (
                            <div>
                                <input placeholder="拼寫單字..." value={bossIn} onChange={e=>setBossIn(e.target.value)} autoFocus />
                                <button className="btn btn-primary" onClick={()=>handleDungeonAns(bossIn.toLowerCase().trim() === currentWord?.eng.toLowerCase().trim())}>⚡ 攻擊 BOSS</button>
                            </div>
                        ) : (
                            <div className="quiz-grid">
                                {options.map(o => <button key={o} className="btn btn-outline" onClick={()=>handleDungeonAns(o === currentWord?.eng)}>{o}</button>)}
                            </div>
                        )}
                        <button className="btn" style={{color:'#999'}} onClick={()=>{clearInterval(timerRef.current); setView('home')}}>🏳️ 撤退</button>
                    </div>
                );
            }

            if(view === 'win' || view === 'lose') return (
                <div className="container" style={{justifyContent:'center', textAlign:'center'}}>
                    <h1>{view==='win'?"🎉":"💀"}</h1>
                    <h2>{view==='win'?"挑戰成功":"你倒下了"}</h2>
                    <button className="btn btn-primary" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
