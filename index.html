<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡生字卡 VocabCard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #333;
            --primary: #4a90e2;
            --danger: #e74c3c;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        body { 
            background-color: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            margin: 0; color: var(--text);
        }
        .container {
            width: 100%; max-width: 480px; min-height: 100vh;
            margin: 0 auto; padding: 40px 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 40px; text-align: center; }
        
        .btn {
            background: #fff; border: 1px solid #ddd; padding: 14px;
            margin: 10px 0; cursor: pointer; font-size: 1rem;
            border-radius: 12px; transition: all 0.2s; width: 100%;
            display: block; box-sizing: border-box; color: var(--text);
            text-align: center; text-decoration: none; font-weight: 500;
        }
        .btn:active { background: #f0f0f0; transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(74,144,226,0.3); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); }
        .btn-delete { color: var(--danger); border: 1px solid var(--danger); padding: 5px 12px; width: auto; font-size: 0.85rem; margin: 0; border-radius: 6px; }

        .card {
            background: #fff; border-radius: 20px; padding: 40px 25px;
            margin: 20px 0; min-height: 250px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; box-shadow: var(--card-shadow);
            cursor: pointer; text-align: center; transition: transform 0.3s;
        }
        .card h2 { font-size: 2.5rem; margin: 0 0 10px 0; color: var(--primary); }
        .card .pos-tag { font-size: 0.9rem; color: #999; text-transform: lowercase; font-style: italic; }
        .card .translation { font-size: 1.4rem; margin: 15px 0; font-weight: 600; }
        .card .example { font-size: 0.95rem; color: #666; line-height: 1.5; border-top: 1px solid #eee; padding-top: 15px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888; font-weight: bold; }
        input, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px;
            box-sizing: border-box; font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--primary); }

        .vocab-list { width: 100%; margin-top: 20px; }
        .vocab-item {
            background: #fff; padding: 18px; border-radius: 15px;
            margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .vocab-info { flex: 1; text-align: left; padding-right: 10px; }
        .vocab-info strong { font-size: 1.15rem; color: var(--primary); }
        .vocab-info small { color: #888; margin-left: 5px; }
        
        .nav-footer { margin-top: auto; padding-top: 30px; text-align: center; }
        .status-msg { font-size: 0.9rem; color: var(--primary); margin: 5px 0; height: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

                if (currentWord) setHistory(prev => [...prev, currentWord]);

                setIsFlipped(false);

                }
