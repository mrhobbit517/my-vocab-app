<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v10.8.1 - Restoration</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --dungeon-dark: #1a1a1a; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }
        
        /* 封面樣式 - 確保按鈕在圖片底部 12% */
        .splash-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .splash-wrapper { position: relative; width: 100%; max-width: 480px; height: 100%; }
        .splash-img { width: 100%; height: 100%; object-fit: contain; }
        .enter-btn {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            background: linear-gradient(180deg, #5d4037 0%, #3e2723 100%);
            color: #ffd700; padding: 15px 45px; border-radius: 8px;
            font-size: 1.5rem; font-weight: 900; border: 3px solid #ffd700;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); text-shadow: 2px 2px #000;
        }

        /* 核心 UI */
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.96); background: #f0f0f0; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(9,132,227,0.2); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: transparent; }
        .btn-small { padding: 8px; font-size: 0.85rem; margin: 5px 2px; flex: 1; }

        /* 卡片與動畫 */
        .card { background: #fff; border-radius: 24px; padding: 25px; margin: 10px 0; min-height: 260px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); text-align: center; position: relative; border: 1px solid #eee; overflow: hidden; }
        .card-eng { font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        .card-chi { font-size: 1.8rem; font-weight: bold; color: #444; }
        .example-box { margin-top: 15px; padding: 12px; background: #f9f9f9; border-radius: 10px; border-left: 4px solid var(--primary); text-align: left; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        
        .monster-box { text-align: center; margin: 10px 0; min-height: 160px; display: flex; align-items: center; justify-content: center; }
        .monster-img { width: 130px; height: auto; image-rendering: pixelated; transition: 0.3s; }
        .anim-hit { animation: hit-shake 0.5s forwards; }
        .anim-hurt { animation: hurt-red 0.4s; }
        @keyframes hit-shake { 0% { transform: translateX(0); } 20% { transform: translateX(-15px) scale(1.1); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }
        @keyframes hurt-red { 0% { filter: brightness(1); } 50% { filter: brightness(1.2) sepia(1) saturate(8); transform: translateY(10px); } 100% { filter: brightness(1); } }

        .timer-line { position: absolute; top: 0; left: 0; height: 6px; background: var(--danger); transition: width 0.1s linear; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; text-align: center; }
        .speaker-btn { background: #e1f0ff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const splashImgUrl = "https://i.imgur.com/8MUpGMJ.jpeg";
        const monsterImages = ["https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png", "https://i.imgur.com/ToQhBZL.png"];
        const bossImages = ["https://i.imgur.com/LNZ46Uc.png", "https://i.imgur.com/ArFodUT.png"];

        const initialWords = [
            {eng:"apple", chi:"蘋果", example:"An apple a day keeps the doctor away."},
            {eng:"book", chi:"書", example:"I like to read a book before bed."},
            {eng:"cat", chi:"貓", example:"The cat is sleeping on the sofa."},
            {eng:"dog", chi:"狗", example:"My dog loves to play with a ball."},
            {eng:"egg", chi:"蛋", example:"I had a boiled egg for breakfast."},
            {eng:"fish", chi:"魚", example:"There are many colorful fish in the sea."},
            {eng:"girl", chi:"女孩", example:"The little girl is wearing a red dress."},
            {eng:"house", chi:"房子", example:"We live in a big white house."},
            {eng:"ice", chi:"冰", example:"Put some ice in my drink, please."},
            {eng:"jump", chi:"跳", example:"The kids like to jump on the bed."},
            {eng:"kite", chi:"風箏", example:"The wind is perfect for flying a kite."},
            {eng:"lion", chi:"獅子", example:"The lion is the king of the jungle."},
            {eng:"moon", chi:"月亮", example:"The moon shines brightly at night."},
            {eng:"nest", chi:"鳥巢", example:"The bird built a nest in the tree."},
            {eng:"orange", chi:"橙子", example:"This orange is very sweet and juicy."},
            {eng:"pen", chi:"筆", example:"Can I borrow your pen for a moment?"},
            {eng:"queen", chi:"女王", example:"The queen lives in a beautiful palace."},
            {eng:"river", chi:"河流", example:"We went fishing by the river."},
            {eng:"sun", chi:"太陽", example:"The sun rises in the east."},
            {eng:"tree", chi:"樹", example:"The apple tree is full of fruit."},
            {eng:"umbrella", chi:"雨傘", example:"Don't forget your umbrella, it's raining."},
            {eng:"violin", chi:"小提琴", example:"She plays the violin very well."},
            {eng:"water", chi:"水", example:"We should drink plenty of water."},
            {eng:"xylophone", chi:"木琴", example:"The child is learning to play the xylophone."},
            {eng:"yellow", chi:"黃色", example:"The sunflower is bright yellow."},
            {eng:"zoo", chi:"動物園", example:"We saw many animals at the zoo."},
            {eng:"ball", chi:"球", example:"Throw the ball to me!"},
            {eng:"cake", chi:"蛋糕", example:"She baked a chocolate cake for my birthday."},
            {eng:"door", chi:"門", example:"Please close the door behind you."},
            {eng:"elephant", chi:"大象", example:"The elephant has a very long trunk."},
            {eng:"flower", chi:"花", example:"This flower smells wonderful."},
            {eng:"garden", chi:"花園", example:"My grandmother grows roses in her garden."},
            {eng:"hat", chi:"帽子", example:"Take off your hat inside the house."},
            {eng:"island", chi:"島", example:"They spent their holiday on a tropical island."},
            {eng:"juice", chi:"果汁", example:"Would you like some orange juice?"},
            {eng:"king", chi:"國王", example:"The king ruled the country for many years."},
            {eng:"lamp", chi:"燈", example:"Turn on the lamp, it's getting dark."},
            {eng:"milk", chi:"牛奶", example:"A glass of warm milk helps me sleep."},
            {eng:"night", chi:"夜晚", example:"The stars are beautiful tonight."},
            {eng:"ocean", chi:"海洋", example:"The ocean is vast and deep."}
        ].map((w, i) => ({ ...w, id: Date.now() + i }));

        const App = () => {
            const [view, setView] = useState('splash');
            const [wordBank, setWordBank] = useState([]);
            const [studyList, setStudyList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(20);
            const [mode, setMode] = useState('');
            const [bossIn, setBossIn] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const [monsterAnim, setMonsterAnim] = useState("");
            const [mImg, setMImg] = useState(monsterImages[0]);
            
            const timerRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('vocab_v10_final');
                if (saved && JSON.parse(saved).length > 0) {
                    setWordBank(JSON.parse(saved));
                } else {
                    setWordBank(initialWords);
                }
            }, []);

            useEffect(() => {
                if (wordBank.length > 0) localStorage.setItem('vocab_v10_final', JSON.stringify(wordBank));
            }, [wordBank]);

            const shuffle = (a) => [...a].sort(() => Math.random() - 0.5);
            const speak = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); };

            const startNormal = (m) => {
                const q = shuffle(wordBank);
                setCurrentWord(q[0]); setStudyList(q.slice(1));
                setIsFlipped(false); setFeedback("");
                if(m === 'quiz') setOptions(shuffle([q[0].eng, ...wordBank.filter(x=>x.eng!==q[0].eng).slice(0,3).map(x=>x.eng)]));
                setView(m);
            };

            const startDungeon = (diff) => {
                let mf = diff==='low'?20 : diff==='mid'?30 : 40;
                let list = []; while(list.length < mf) list = [...list, ...shuffle(wordBank)];
                list = list.slice(0, mf);
                setMode(diff); setMaxFloor(mf); setHp(10); setFloor(1); setStudyList(list);
                loadDungeonLevel(1, list[0], diff);
                setView('dungeon');
            };

            const loadDungeonLevel = (f, word, m) => {
                setCurrentWord(word); setBossIn(""); setMonsterAnim(""); setFeedback("");
                const isB = (m==='mid' && (f===15 || f===30)) || (m==='high' && (f===20 || f===40));
                setMImg(isB ? bossImages[Math.floor(Math.random()*bossImages.length)] : monsterImages[Math.floor(Math.random()*monsterImages.length)]);
                if(!isB) setOptions(shuffle([word.eng, ...wordBank.filter(x=>x.eng!==word.eng).slice(0,3).map(x=>x.eng)]));
                clearInterval(timerRef.current);
                if(m==='high') {
                    setTimeLeft(100);
                    timerRef.current = setInterval(() => {
                        setTimeLeft(p => { if(p <= 0) { handleDungeonAns(false); return 0; } return p-2.5; });
                    }, 100);
                }
            };

            const handleDungeonAns = (correct) => {
                clearInterval(timerRef.current);
                if(correct) {
                    setMonsterAnim("anim-hit"); setFeedback("⚔️ SUCCESS!"); speak(currentWord.eng);
                    setTimeout(() => {
                        if(floor >= maxFloor) return setView('win');
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 500);
                } else {
                    setMonsterAnim("anim-hurt"); setHp(h => h - 1); setFeedback("💥 DAMAGED!");
                    if(hp <= 1) setTimeout(() => setView('lose'), 600);
                    else setTimeout(() => {
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 800);
                }
            };

            // 1. 封面
            if (view === 'splash') return (
                <div className="splash-container">
                    <div className="splash-wrapper">
                        <img src={splashImgUrl} className="splash-img" />
                        <button className="enter-btn" onClick={()=>setView('home')}>ENTER GAME</button>
                    </div>
                </div>
            );

            // 2. 主選單
            if (view === 'home') return (
                <div className="container" style={{justifyContent:'center'}}>
                    <h1 style={{textAlign:'center', color:'var(--primary)'}}>VOCAB DUNGEON</h1>
                    <button className="btn btn-primary" onClick={()=>setView('menu')}>開始挑戰 / 溫習</button>
                    <button className="btn" onClick={()=>setView('list')}>字庫管理 ({wordBank.length})</button>
                    <button className="btn btn-outline" style={{marginTop:'30px'}} onClick={()=>setView('splash')}>返回封面</button>
                </div>
            );

            // 3. 模式選擇
            if (view === 'menu') return (
                <div className="container">
                    <button className="btn" onClick={()=>setView('home')}>← 返回主選單</button>
                    <h3>一般溫習</h3>
                    <button className="btn btn-outline" onClick={()=>startNormal('card')}>生字卡 (英文→中文)</button>
                    <button className="btn btn-outline" onClick={()=>startNormal('quiz')}>選擇題 (看中選英)</button>
                    <h3 style={{color:'var(--danger)', marginTop:'20px'}}>⚔️ 地下城戰鬥</h3>
                    <button className="btn" onClick={()=>startDungeon('low')}>初級 (20層)</button>
                    <button className="btn" onClick={()=>startDungeon('mid')}>中級 (30層 + Boss)</button>
                    <button className="btn" onClick={()=>startDungeon('high')}>高級 (40層 + 限時)</button>
                </div>
            );

            // 4. 地下城戰鬥
            if (view === 'dungeon') {
                const isB = (mode==='mid' && (floor===15 || floor===30)) || (mode==='high' && (floor===20 || floor===40));
                return (
                    <div className="container">
                        <div style={{background: '#2d3436', color: 'white', padding: '12px', borderRadius: '15px', display:'flex', justifyContent:'space-between'}}>
                            <span>{"❤️".repeat(hp)}</span>
                            <span>FLOOR {floor}/{maxFloor}</span>
                        </div>
                        <div className="monster-box"><img src={mImg} className={`monster-img ${monsterAnim}`} /></div>
                        <div className="card">
                            {mode==='high' && <div className="timer-line" style={{width:timeLeft+'%'}}></div>}
                            <div className="card-chi">{currentWord?.chi}</div>
                        </div>
                        <div style={{textAlign:'center', fontWeight:'bold', height:'24px', color: feedback.includes('⚔️')?'green':'red'}}>{feedback}</div>
                        {isB ? (
                            <div>
                                <input placeholder="拼寫這個單字..." value={bossIn} onChange={e=>setBossIn(e.target.value)} autoFocus />
                                <button className="btn btn-primary" onClick={()=>handleDungeonAns(bossIn.toLowerCase().trim() === currentWord.eng.toLowerCase().trim())}>⚡ 發動攻擊</button>
                            </div>
                        ) : (
                            <div className="quiz-grid">
                                {options.map(o => <button key={o} className="btn btn-outline" onClick={()=>handleDungeonAns(o === currentWord.eng)}>{o}</button>)}
                            </div>
                        )}
                        <button className="btn" style={{color:'#999'}} onClick={()=>{clearInterval(timerRef.current); setView('home')}}>🏳️ 撤退</button>
                    </div>
                );
            }

            // 5. 字庫管理
            if (view === 'list') return (
                <div className="container">
                    <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                    <h3>我的字庫 ({wordBank.length})</h3>
                    <div style={{display:'flex', gap:'5px', marginBottom:'15px'}}>
                        <button className="btn btn-outline btn-small" onClick={()=>{
                            const csv = "英文,中文,例句\n" + wordBank.map(w => `"${w.eng}","${w.chi}","${w.example}"`).join("\n");
                            const blob = new Blob(["\uFEFF"+csv], {type:'text/csv'});
                            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="vocab.csv"; a.click();
                        }}>📤 匯出 CSV</button>
                        <button className="btn btn-outline btn-small" onClick={()=>fileInputRef.current.click()}>📥 匯入 CSV</button>
                        <input type="file" ref={fileInputRef} style={{display:'none'}} accept=".csv" onChange={(e)=>{
                            const file = e.target.files[0];
                            const reader = new FileReader();
                            reader.onload = (evt) => {
                                const lines = evt.target.result.split("\n").slice(1);
