<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v11.0 - Full Features</title>
    <style>
        :root { 
            --bg: #f4f7f6;
            --primary: #0984e3; 
            --text: #2d3436; 
            --danger: #d63031; 
            --success: #27ae60; 
            --gray: #636e72;
        }
        body { 
            background: var(--bg); 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            color: var(--text);
            overflow-x: hidden; 
        }
        .container { 
            width: 100%; 
            max-width: 480px; 
            min-height: 100vh;
            margin: 0 auto; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 1;
        }
        .global-bg { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url("https://i.imgur.com/SwmBCNA.jpeg"); 
            background-size: cover; 
            background-position: center; 
            z-index: 0;
        }
        .dungeon-bg { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://i.imgur.com/6FeeRyP.jpeg"); 
            background-size: cover; 
            background-position: center; 
            z-index: 0; 
            display: none;
        }
        .splash-screen { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .splash-img { 
            width: 100%; height: 100%; object-fit: contain; 
            position: absolute; top: 0; left: 0; 
        }
        .enter-btn-container { 
            position: absolute; bottom: 15%; width: 100%; 
            display: flex; justify-content: center; 
        }
        .btn-rpg { 
            background: #2d3436; color: #fff; border: 4px solid #fff;
            padding: 12px 40px; font-size: 1.5rem; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; 
            box-shadow: 0 0 0 4px #2d3436;
            transition: 0.1s; 
        }
        .btn-rpg:active { transform: scale(0.9); background: #636e72; }

        .btn { 
            background: #fff; border: 1px solid #ddd; padding: 14px;
            margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; 
            width: 100%; font-weight: 600; box-sizing: border-box; transition: 0.2s; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); background: #f0f0f0; }
        .btn-primary { 
            background: var(--primary); color: white; border: none;
            box-shadow: 0 4px 12px rgba(9,132,227,0.2); 
        }
        .btn-outline { 
            color: var(--primary);
            border: 2px solid var(--primary); background: rgba(255,255,255,0.8); 
        }
        .speaker-btn { 
            background: #e1f0ff; border: none;
            border-radius: 50%; width: 44px; height: 44px; cursor: pointer; 
            display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .card { 
            background: rgba(255,255,255,0.95); border-radius: 24px; padding: 25px; margin: 10px 0;
            min-height: 260px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); text-align: center; 
            position: relative; border: 1px solid #eee; 
        }
        .card-eng { font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        .card-chi { font-size: 1.8rem; font-weight: bold; color: #444; }
        .example-box { 
            margin-top: 15px; padding: 12px; background: #f9f9f9; border-radius: 10px;
            border-left: 4px solid var(--primary); text-align: left; font-style: italic; 
            font-size: 0.95rem; width: 100%; box-sizing: border-box;
        }
        .battle-scene { 
            position: relative;
            width: 100%; height: 240px; margin: 10px 0; overflow: visible; 
            background: rgba(255, 255, 255, 0.5); border-radius: 15px;
        }
        .monster-box { position: absolute; top: 10px; right: 40px; text-align: center; z-index: 1; }
        .monster-img { width: 90px; height: auto; image-rendering: pixelated; transition: 0.3s; }
        .player-box { position: absolute; bottom: -10px; left: -20px; z-index: 2; }
        .player-img { width: 270px; height: auto; transition: 0.3s; }
        
        @keyframes hit-shake { 
            0% { transform: translateX(0); } 
            20% { transform: translateX(-15px) scale(1.1); filter: brightness(2); } 
            100% { transform: scale(0); opacity: 0; } 
        }
        .anim-hit { animation: hit-shake 0.5s forwards; }
        
        @keyframes hurt-vibrate { 
            0% { transform: translate(0, 0); } 
            10% { transform: translate(-4px, -2px); } 
            50% { transform: translate(-2px, 2px); } 
            100% { transform: translate(0, 0); } 
        }
        .anim-hurt-combined { animation: hurt-vibrate 0.4s; }

        .timer-line { 
            position: absolute; top: -10px; left: 0; height: 6px; 
            background: var(--danger); transition: width 0.1s linear; 
        }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input, textarea { 
            width: 100%; padding: 14px; border: 2px solid #eee; 
            border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem;
        }
        .footer-img { width: 100%; height: auto; margin-top: 20px; border-radius: 15px; }

        .hurt-flash { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            box-shadow: inset 0 0 50px rgba(214, 48, 49, 0.8); pointer-events: none;
            z-index: 999; opacity: 0; 
        }
        .anim-flash { animation: flash-fade 0.5s ease; }
        @keyframes flash-fade { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

        .combo-text { 
            position: absolute; left: 20px; top: 30px; font-size: 1.8rem; 
            font-weight: bold; color: #ff7675; text-shadow: 2px 2px #2d3436; z-index: 10;
            display: none;
        }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; justify-content: center; 
            align-items: center; z-index: 1000;
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 20px; 
            text-align: center; width: 80%; max-width: 320px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
        .chest-img { 
            width: 100px; height: auto; cursor: pointer; 
            transition: 0.2s; object-fit: contain; 
        }
        .chest-img:hover { transform: scale(1.1); }
        
        .view-section { display: none; width: 100%; flex: 1; flex-direction: column; justify-content: center; }
        .view-section.active { display: flex; }
    </style>
</head>
<body>
    <div class="global-bg" id="globalBg"></div>
    <div class="dungeon-bg" id="dungeonBg"></div>
    <div class="hurt-flash" id="hurtFlash"></div>

    <div class="splash-screen" id="view-splash">
        <img src="https://i.imgur.com/8MUpGMJ.jpeg" class="splash-img" alt="splash" />
        <div class="enter-btn-container">
            <button class="btn-rpg" onclick="switchView('home')">Enter</button>
        </div>
    </div>

    <div class="container">
        <div id="view-home" class="view-section">
            <h1 style="text-align:center; color:var(--primary)">VOCAB DUNGEON</h1>
            <button class="btn btn-primary" onclick="switchView('menu')">開始挑戰</button>
            <button class="btn" onclick="alert('新增功能正在優化中，可先遊玩預設字庫！')">新增單字</button>
            <button class="btn" onclick="switchView('list')">字庫管理 (<span id="bankCount">40</span>)</button>
            <img src="https://i.imgur.com/6UDmnhC.png" class="footer-img" />
        </div>

        <div id="view-menu" class="view-section">
            <button class="btn" onclick="switchView('home')">← 返回</button>
            <h2>選擇模式</h2>
            <button class="btn btn-outline" onclick="startCardMode()">生字卡 (讀音/例句)</button>
            <hr style="width:100%; border:none; border-top:1px solid #ddd; margin:20px 0"/>
            <h3 style="color:var(--danger)">城堡 地下城戰鬥</h3>
            <button class="btn" onclick="startDungeon(10)">初級 (10層 - 限時5秒)</button>
        </div>

        <div id="view-card" class="view-section">
            <div class="card" onclick="flipCard()">
                <div id="card-front">
                    <div class="card-eng" id="cardEngText">apple</div>
                    <button class="speaker-btn" onclick="event.stopPropagation(); speakCurrent();">🔊</button>
                </div>
                <div id="card-back" style="display:none; text-align:left; width:100%">
                    <div style="display:flex; justify-content:space-between; alignItems:center">
                        <strong style="font-size:1.4rem; color:var(--primary)" id="cardBackEng">apple</strong>
                        <button class="speaker-btn" style="width:36px; height:36px" onclick="event.stopPropagation(); speakCurrent();">🔊</button>
                    </div>
                    <hr/>
                    <strong>【中文】</strong><p id="cardChiText">蘋果</p>
                    <div class="example-box"><strong>【例句】</strong><p id="cardExText">An apple a day...</p></div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="nextCard()">下一個</button>
            <button class="btn" onclick="switchView('home')">返回</button>
        </div>

        <div id="view-dungeon" class="view-section">
            <div style="background: #2d3436; color: white; padding: 12px; border-radius: 15px; display:flex; justify-content:space-between; margin-bottom: 15px">
                <span id="hpDisplay">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</span>
                <span id="floorDisplay">B1/10</span>
            </div>
            <div class="battle-scene">
                <div class="timer-line" id="timerLine" style="width:100%"></div>
                <div class="combo-text" id="comboDisplay">🔥 2 Combo!</div>
                <div class="monster-box">
                    <img src="https://i.imgur.com/BbjA5GC.png" id="monsterImg" class="monster-img" />
                </div>
                <div class="player-box">
                    <img src="https://i.imgur.com/PBcBCFv.png" id="playerImg" class="player-img" />
                </div>
            </div>
            <div class="card" style="min-height:60px; padding: 15px; margin-bottom: 10px">
                <div style="font-size:1.3rem; font-weight:bold" id="dungeonChiText">蘋果</div>
            </div>
            
            <div id="quizGrid" class="quiz-grid"></div>
            <div id="bossInputArea" style="display:none">
                <input type="text" id="bossInput" placeholder="拼寫單字..." />
                <button class="btn btn-primary" onclick="checkBossAns()">⚡ 攻擊 BOSS</button>
            </div>

            <button class="btn" style="color:#999; margin-top: 10px" onclick="endDungeonGame('home')">🏳️ 撤退</button>
        </div>

        <div id="view-end" class="view-section">
            <div style="text-align:center">
                <h1 id="endEmoji">🎉</h1>
                <h2 id="endTitle">挑戰成功</h2>
            </div>
            <button class="btn btn-primary" style="margin-top: 20px" onclick="switchView('home')">返回</button>
        </div>
    </div>

    <div class="modal-overlay" id="chestModal">
        <div class="modal-content">
            <h3>🎉 擊敗 Boss！獲得寶箱</h3>
            <img src="https://i.imgur.com/sAsVc32.png" id="chestImg" class="chest-img" onclick="openChest()" alt="寶箱" />
            <p style="color: #636e72" id="chestTip">點擊寶箱開啟獎勵！</p>
            <button class="btn btn-primary" style="margin-top: 10px; display:none" id="chestNextBtn" onclick="closeChestModal()">前往下一關</button>
        </div>
    </div>

    <script>
        // 1. 資料庫
        const initialWords = [
            {eng:"apple", chi:"蘋果", example:"An apple a day keeps the doctor away."},
            {eng:"book", chi:"書", example:"I like to read a book before bed."},
            {eng:"cat", chi:"貓", example:"The cat is sleeping on the sofa."},
            {eng:"dog", chi:"狗", example:"My dog loves to play with a ball."},
            {eng:"egg", chi:"蛋", example:"I had a boiled egg for breakfast."},
            {eng:"fish", chi:"魚", example:"There are many colorful fish in the sea."},
            {eng:"girl", chi:"女孩", example:"The little girl is wearing a red dress."},
            {eng:"house", chi:"房子", example:"We live in a big white house."},
            {eng:"ice", chi:"冰", example:"Put some ice in my drink, please."},
            {eng:"jump", chi:"跳", example:"The kids like to jump on the bed."}
        ];

        const monsterImages = ["https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png"];
        const bossImages = ["https://i.imgur.com/LNZ46Uc.png"];

        // 2. 狀態管理
        let currentView = 'splash';
        let currentWordIndex = 0;
        let hp = 10;
        let floor = 1;
        let maxFloor = 10;
        let isFlipped = false;
        let timer = null;
        let timeLeft = 100;
        let combo = 0;
        let chestOpened = false;

        // 3. 核心切換畫面邏輯 (純原生JS，毫無白畫面風險)
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            const target = document.getElementById('view-' + viewId);
            if(target) target.classList.add('active');
            
            if(viewId === 'splash') document.getElementById('view-splash').style.display = 'flex';
            else document.getElementById('view-splash').style.display = 'none';

            if(viewId === 'dungeon') {
                document.getElementById('dungeonBg').style.display = 'block';
                document.getElementById('globalBg').style.display = 'none';
            } else {
                document.getElementById('dungeonBg').style.display = 'none';
                document.getElementById('globalBg').style.display = 'block';
            }
            currentView = viewId;
        }

        // 4. 生字卡邏輯
        function startCardMode() {
            currentWordIndex = 0;
            isFlipped = false;
            updateCardDisplay();
            switchView('card');
        }

        function updateCardDisplay() {
            const word = initialWords[currentWordIndex];
            document.getElementById('cardEngText').innerText = word.eng;
            document.getElementById('cardBackEng').innerText = word.eng;
            document.getElementById('cardChiText').innerText = word.chi;
            document.getElementById('cardExText').innerText = word.example;
            
            document.getElementById('card-front').style.display = 'block';
            document.getElementById('card-back').style.display = 'none';
            isFlipped = false;
        }

        function flipCard() {
            if(!isFlipped) {
                document.getElementById('card-front').style.display = 'none';
                document.getElementById('card-back').style.display = 'block';
            } else {
                document.getElementById('card-front').style.display = 'block';
                document.getElementById('card-back').style.display = 'none';
            }
            isFlipped = !isFlipped;
        }

        function nextCard() {
            currentWordIndex = (currentWordIndex + 1) % initialWords.length;
            updateCardDisplay();
        }

        // 5. 地下城邏輯
        function startDungeon(floors) {
            maxFloor = floors;
            floor = 1;
            hp = 10;
            combo = 0;
            switchView('dungeon');
            loadDungeonLevel();
        }

        function loadDungeonLevel() {
            clearInterval(timer);
            timeLeft = 100;
            document.getElementById('timerLine').style.width = '100%';
            document.getElementById('hpDisplay').innerText = '❤️'.repeat(hp);
            document.getElementById('floorDisplay').innerText = `B${floor}/${maxFloor}`;
            
            // 隨機選一個單字
            currentWordIndex = Math.floor(Math.random() * initialWords.length);
            const word = initialWords[currentWordIndex];
            document.getElementById('dungeonChiText').innerText = word.chi;

            const isBoss = (floor === maxFloor || floor === 5);

            // 設置怪物圖片
            const mImg = document.getElementById('monsterImg');
            mImg.className = 'monster-img';
            if(isBoss) {
                mImg.src = bossImages[0];
                document.getElementById('quizGrid').style.display = 'none';
                document.getElementById('bossInputArea').style.display = 'block';
                document.getElementById('bossInput').value = '';
                document.getElementById('bossInput').focus();
            } else {
                mImg.src = monsterImages[Math.floor(Math.random() * monsterImages.length)];
                document.getElementById('quizGrid').style.display = 'grid';
                document.getElementById('bossInputArea').style.display = 'none';
                generateQuizOptions(word.eng);
            }

            // 倒數計時
            timer = setInterval(() => {
                timeLeft -= 2;
                document.getElementById('timerLine').style.width = timeLeft + '%';
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    hurtPlayer();
                }
            }, 100);
        }

        function generateQuizOptions(correctAns) {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            let pool = [correctAns];
            while(pool.length < 4) {
                let randomEng = initialWords[Math.floor(Math.random() * initialWords.length)].eng;
                if(!pool.includes(randomEng)) pool.push(randomEng);
            }
            pool.sort(() => Math.random() - 0.5);

            pool.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-outline';
                btn.innerText = opt;
                btn.onclick = () => checkAns(opt === correctAns);
                grid.appendChild(btn);
            });
        }

        function checkAns(isCorrect) {
            clearInterval(timer);
            if(isCorrect) {
                combo++;
                if(combo >= 2) {
                    document.getElementById('comboDisplay').style.display = 'block';
                    document.getElementById('comboDisplay').innerText = `🔥 ${combo} Combo!`;
                }
                const mImg = document.getElementById('monsterImg');
                mImg.classList.add('anim-hit');
                speak(initialWords[currentWordIndex].eng);

                setTimeout(() => {
                    if(floor === 5) { // 中間的Boss
                        showChestModal();
                    } else if(floor >= maxFloor) {
                        endDungeonGame('win');
                    } else {
                        floor++;
                        loadDungeonLevel();
                    }
                }, 600);
            } else {
                hurtPlayer();
            }
        }

        function checkBossAns() {
            const inputVal = document.getElementById('bossInput').value.trim().toLowerCase();
            const correctAns = initialWords[currentWordIndex].eng.toLowerCase();
            checkAns(inputVal === correctAns);
        }

        function hurtPlayer() {
            combo = 0;
            document.getElementById('comboDisplay').style.display = 'none';
            hp--;
            document.getElementById('hpDisplay').innerText = '❤️'.repeat(hp);
            
            const flash = document.getElementById('hurtFlash');
            flash.classList.add('anim-flash');
            setTimeout(() => flash.classList.remove('anim-flash'), 500);

            const pImg = document.getElementById('playerImg');
            pImg.classList.add('anim-hurt-combined');
            setTimeout(() => pImg.classList.remove('anim-hurt-combined'), 400);

            if(hp <= 0) {
                setTimeout(() => endDungeonGame('lose'), 500);
            } else {
                setTimeout(() => loadDungeonLevel(), 600);
            }
        }

        // 6. 寶箱功能落實
        function showChestModal() {
            chestOpened = false;
            // 重置為關閉寶箱圖
            document.getElementById('chestImg').src = "https://i.imgur.com/sAsVc32.png";
            document.getElementById('chestTip').innerText = '點擊寶箱開啟獎勵！';
            document.getElementById('chestNextBtn').style.display = 'none';
            document.getElementById('chestModal').style.display = 'flex';
        }

        function openChest() {
            if(chestOpened) return;
            chestOpened = true;
            // 開啟時換成開啟寶箱圖
            document.getElementById('chestImg').src = "https://i.imgur.com/JNPgpc7.png";
            
            // 隨機獎勵
            if(Math.random() < 0.5) {
                hp++;
                document.getElementById('chestTip').innerText = '你獲得了：❤️ 回復 1 點生命！';
            } else {
                document.getElementById('chestTip').innerText = '你獲得了：⏱️ 寶箱的祝福！';
            }
            document.getElementById('chestNextBtn').style.display = 'block';
        }

        function closeChestModal() {
            document.getElementById('chestModal').style.display = 'none';
            floor++;
            loadDungeonLevel();
        }

        function endDungeonGame(result) {
            clearInterval(timer);
            if(result === 'win') {
                document.getElementById('endEmoji').innerText = '🎉';
                document.getElementById('endTitle').innerText = '挑戰成功！';
                switchView('end');
            } else if(result === 'lose') {
                document.getElementById('endEmoji').innerText = '💀';
                document.getElementById('endTitle').innerText = '你倒下了...';
                switchView('end');
            } else {
                switchView('home');
            }
        }

        // 發音
        function speak(text) {
            if(!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }

        function speakCurrent() {
            speak(initialWords[currentWordIndex].eng);
        }

        // 初始載入
        window.onload = () => {
            switchView('splash');
        };
    </script>
</body>
</html>
