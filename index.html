<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v11.1 - No Last Chest</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #636e72; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; z-index: 1; }
        
        .global-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://i.imgur.com/SwmBCNA.jpeg"); background-size: cover; background-position: center; z-index: 0; }
        .dungeon-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://i.imgur.com/6FeeRyP.jpeg"); background-size: cover; background-position: center; z-index: 0; }

        .splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .splash-img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
        .enter-btn-container { position: absolute; bottom: 15%; width: 100%; display: flex; justify-content: center; }
        .btn-rpg { background: #2d3436; color: #fff; border: 4px solid #fff; padding: 12px 40px; font-size: 1.5rem; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 0 4px #2d3436; transition: 0.1s; }
        .btn-rpg:active { transform: scale(0.9); background: #636e72; }

        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.96); background: #f0f0f0; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(9,132,227,0.2); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: rgba(255,255,255,0.8); }
        .btn-small { padding: 8px; font-size: 0.85rem; margin: 5px 2px; flex: 1; }
        .speaker-btn { background: #e1f0ff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .card { background: rgba(255,255,255,0.95); border-radius: 24px; padding: 25px; margin: 10px 0; min-height: 260px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); text-align: center; position: relative; border: 1px solid #eee; }
        .card-eng { font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        .card-chi { font-size: 1.8rem; font-weight: bold; color: #444; }
        .example-box { margin-top: 15px; padding: 12px; background: #f9f9f9; border-radius: 10px; border-left: 4px solid var(--primary); text-align: left; font-style: italic; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        
        .battle-scene { position: relative; width: 100%; height: 240px; margin: 10px 0; overflow: visible; background: rgba(255, 255, 255, 0.5); border-radius: 15px; }
        .monster-box { position: absolute; top: 10px; right: 40px; text-align: center; z-index: 1; }
        .monster-img { width: 90px; height: auto; image-rendering: pixelated; transition: 0.3s; }
        .player-box { position: absolute; bottom: -10px; left: -20px; z-index: 2; }
        .player-img { width: 270px; height: auto; transition: 0.3s; }
        
        @keyframes hit-shake { 0% { transform: translateX(0); } 20% { transform: translateX(-15px) scale(1.1); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }
        .anim-hit { animation: hit-shake 0.5s forwards; }
        @keyframes hurt-red { 0% { filter: brightness(1); } 50% { filter: brightness(1.2) sepia(1) saturate(8); transform: translateY(10px); } 100% { filter: brightness(1); } }
        .anim-hurt { animation: hurt-red 0.4s; }
        
        @keyframes hurt-red-filter { 0% { filter: brightness(1); } 50% { filter: brightness(1.2) sepia(1) saturate(8); } 100% { filter: brightness(1); } }
        @keyframes hurt-vibrate { 0% { transform: translate(0, 0); } 10% { transform: translate(-4px, -2px); } 20% { transform: translate(3px, 2px); } 30% { transform: translate(-4px, 1px); } 40% { transform: translate(3px, -1px); } 50% { transform: translate(-2px, 2px); } 60% { transform: translate(2px, 1px); } 70% { transform: translate(-3px, -1px); } 80% { transform: translate(3px, 2px); } 90% { transform: translate(-1px, -2px); } 100% { transform: translate(0, 0); } }
        .anim-hurt-combined { animation: hurt-vibrate 0.4s, hurt-red-filter 0.4s; }

        .timer-line { position: absolute; top: -10px; left: 0; height: 6px; background: var(--danger); transition: width 0.1s linear; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        .footer-img { width: 100%; height: auto; margin-top: 20px; border-radius: 15px; }

        .hurt-flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; box-shadow: inset 0 0 50px rgba(214, 48, 49, 0.8); pointer-events: none; z-index: 999; opacity: 0; }
        .anim-flash { animation: flash-fade 0.5s ease; }
        @keyframes flash-fade { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

        .combo-text { position: absolute; left: 20px; top: 30px; font-size: 1.8rem; font-weight: bold; color: #ff7675; text-shadow: 2px 2px #2d3436; z-index: 10; animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; color: var(--text); }
        .modal-content p { color: var(--gray); font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultWords = [
            { eng: "apple", chi: "蘋果", eg: "I eat an apple every day." },
            { eng: "banana", chi: "香蕉", eg: "Bananas are rich in potassium." },
            { eng: "cat", chi: "貓", eg: "The cat is sleeping on the sofa." },
            { eng: "dog", chi: "狗", eg: "The dog barked at the stranger." },
            { eng: "elephant", chi: "大象", eg: "Elephants are the largest land animals." },
            { eng: "fish", chi: "魚", eg: "There are many colorful fish in the pond." },
            { eng: "guitar", chi: "吉他", eg: "He plays the guitar very well." },
            { eng: "house", chi: "房子", eg: "They live in a big house." },
            { eng: "ice cream", chi: "冰淇淋", eg: "I love chocolate ice cream." },
            { eng: "juice", chi: "果汁", eg: "Orange juice is good for health." },
            { eng: "kite", chi: "風箏", eg: "The children are flying kites." },
            { eng: "lemon", chi: "檸檬", eg: "Lemons are very sour." },
            { eng: "monkey", chi: "猴子", eg: "Monkeys like to eat bananas." },
            { eng: "notebook", chi: "筆記本", eg: "I write my diary in a notebook." },
            { eng: "orange", chi: "橙子", eg: "This orange is very sweet." },
            { eng: "pencil", chi: "鉛筆", eg: "Please sharpen your pencil." },
            { eng: "queen", chi: "皇后", eg: "The queen is waving to the crowd." },
            { eng: "rabbit", chi: "兔子", eg: "Rabbits have long ears." },
            { eng: "sun", chi: "太陽", eg: "The sun rises in the east." },
            { eng: "tiger", chi: "老虎", eg: "Tigers are fierce animals." },
            { eng: "umbrella", chi: "雨傘", eg: "Don't forget to take an umbrella." },
            { eng: "violin", chi: "小提琴", eg: "She is learning to play the violin." },
            { eng: "water", chi: "水", eg: "We should drink enough water." },
            { eng: "xylophone", chi: "木琴", eg: "The boy is playing a xylophone." },
            { eng: "yellow", chi: "黃色", eg: "Bananas are yellow." },
            { eng: "zebra", chi: "斑馬", eg: "Zebras have black and white stripes." },
            { eng: "airport", chi: "機場", eg: "The plane landed at the airport." },
            { eng: "bakery", chi: "麵包店", eg: "The smell of fresh bread came from the bakery." },
            { eng: "clock", chi: "時鐘", eg: "The clock on the wall says 10 o'clock." },
            { eng: "doctor", chi: "醫生", eg: "The doctor examined the patient." },
            { eng: "egg", chi: "雞蛋", eg: "I eat a boiled egg for breakfast." },
            { eng: "forest", chi: "森林", eg: "There are many trees in the forest." },
            { eng: "garden", chi: "花園", eg: "She is watering flowers in the garden." },
            { eng: "hospital", chi: "醫院", eg: "He was taken to the hospital." },
            { eng: "island", chi: "島嶼", eg: "They went to a tropical island for vacation." },
            { eng: "jacket", chi: "夾克", eg: "Put on your jacket; it's cold outside." },
            { eng: "kangaroo", chi: "袋鼠", eg: "Kangaroos live in Australia." },
            { eng: "library", chi: "圖書館", eg: "I borrowed a book from the library." },
            { eng: "mountain", chi: "山", eg: "We climbed a high mountain last week." },
            { eng: "nurse", chi: "護士", eg: "The nurse is taking care of the sick child." }
        ];

        const monsters = [
            { name: "哥布林", hp: 30, maxHp: 30, img: "https://i.imgur.com/rP6r7jN.png" },
            { name: "史萊姆", hp: 50, maxHp: 50, img: "https://i.imgur.com/fLzFfV8.png" },
            { name: "骷髏兵", hp: 80, maxHp: 80, img: "https://i.imgur.com/vHqY7Kj.png" },
            { name: "惡魔領主", hp: 120, maxHp: 120, img: "https://i.imgur.com/v0XlshW.png" }
        ];

        function App() {
            const [showSplash, setShowSplash] = useState(true);
            const [view, setView] = useState('menu'); 
            const [words, setWords] = useState(() => {
                const saved = localStorage.getItem('vocab_list');
                return saved ? JSON.parse(saved) : defaultWords;
            });
            const [currentWordIndex, setCurrentWordIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [quizOptions, setQuizOptions] = useState([]);
            const [showAnswer, setShowAnswer] = useState(false);
            const [message, setMessage] = useState("");
            const [mode, setMode] = useState('all'); 
            const [isCorrect, setIsCorrect] = useState(null);

            const [curLevel, setCurLevel] = useState(0);
            const [curMonster, setCurMonster] = useState({...monsters[0]});
            const [playerHurt, setPlayerHurt] = useState(false);
            const [monsterHurt, setMonsterHurt] = useState(false);
            const [screenHurtFlash, setScreenHurtFlash] = useState(false);
            const [combo, setCombo] = useState(0);
            
            const [timeLeft, setTimeLeft] = useState(5);
            const [timerActive, setTimerActive] = useState(false);
            const timerRef = useRef(null);

            const [showImportModal, setShowImportModal] = useState(false);
            const [csvInput, setCsvInput] = useState("");

            useEffect(() => {
                localStorage.setItem('vocab_list', JSON.stringify(words));
            }, [words]);

            useEffect(() => {
                if (timerActive && timeLeft > 0) {
                    timerRef.current = setTimeout(() => setTimeLeft(prev => +(prev - 0.1).toFixed(1)), 100);
                } else if (timerActive && timeLeft <= 0) {
                    handleTimeOut();
                }
                return () => clearTimeout(timerRef.current);
            }, [timeLeft, timerActive]);

            function handleTimeOut() {
                setTimerActive(false);
                setCombo(0);
                setScreenHurtFlash(true);
                setTimeout(() => setScreenHurtFlash(false), 500);
                setPlayerHurt(true);
                setTimeout(() => setPlayerHurt(false), 400);
                setMessage("時間到！你受到了攻擊！");
                
                const nextIdx = Math.floor(Math.random() * words.length);
                setCurrentWordIndex(nextIdx);
                generateOptions(nextIdx);
                setTimeLeft(5);
                setTimerActive(true);
            }

            function playSound(text) {
                const synth = window.speechSynthesis;
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'en-US';
                synth.speak(utter);
            }

            function shuffle(array) {
                return array.sort(() => Math.random() - 0.5);
            }

            function generateOptions(correctIdx) {
                const correct = words[correctIdx];
                let opts = [correct];
                while(opts.length < 4 && opts.length < words.length) {
                    const rand = words[Math.floor(Math.random() * words.length)];
                    if(!opts.find(o => o.eng === rand.eng)) opts.push(rand);
                }
                setQuizOptions(shuffle(opts));
            }

            function startQuiz() {
                setView('quiz');
                const startIdx = Math.floor(Math.random() * words.length);
                setCurrentWordIndex(startIdx);
                generateOptions(startIdx);
                setScore(0);
                setCurLevel(0);
                setCurMonster({...monsters[0]});
                setCombo(0);
                setTimeLeft(5);
                setTimerActive(true);
            }

            function handleOptionClick(selected) {
                setTimerActive(false);
                const correct = words[currentWordIndex];
                
                if (selected.eng === correct.eng) {
                    setScore(score + 10);
                    setCombo(combo + 1);
                    setMonsterHurt(true);
                    setTimeout(() => setMonsterHurt(false), 500);
                    setMessage("答對了！造成傷害！");

                    const dmg = 10 + (combo * 2);
                    let newHp = curMonster.hp - dmg;
                    
                    if(newHp <= 0) {
                        setTimerActive(false);
                        setMessage(`你擊敗了 ${curMonster.name}！`);
                        setTimeout(() => {
                            const nextLv = curLevel + 1;
                            if(nextLv < monsters.length) {
                                setCurLevel(nextLv);
                                setCurMonster({...monsters[nextLv]});
                                setMessage(`進入第 ${nextLv+1} 關！`);
                                nextQuestion();
                            } else {
                                setView('boss-win');
                            }
                        }, 1000);
                    } else {
                        setCurMonster({...curMonster, hp: newHp});
                        setTimeout(nextQuestion, 600);
                    }
                } else {
                    setCombo(0);
                    setScreenHurtFlash(true);
                    setTimeout(() => setScreenHurtFlash(false), 500);
                    setPlayerHurt(true);
                    setTimeout(() => setPlayerHurt(false), 400);
                    setMessage(`答錯了！正確是: ${correct.chi}`);
                    setTimeout(nextQuestion, 1000);
                }
            }

            function nextQuestion() {
                const nextIdx = Math.floor(Math.random() * words.length);
                setCurrentWordIndex(nextIdx);
                generateOptions(nextIdx);
                setMessage("");
                setTimeLeft(5);
                setTimerActive(true);
            }

            function startChestMode() {
                setView('chest');
                const startIdx = Math.floor(Math.random() * words.length);
                setCurrentWordIndex(startIdx);
                generateOptions(startIdx);
                setScore(0);
                setCurLevel(0);
                setCombo(0);
                setTimeLeft(5);
                setTimerActive(true);
            }

            function handleChestOption(selected) {
                setTimerActive(false);
                const correct = words[currentWordIndex];
                
                if (selected.eng === correct.eng) {
                    setScore(score + 10);
                    setCombo(combo + 1);
                    
                    const nextLv = curLevel + 1;
                    if(nextLv >= 4) {
                        setTimerActive(false);
                        // 最後一關直接跳轉，什麼也不彈出
                        setView('chest-win');
                    } else {
                        setMessage("答對了！成功解鎖一層寶箱！");
                        setCurLevel(nextLv);
                        setTimeout(() => {
                            const nextIdx = Math.floor(Math.random() * words.length);
                            setCurrentWordIndex(nextIdx);
                            generateOptions(nextIdx);
                            setMessage("");
                            setTimeLeft(5);
                            setTimerActive(true);
                        }, 600);
                    }
                } else {
                    setCombo(0);
                    setScreenHurtFlash(true);
                    setTimeout(() => setScreenHurtFlash(false), 500);
                    setMessage(`答錯了！寶箱重置了！正確是: ${correct.chi}`);
                    setCurLevel(0);
                    setTimeout(() => {
                        const nextIdx = Math.floor(Math.random() * words.length);
                        setCurrentWordIndex(nextIdx);
                        generateOptions(nextIdx);
                        setMessage("");
                        setTimeLeft(5);
                        setTimerActive(true);
                    }, 1000);
                }
            }

            function handleImport() {
                const lines = csvInput.trim().split('\n');
                const newWords = [];
                lines.forEach(line => {
                    const [eng, chi, eg] = line.split(',');
                    if (eng && chi) {
                        newWords.push({ eng: eng.trim(), chi: chi.trim(), eg: eg ? eg.trim() : `This is a ${eng.trim()}.` });
                    }
                });
                
                if (newWords.length > 0) {
                    setWords(newWords);
                    alert(`成功匯入 ${newWords.length} 個單字！`);
                    setShowImportModal(false);
                    setCsvInput("");
                } else {
                    alert("格式不正確，請確保每行至少有英文和中文，並用逗號隔開。");
                }
            }

            function handleExport() {
                const csvContent = words.map(w => `${w.eng},${w.chi},${w.eg}`).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "vocab_list.csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            if (showSplash) {
                return (
                    <div className="splash-screen">
                        <img src="https://i.imgur.com/rW7V9Vz.jpeg" className="splash-img" alt="splash" />
                        <div className="enter-btn-container">
                            <button className="btn-rpg" onClick={() => setShowSplash(false)}>Enter Game</button>
                        </div>
                    </div>
                );
            }

            if (view === 'menu') {
                return (
                    <>
                        <div className="global-bg"></div>
                        <div className="container">
                            <h1 style={{textAlign: 'center', color: '#fff', textShadow: '2px 2px #000'}}>Vocab Dungeon</h1>
                            <div className="card">
                                <p style={{fontWeight:'bold'}}>目前庫存單字量: {words.length}</p>
                                <button className="btn btn-primary" onClick={startQuiz}>⚔️ 進入地牢 ⚔️</button>
                                <button className="btn btn-outline" style={{background: '#ffeaa7', color: '#2d3436', border: 'none'}} onClick={startChestMode}>🔑 盜賊寶箱模式 🔑</button>
                                <button className="btn btn-outline" onClick={() => setView('learn')}>📖 瀏覽/管理單字庫</button>
                                <button className="btn btn-outline" style={{borderColor: '#27ae60', color: '#27ae60'}} onClick={() => setShowImportModal(true)}>📥 匯入單字 (CSV)</button>
                                <button className="btn btn-outline" style={{borderColor: '#e67e22', color: '#e67e22'}} onClick={handleExport}>📤 匯出單字 (CSV)</button>
                            </div>

                            {showImportModal && (
                                <div className="modal-overlay">
                                    <div className="modal-content">
                                        <h3>📥 匯入單字庫</h3>
                                        <p>請輸入 CSV 格式內容 (英文,中文,例句)</p>
                                        <textarea 
                                            rows="5" 
                                            placeholder="apple,蘋果,I eat an apple.&#10;banana,香蕉,He likes bananas." 
                                            value={csvInput}
                                            onChange={(e) => setCsvInput(e.target.value)}
                                        />
                                        <div style={{display:'flex', gap:'10px'}}>
                                            <button className="btn btn-primary btn-small" onClick={handleImport}>確認匯入</button>
                                            <button className="btn btn-outline btn-small" style={{borderColor:'#aaa', color:'#444'}} onClick={() => {setShowImportModal(false); setCsvInput("");}}>取消</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div style={{textAlign: 'center', marginTop: 'auto'}}>
                                <p style={{color: '#fff', textShadow: '1px 1px #000'}}>Game Version 11.1</p>
                            </div>
                        </div>
                    </>
                );
            }

            if (view === 'learn') {
                const current = words[currentWordIndex];
                return (
                    <>
                        <div className="global-bg"></div>
                        <div className="container">
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <button className="btn btn-small" onClick={() => setView('menu')} style={{maxWidth: '80px'}}>返回</button>
                                <h3 style={{color: '#fff', textShadow: '1px 1px #000'}}>單字瀏覽 ({currentWordIndex + 1}/{words.length})</h3>
                            </div>
                            
                            <div className="card">
                                <div style={{position: 'absolute', top: '15px', right: '15px'}}>
                                    <button className="speaker-btn" onClick={() => playSound(current.eng)}>🔊</button>
                                </div>
                                <div className="card-eng">{current.eng}</div>
                                {showAnswer ? (
                                    <>
                                        <div className="card-chi">{current.chi}</div>
                                        <div className="example-box">
                                            <b>例句:</b><br/>{current.eg}
                                        </div>
                                    </>
                                ) : (
                                    <div style={{marginTop: '20px', color: '#aaa', fontStyle: 'italic'}}>點擊"顯示中文"看答案</div>
                                )}
                            </div>

                            <button className="btn btn-primary" onClick={() => setShowAnswer(!showAnswer)}>
                                {showAnswer ? "隱藏中文" : "顯示中文"}
                            </button>

                            <div style={{display: 'flex', gap: '10px'}}>
                                <button className="btn btn-outline btn-small" onClick={() => {
                                    setCurrentWordIndex((currentWordIndex - 1 + words.length) % words.length);
                                    setShowAnswer(false);
                                }}>◀ 上一個</button>
                                <button className="btn btn-outline btn-small" onClick={() => {
                                    setCurrentWordIndex((currentWordIndex + 1) % words.length);
                                    setShowAnswer(false);
                                }}>下一個 ▶</button>
                            </div>

                            <div style={{marginTop: '20px', background: 'rgba(255,255,255,0.9)', padding: '15px', borderRadius: '15px'}}>
                                <h4 style={{marginTop: 0}}>➕ 新增單字</h4>
                                <input type="text" placeholder="英文" id="new-eng" />
                                <input type="text" placeholder="中文" id="new-chi" />
                                <textarea placeholder="例句" id="new-eg" rows="2"></textarea>
                                <button className="btn btn-primary" onClick={() => {
                                    const eng = document.getElementById('new-eng').value.trim();
                                    const chi = document.getElementById('new-chi').value.trim();
                                    const eg = document.getElementById('new-eg').value.trim();
                                    if(eng && chi) {
                                        setWords([...words, {eng, chi, eg: eg || `This is a ${eng}.`}]);
                                        document.getElementById('new-eng').value = '';
                                        document.getElementById('new-chi').value = '';
                                        document.getElementById('new-eg').value = '';
                                        alert("成功新增！");
                                    } else {
                                        alert("請輸入英文和中文");
                                    }
                                }}>確認新增</button>
                            </div>
                        </div>
                    </>
                );
            }

            if (view === 'quiz') {
                const current = words[currentWordIndex];
                return (
                    <>
                        <div className="dungeon-bg"></div>
                        <div className={`hurt-flash ${screenHurtFlash ? 'anim-flash' : ''}`}></div>
                        <div className="container">
                            <div className="battle-scene">
                                <div style={{position: 'absolute', top: 10, left: 10, background: 'rgba(0,0,0,0.6)', color: '#fff', padding: '5px 10px', borderRadius: '5px'}}>
                                    分數: {score}
                                </div>
                                <div style={{position: 'absolute', top: 40, left: 10, background: 'rgba(0,0,0,0.6)', color: '#ffeaa7', padding: '5px 10px', borderRadius: '5px'}}>
                                    關卡: {curLevel + 1} / 4
                                </div>
                                
                                {combo > 1 && <div className="combo-text" key={combo}>{combo} COMBO!</div>}

                                <div className="monster-box">
                                    <div style={{color: '#fff', textShadow: '2px 2px #000', fontWeight: 'bold'}}>{curMonster.name}</div>
                                    <div style={{background: '#2d3436', width: '100px', height: '10px', borderRadius: '5px', overflow: 'hidden', margin: '5px auto'}}>
                                        <div style={{background: 'var(--danger)', width: `${(curMonster.hp / curMonster.maxHp) * 100}%`, height: '100%'}}></div>
                                    </div>
                                    <div style={{color: '#fff', fontSize: '0.8rem'}}>{curMonster.hp}/{curMonster.maxHp} HP</div>
                                    <img src={curMonster.img} className={`monster-img ${monsterHurt ? 'anim-hurt-combined' : ''}`} alt="monster" />
                                </div>

                                <div className="player-box">
                                    <img src="https://i.imgur.com/GisLhB0.png" className={`player-img ${playerHurt ? 'anim-hurt' : ''}`} alt="player" />
                                </div>
                            </div>

                            <div className="card" style={{minHeight: '120px', padding: '15px', position: 'relative'}}>
                                <div className="timer-line" style={{width: `${(timeLeft / 5) * 100}%`}}></div>
                                <div style={{display: 'flex', alignItems: 'center', gap: '15px'}}>
                                    <button className="speaker-btn" onClick={() => playSound(current.eng)}>🔊</button>
                                    <div>
                                        <div className="card-eng" style={{fontSize: '1.8rem'}}>{current.eng}</div>
                                        {message && <div style={{color: 'var(--danger)', fontWeight: 'bold', marginTop: '5px'}}>{message}</div>}
                                    </div>
                                </div>
                            </div>

                            <div className="quiz-grid">
                                {quizOptions.map((opt, i) => (
                                    <button key={i} className="btn" style={{margin: '0'}} onClick={() => handleOptionClick(opt)}>
                                        {opt.chi}
                                    </button>
                                ))}
                            </div>

                            <button className="btn btn-outline" style={{marginTop: 'auto'}} onClick={() => { setTimerActive(false); setView('menu'); }}>逃跑</button>
                        </div>
                    </>
                );
            }

            if (view === 'chest') {
                const current = words[currentWordIndex];
                const isLastLevel = curLevel >= 3;

                return (
                    <>
                        <div className="dungeon-bg"></div>
                        <div className={`hurt-flash ${screenHurtFlash ? 'anim-flash' : ''}`}></div>
                        <div className="container">
                            <div className="battle-scene" style={{height: '240px', background: 'transparent'}}>
                                <div style={{position: 'absolute', top: 10, left: 10, background: 'rgba(0,0,0,0.6)', color: '#fff', padding: '5px 10px', borderRadius: '5px'}}>
                                    成功層數: {curLevel} / 4
                                </div>
                                
                                {combo > 1 && <div className="combo-text" key={combo} style={{top: '40px'}}>{combo} 連對!</div>}

                                {!isLastLevel && (
                                    <div style={{position: 'absolute', top: '50px', left: '50%', transform: 'translateX(-50%)', textAlign: 'center'}}>
                                        <img src="https://i.imgur.com/sAsVc32.png" style={{width: '120px', height: 'auto', image-rendering: 'pixelated'}} alt="chest" />
                                        <div style={{color: '#fff', textShadow: '2px 2px #000', fontWeight: 'bold', marginTop: '10px'}}>
                                            神秘寶箱 (Lv.{curLevel + 1})
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="card" style={{minHeight: '120px', padding: '15px', position: 'relative'}}>
                                <div className="timer-line" style={{width: `${(timeLeft / 5) * 100}%`}}></div>
                                <div style={{display: 'flex', alignItems: 'center', gap: '15px'}}>
                                    <button className="speaker-btn" onClick={() => playSound(current.eng)}>🔊</button>
                                    <div>
                                        <div className="card-eng" style={{fontSize: '1.8rem'}}>{current.eng}</div>
                                        {message && <div style={{color: 'var(--danger)', fontWeight: 'bold', marginTop: '5px'}}>{message}</div>}
                                    </div>
                                </div>
                            </div>

                            <div className="quiz-grid">
                                {quizOptions.map((opt, i) => (
                                    <button key={i} className="btn" style={{margin: '0'}} onClick={() => handleChestOption(opt)}>
                                        {opt.chi}
                                    </button>
                                ))}
                            </div>

                            <button className="btn btn-outline" style={{marginTop: 'auto'}} onClick={() => { setTimerActive(false); setView('menu'); }}>放棄並離開</button>
                        </div>
                    </>
                );
            }

            if (view === 'boss-win') {
                return (
                    <>
                        <div className="global-bg"></div>
                        <div className="container" style={{justifyContent: 'center', alignItems: 'center'}}>
                            <div className="card" style={{width: '100%', boxSizing: 'border-box'}}>
                                <h1 style={{color: 'var(--success)', marginBottom: '5px'}}>恭喜通關！🎉</h1>
                                <p style={{color: '#ff9f43', fontWeight: 'bold', fontSize: '1.2rem', marginTop: '0'}}>你擊敗了所有惡魔，保護了單字庫！</p>
                                <div style={{fontSize: '1.2rem', margin: '20px 0'}}>
                                    最終獲得分數: <span style={{fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)'}}>{score}</span>
                                </div>
                                <p style={{color: var(--gray)}}>看來你的英文能力已經足夠探索更深的地下城了！</p>
                                <button className="btn btn-primary" onClick={() => setView('menu')}>返回主選單</button>
                            </div>
                        </div>
                    </>
                );
            }

            if (view === 'chest-win') {
                return (
                    <>
                        <div className="global-bg"></div>
                        <div className="container" style={{justifyContent: 'center', alignItems: 'center'}}>
                            <div className="card" style={{width: '100%', boxSizing: 'border-box'}}>
                                <h1 style={{color: '#ff9f43', marginBottom: '5px'}}>解鎖成功！💎</h1>
                                <p style={{color: 'var(--success)', fontWeight: 'bold', fontSize: '1.2rem', marginTop: '0'}}>你連續答對，成功打開了終極寶箱！</p>
                                <img src="https://i.imgur.com/sAsVc32.png" style={{width: '100px', height: 'auto', margin: '15px 0'}} alt="opened chest" />
                                <div style={{fontSize: '1.2rem', margin: '10px 0'}}>
                                    獲得單字積分: <span style={{fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)'}}>{score}</span>
                                </div>
                                <p style={{color: var(--gray)}}>神偷的技巧就是如此行雲流水！</p>
                                <button className="btn btn-primary" onClick={() => setView('menu')}>返回主選單</button>
                            </div>
                        </div>
                    </>
                );
            }

            return null;
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
