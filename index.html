<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v11.2 - Fixed</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { 
            --bg: #f4f7f6;
            --primary: #0984e3; 
            --text: #2d3436; 
            --danger: #d63031; 
            --success: #27ae60; 
            --gray: #636e72;
        }
        body { 
            background: var(--bg); 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            color: var(--text);
            overflow-x: hidden; 
        }
        .container { 
            width: 100%; 
            max-width: 480px; 
            min-height: 100vh;
            margin: 0 auto; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 1;
        }
        .global-bg { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url("https://i.imgur.com/SwmBCNA.jpeg"); 
            background-size: cover; 
            background-position: center; 
            z-index: 0;
        }
        .dungeon-bg { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://i.imgur.com/6FeeRyP.jpeg"); 
            background-size: cover; 
            background-position: center; 
            z-index: 0; 
        }
        .splash-screen { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .splash-img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            position: absolute; 
            top: 0; left: 0; 
        }
        .enter-btn-container { 
            position: absolute; 
            bottom: 15%; 
            width: 100%; 
            display: flex;
            justify-content: center; 
        }
        .btn-rpg { 
            background: #2d3436; 
            color: #fff; 
            border: 4px solid #fff;
            padding: 12px 40px; 
            font-size: 1.5rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            box-shadow: 0 0 0 4px #2d3436;
            transition: 0.1s; 
        }
        .btn-rpg:active { 
            transform: scale(0.9); 
            background: #636e72;
        }
        .btn { 
            background: #fff; 
            border: 1px solid #ddd; 
            padding: 14px;
            margin: 8px 0; 
            cursor: pointer; 
            font-size: 1rem; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: 600; 
            box-sizing: border-box; 
            transition: 0.2s; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { 
            transform: scale(0.96); 
            background: #f0f0f0;
        }
        .btn-primary { 
            background: var(--primary); 
            color: white; 
            border: none;
            box-shadow: 0 4px 12px rgba(9,132,227,0.2); 
        }
        .btn-outline { 
            color: var(--primary);
            border: 2px solid var(--primary); 
            background: rgba(255,255,255,0.8); 
        }
        .btn-small { 
            padding: 8px; 
            font-size: 0.85rem;
            margin: 5px 2px; 
            flex: 1; 
        }
        .speaker-btn { 
            background: #e1f0ff; 
            border: none;
            border-radius: 50%; 
            width: 44px; 
            height: 44px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.2rem;
        }
        .card { 
            background: rgba(255,255,255,0.95); 
            border-radius: 24px; 
            padding: 25px; 
            margin: 10px 0;
            min-height: 260px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            text-align: center; 
            position: relative;
            border: 1px solid #eee; 
        }
        .card-eng { font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        .card-chi { font-size: 1.8rem; font-weight: bold; color: #444; }
        .example-box { 
            margin-top: 15px; padding: 12px; background: #f9f9f9; border-radius: 10px;
            border-left: 4px solid var(--primary); text-align: left; font-style: italic; font-size: 0.95rem; width: 100%; box-sizing: border-box;
        }
        .battle-scene { 
            position: relative;
            width: 100%; height: 240px; margin: 10px 0; overflow: visible; 
            background: rgba(255, 255, 255, 0.5); border-radius: 15px;
        }
        .monster-box { position: absolute; top: 10px; right: 40px; text-align: center; z-index: 1; }
        .monster-img { width: 90px; height: auto; image-rendering: pixelated; transition: 0.3s; }
        .player-box { position: absolute; bottom: -10px; left: -20px; z-index: 2; }
        .player-img { width: 270px; height: auto; transition: 0.3s; }
        
        @keyframes hit-shake { 
            0% { transform: translateX(0); } 
            20% { transform: translateX(-15px) scale(1.1); filter: brightness(2); } 
            100% { transform: scale(0); opacity: 0; } 
        }
        .anim-hit { animation: hit-shake 0.5s forwards; }
        
        @keyframes hurt-red { 
            0% { filter: brightness(1); } 
            50% { filter: brightness(1.2) sepia(1) saturate(8); transform: translateY(10px); } 
            100% { filter: brightness(1); } 
        }
        .anim-hurt { animation: hurt-red 0.4s; }
        
        @keyframes hurt-red-filter { 
            0% { filter: brightness(1); } 
            50% { filter: brightness(1.2) sepia(1) saturate(8); } 
            100% { filter: brightness(1); } 
        }
        @keyframes hurt-vibrate { 
            0% { transform: translate(0, 0); } 
            10% { transform: translate(-4px, -2px); } 
            20% { transform: translate(3px, 2px); } 
            30% { transform: translate(-4px, 1px); } 
            40% { transform: translate(3px, -1px); } 
            50% { transform: translate(-2px, 2px); } 
            60% { transform: translate(2px, 1px); } 
            70% { transform: translate(-3px, -1px); } 
            80% { transform: translate(3px, 2px); } 
            90% { transform: translate(-1px, -2px); } 
            100% { transform: translate(0, 0); } 
        }
        .anim-hurt-combined { animation: hurt-vibrate 0.4s, hurt-red-filter 0.4s; }

        .timer-line { 
            position: absolute; top: -10px; left: 0; height: 6px; background: var(--danger);
            transition: width 0.1s linear; 
        }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input, textarea { 
            width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; 
            margin-bottom: 10px; box-sizing: border-box; font-size: 1rem;
        }
        .footer-img { width: 100%; height: auto; margin-top: 20px; border-radius: 15px; }

        /* 受傷畫面邊緣紅框 */
        .hurt-flash { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            box-shadow: inset 0 0 50px rgba(214, 48, 49, 0.8); pointer-events: none;
            z-index: 999; opacity: 0; 
        }
        .anim-flash { animation: flash-fade 0.5s ease; }
        @keyframes flash-fade { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

        /* Combo 動畫 */
        .combo-text { 
            position: absolute; left: 20px; top: 30px; font-size: 1.8rem; font-weight: bold; 
            color: #ff7675; text-shadow: 2px 2px #2d3436; z-index: 10;
            animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

        /* 寶箱彈窗與圖片比例控制 */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 20px; text-align: center; 
            width: 80%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
        .chest-img { 
            max-width: 100px; /* 限制最大寬度，依需要縮小 */
            height: auto;      /* 高度自動，維持原圖比例 */
            cursor: pointer; 
            transition: 0.2s; 
            object-fit: contain; /* 確保內容不會溢出或拉伸 */
            display: block;
            margin: 0 auto 15px auto;
        }
        .chest-img:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const monsterImages = [
            "https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png",
            "https://i.imgur.com/ToQhBZL.png", "https://i.imgur.com/72Hr4rn.png", "https://i.imgur.com/3jsF7It.png",
            "https://i.imgur.com/4TfXx0t.png", "https://i.imgur.com/bI7Y6tX.png"
        ];
        const bossImages = ["https://i.imgur.com/LNZ46Uc.png", "https://i.imgur.com/ArFodUT.png"];
        const monsterHurtImages = [...monsterImages];
        const bossHurtImages = [...bossImages];

        const playerImgDefault = "https://i.imgur.com/PBcBCFv.png";
        const playerImgHurt = "https://i.imgur.com/PBcBCFv.png"; 
        const splashImg = "https://i.imgur.com/8MUpGMJ.jpeg";

        const initialWords = [
            {eng:"apple", chi:"蘋果", example:"An apple a day keeps the doctor away."},
            {eng:"book", chi:"書", example:"I like to read a book before bed."},
            {eng:"cat", chi:"貓", example:"The cat is sleeping on the sofa."},
            {eng:"dog", chi:"狗", example:"My dog loves to play with a ball."},
            {eng:"egg", chi:"蛋", example:"I had a boiled egg for breakfast."},
            {eng:"fish", chi:"魚", example:"There are many colorful fish in the sea."},
            {eng:"girl", chi:"女孩", example:"The little girl is wearing a red dress."},
            {eng:"house", chi:"房子", example:"We live in a big white house."},
            {eng:"ice", chi:"冰", example:"Put some ice in my drink, please."},
            {eng:"jump", chi:"跳", example:"The kids like to jump on the bed."},
            {eng:"kite", chi:"風箏", example:"The wind is perfect for flying a kite."},
            {eng:"lion", chi:"獅子", example:"The lion is the king of the jungle."},
            {eng:"moon", chi:"月亮", example:"The moon shines brightly at night."},
            {eng:"nest", chi:"鳥巢", example:"The bird built a nest in the tree."},
            {eng:"orange", chi:"橙子", example:"This orange is very sweet and juicy."},
            {eng:"pen", chi:"筆", example:"Can I borrow your pen for a moment?"},
            {eng:"queen", chi:"女王", example:"The queen lives in a beautiful palace."},
            {eng:"river", chi:"河流", example:"We went fishing by the river."},
            {eng:"sun", chi:"太陽", example:"The sun rises in the east."},
            {eng:"tree", chi:"樹", example:"The apple tree is full of fruit."},
            {eng:"umbrella", chi:"雨傘", example:"Don't forget your umbrella, it's raining."},
            {eng:"violin", chi:"小提琴", example:"She plays the violin very well."},
            {eng:"water", chi:"水", example:"We should drink plenty of water."},
            {eng:"xylophone", chi:"木琴", example:"The child is learning to play the xylophone."},
            {eng:"yellow", chi:"黃色", example:"The sunflower is bright yellow."},
            {eng:"zoo", chi:"動物園", example:"We saw many animals at the zoo."},
            {eng:"ball", chi:"球", example:"Throw the ball to me!"},
            {eng:"cake", chi:"蛋糕", example:"She baked a chocolate cake for my birthday."},
            {eng:"door", chi:"門", example:"Please close the door behind you."},
            {eng:"elephant", chi:"大象", example:"The elephant has a very long trunk."},
            {eng:"flower", chi:"花", example:"This flower smells wonderful."},
            {eng:"garden", chi:"花園", example:"My grandmother grows roses in her garden."},
            {eng:"hat", chi:"帽子", example:"Take off your hat inside the house."},
            {eng:"island", chi:"島", example:"They spent their holiday on a tropical island."},
            {eng:"juice", chi:"果汁", example:"Would you like some orange juice?"},
            {eng:"king", chi:"國王", example:"The king ruled the country for many years."},
            {eng:"lamp", chi:"燈", example:"Turn on the lamp, it's getting dark."},
            {eng:"milk", chi:"牛奶", example:"A glass of warm milk helps me sleep."},
            {eng:"night", chi:"夜晚", example:"The stars are beautiful tonight."},
            {eng:"ocean", chi:"海洋", example:"The ocean is vast and deep."}
        ].map((w, i) => ({ ...w, id: Date.now() + i }));

        const App = () => {
            const [view, setView] = useState('splash');
            const [wordBank, setWordBank] = useState([]);
            const [studyList, setStudyList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(10);
            const [mode, setMode] = useState('');
            const [bossIn, setBossIn] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const [monsterAnim, setMonsterAnim] = useState("");
            const [mImg, setMImg] = useState(monsterImages[0]);
            
            const [currentPlayerImg, setCurrentPlayerImg] = useState(playerImgDefault);
            const [playerAnim, setPlayerAnim] = useState("");
            const [currentMonsterImg, setCurrentMonsterImg] = useState(monsterImages[0]);
            const [monsterHurtAnim, setMonsterHurtAnim] = useState("");
            const [isBossCurrent, setIsBossCurrent] = useState(false);

            const timerRef = useRef(null);
            const fileInputRef = useRef(null);
            const [newEng, setNewEng] = useState("");
            const [newChi, setNewChi] = useState("");
            const [newExample, setNewExample] = useState("");
            
            // 地下城強化功能狀態
            const [wrongWords, setWrongWords] = useState([]);
            const [combo, setCombo] = useState(0);
            const [isHurtFlash, setIsHurtFlash] = useState(false);
            const [showChest, setShowChest] = useState(false);
            const [chestStatus, setChestStatus] = useState('closed');
            const [chestReward, setChestReward] = useState('');
            const [extraTime, setExtraTime] = useState(0);
            const [killedWords, setKilledWords] = useState([]);
            const [missedWords, setMissedWords] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('vocab_v10_final_v2');
                const savedWrongs = localStorage.getItem('vocab_wrongs');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setWordBank(parsed.length > 0 ? parsed : initialWords);
                    } catch (e) { setWordBank(initialWords); }
                } else { setWordBank(initialWords); }
                
                if (savedWrongs) {
                    try { setWrongWords(JSON.parse(savedWrongs)); } catch(e) { setWrongWords([]); }
                }
            }, []);

            useEffect(() => {
                if (wordBank.length > 0) {
                    localStorage.setItem('vocab_v10_final_v2', JSON.stringify(wordBank));
                }
            }, [wordBank]);

            useEffect(() => {
                localStorage.setItem('vocab_wrongs', JSON.stringify(wrongWords));
            }, [wrongWords]);

            const speak = (text) => {
                if(!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                window.speechSynthesis.speak(u);
            };

            const shuffle = (a) => [...a].sort(() => Math.random() - 0.5);

            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,英文,中文,例句\n" 
                    + wordBank.map(w => `"${w.eng}","${w.chi}","${w.example || ''}"`).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "my_vocab_list.csv");
                document.body.appendChild(link);
                link.click();
            };

            const importCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const lines = text.split("\n").slice(1);
                    const newWords = lines.map((line, i) => {
                        const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        if (parts.length < 2) return null;
                        return {
                            eng: parts[0].replace(/"/g, '').trim(),
                            chi: parts[1].replace(/"/g, '').trim(),
                            example: parts[2] ? parts[2].replace(/"/g, '').trim() : "",
                            id: Date.now() + i
                        };
                    }).filter(x => x && x.eng);
                    if (newWords.length > 0) {
                        setWordBank([...newWords, ...wordBank]);
                        alert(`成功匯入 ${newWords.length} 個單字！`);
                    }
                };
                reader.readAsText(file);
            };

            const autoFetch = async () => {
                if(!newEng) return;
                try {
                    const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(newEng)}&langpair=en|zh-TW`);
                    const tData = await tRes.json();
                    setNewChi(tData.responseData.translatedText);
                    const dRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(newEng)}`);
                    const dData = await dRes.json();
                    if(Array.isArray(dData)) {
                        const ex = dData[0].meanings[0].definitions.find(d => d.example)?.example;
                        setNewExample(ex || "No example found.");
                    }
                } catch(e) { alert("抓取失敗"); }
            };

            const startNormal = (m) => {
                if(wordBank.length < 4) return alert("單字不足4個");
                const q = shuffle(wordBank);
                setCurrentWord(q[0]); setStudyList(q.slice(1));
                setIsFlipped(false); setFeedback("");
                
                if(m === 'quiz') {
                    const wrongPool = shuffle(wordBank.filter(x => x.eng !== q[0].eng)).slice(0, 3).map(x => x.eng);
                    setOptions(shuffle([q[0].eng, ...wrongPool]));
                }
                setView(m);
            };

            const startDungeon = (diff) => {
                if(wordBank.length < 4) return alert("單字不足4個");
                let mf = diff==='low'? 10 : diff==='mid'? 15 : 20;
                let list = [];
                const matchedWrongs = wrongWords.filter(w => wordBank.some(bankW => bankW.eng === w.eng));
                const shuffleWrongs = shuffle(matchedWrongs).slice(0, Math.floor(mf/2));
                
                list = [...shuffleWrongs];
                while(list.length < mf) {
                    const randomWords = shuffle(wordBank);
                    for(let rw of randomWords) {
                        if(list.length >= mf) break;
                        if(!list.some(l => l.eng === rw.eng)) list.push(rw);
                    }
                }
                list = shuffle(list);
                setMode(diff); setMaxFloor(mf); setHp(10); setFloor(1); setStudyList(list);
                setCombo(0); setExtraTime(0); setKilledWords([]); setMissedWords([]);
                setCurrentPlayerImg(playerImgDefault); setPlayerAnim("");
                
                loadDungeonLevel(1, list[0], diff, true);
                setView('dungeon');
            };

            const loadDungeonLevel = (f, word, m, shuffleOptions = true) => {
                if(!word) return;
                setCurrentWord(word); setBossIn(""); setFeedback(""); setMonsterAnim("");
                setMonsterHurtAnim(""); setCurrentPlayerImg(playerImgDefault); setPlayerAnim("");
                
                const isB = (m==='mid' && (f===7 || f===15)) ||
                (m==='high' && (f===5 || f===10 || f===15 || f===20));
                setIsBossCurrent(isB);

                const randomIndex = Math.floor(Math.random() * monsterImages.length);
                const randomBossIndex = Math.floor(Math.random() * bossImages.length);
                const currentImg = isB ? bossImages[randomBossIndex] : monsterImages[randomIndex];
                setMImg(currentImg); setCurrentMonsterImg(currentImg);
                if(!isB && shuffleOptions) {
                    const wrongPool = shuffle(wordBank.filter(x => x.eng !== word.eng)).slice(0, 3).map(x => x.eng);
                    setOptions(shuffle([word.eng, ...wrongPool]));
                }
                
                startTimer(m, isB);
            };

            const startTimer = (currentMode, isBoss) => {
                clearInterval(timerRef.current);
                setTimeLeft(100);
                
                let totalSeconds = 5; 
                if (isBoss && (currentMode === 'mid' || currentMode === 'high')) {
                    totalSeconds = 7;
                }
                
                totalSeconds += extraTime;
                setExtraTime(0); 
                
                const step = (100 / (totalSeconds * 10));
                timerRef.current = setInterval(() => {
                    setTimeLeft(p => { 
                        if(p <= 0) { 
                            clearInterval(timerRef.current);
                            triggerHurtEffects(true); 
                            return 0; 
                        } 
                        return p - step; 
                    });
                }, 100);
            };

            const triggerHurtEffects = (isTimeout = false) => {
                setCombo(0);
                setIsHurtFlash(true);
                setTimeout(() => setIsHurtFlash(false), 500);

                setWrongWords(prev => {
                    if (prev.some(x => x.eng === currentWord.eng)) return prev;
                    return [...prev, currentWord];
                });
                setMissedWords(prev => {
                    if (prev.some(x => x.eng === currentWord.eng)) return prev;
                    return [...prev, currentWord];
                });
                setHp(h => {
                    const newHp = h - 1;
                    if(newHp <= 0) {
                        setTimeout(() => setView('lose'), 600);
                    } else {
                        setTimeout(() => {
                            setPlayerAnim(""); setCurrentPlayerImg(playerImgDefault); setFeedback("");
                            startTimer(mode, isBossCurrent);
                        }, 800);
                    }
                    return newHp;
                });
                setFeedback(isTimeout ? "⌛ TIMEOUT!" : "💥 WRONG!");
                setCurrentPlayerImg(playerImgHurt); 
                setPlayerAnim("anim-hurt-combined"); 
                
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(300);
                }
            };

            const handleDungeonAns = (correct) => {
                clearInterval(timerRef.current
