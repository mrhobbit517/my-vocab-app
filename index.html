<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabCard v9.3 - Full Restoration</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #636e72; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; color: var(--text); }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(9,132,227,0.2); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: transparent; }

        /* 字庫列表 */
        .word-list-item { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .word-info { flex: 1; }
        .word-eng { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .word-chi { font-size: 0.9rem; color: var(--gray); margin-left: 8px; }

        /* 卡片與戰鬥 */
        .card { background: #fff; border-radius: 24px; padding: 25px; margin: 15px 0; min-height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; position: relative; cursor: pointer; border: 1px solid #eee; }
        .dungeon-header { background: #2d3436; color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .timer-line { position: absolute; top: 0; left: 0; height: 5px; background: var(--danger); transition: width 0.1s linear; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        
        input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialWords = [
            {eng:"apple", content:"【翻譯】: 蘋果"}, {eng:"book", content:"【翻譯】: 書"}, {eng:"cat", content:"【翻譯】: 貓"},
            {eng:"dog", content:"【翻譯】: 狗"}, {eng:"egg", content:"【翻譯】: 蛋"}, {eng:"fish", content:"【翻譯】: 魚"},
            {eng:"girl", content:"【翻譯】: 女孩"}, {eng:"house", content:"【翻譯】: 房子"}, {eng:"ice", content:"【翻譯】: 冰"},
            {eng:"jump", content:"【翻譯】: 跳"}, {eng:"kite", content:"【翻譯】: 風箏"}, {eng:"lion", content:"【翻譯】: 獅子"},
            {eng:"moon", content:"【翻譯】: 月亮"}, {eng:"nest", content:"【翻譯】: 鳥巢"}, {eng:"orange", content:"【翻譯】: 橙子"},
            {eng:"pen", content:"【翻譯】: 筆"}, {eng:"queen", content:"【翻譯】: 女王"}, {eng:"river", content:"【翻譯】: 河流"},
            {eng:"sun", content:"【翻譯】: 太陽"}, {eng:"tree", content:"【翻譯】: 樹"}, {eng:"umbrella", content:"【翻譯】: 雨傘"},
            {eng:"violin", content:"【翻譯】: 小提琴"}, {eng:"water", content:"【翻譯】: 水"}, {eng:"xylophone", content:"【翻譯】: 木琴"},
            {eng:"yellow", content:"【翻譯】: 黃色"}, {eng:"zoo", content:"【翻譯】: 動物園"}, {eng:"ball", content:"【翻譯】: 球"},
            {eng:"cake", content:"【翻譯】: 蛋糕"}, {eng:"door", content:"【翻譯】: 門"}, {eng:"elephant", content:"【翻譯】: 大象"},
            {eng:"flower", content:"【翻譯】: 花"}, {eng:"garden", content:"【翻譯】: 花園"}, {eng:"hat", content:"【翻譯】: 帽子"},
            {eng:"island", content:"【翻譯】: 島"}, {eng:"juice", content:"【翻譯】: 果汁"}, {eng:"king", content:"【翻譯】: 國王"},
            {eng:"lamp", content:"【翻譯】: 燈"}, {eng:"milk", content:"【翻譯】: 牛奶"}, {eng:"night", content:"【翻譯】: 夜晚"}
        ].map((w, i) => ({ ...w, id: Date.now() + i }));

        const App = () => {
            const [view, setView] = useState('home');
            const [wordBank, setWordBank] = useState(() => JSON.parse(localStorage.getItem('vocab_v9_3')) || initialWords);
            
            // 核心溫習與地下城狀態
            const [studyList, setStudyList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(20);
            const [mode, setMode] = useState('');
            const [bossIn, setBossIn] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const timerRef = useRef(null);

            // 新增單字狀態
            const [newEng, setNewEng] = useState("");
            const [newContent, setNewContent] = useState("");

            useEffect(() => { localStorage.setItem('vocab_v9_3', JSON.stringify(wordBank)); }, [wordBank]);

            const shuffle = (a) => [...a].sort(() => Math.random() - 0.5);

            // --- 自動翻譯功能 ---
            const autoFetch = async () => {
                if(!newEng) return alert("請輸入單字");
                try {
                    const [t, d] = await Promise.all([
                        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(newEng)}&langpair=en|zh-TW`),
                        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(newEng)}`)
                    ]);
                    const tJ = await t.json();
                    const dJ = await d.json();
                    let s = `【翻譯】: ${tJ.responseData.translatedText}\n\n`;
                    if(Array.isArray(dJ)) dJ[0].meanings.forEach(m => {
                        s += `[${m.partOfSpeech}] ${m.definitions[0].definition}\n`;
                    });
                    setNewContent(s.trim());
                } catch(e) { alert("API 連接失敗，請手動輸入"); }
            };

            // --- 模式啟動 ---
            const startNormal = (m) => {
                if(wordBank.length < 4) return alert("至少需要4個單字");
                const q = shuffle(wordBank);
                const first = q[0];
                setCurrentWord(first);
                setStudyList(q.slice(1));
                setIsFlipped(false);
                setFeedback("");
                if(m === 'quiz') setOptions(shuffle([first.eng, ...wordBank.filter(x=>x.eng!==first.eng).slice(0,3).map(x=>x.eng)]));
                setView(m);
            };

            const startDungeon = (diff) => {
                let mf = diff==='low'?20 : diff==='mid'?30 : 40;
                let list = []; while(list.length < mf) list = [...list, ...shuffle(wordBank)];
                list = list.slice(0, mf);
                setMode(diff); setMaxFloor(mf); setHp(10); setFloor(1);
                setStudyList(list); loadDungeonLevel(1, list[0], diff);
                setView('dungeon');
            };

            const loadDungeonLevel = (f, word, m) => {
                setCurrentWord(word); setBossIn(""); setFeedback("");
                const isBoss = (m==='mid' && (f===15 || f===30)) || (m==='high' && (f===20 || f===40));
                if(!isBoss) setOptions(shuffle([word.eng, ...wordBank.filter(x=>x.eng!==word.eng).slice(0,3).map(x=>x.eng)]));
                
                clearInterval(timerRef.current);
                if(m==='high') {
                    setTimeLeft(100);
                    timerRef.current = setInterval(() => {
                        setTimeLeft(p => { if(p <= 0) { handleDungeonAns(false); return 0; } return p-2; });
                    }, 100);
                }
            };

            const handleDungeonAns = (correct) => {
                clearInterval(timerRef.current);
                if(correct) {
                    setFeedback("⚔️ 擊敗成功！");
                    setTimeout(() => {
                        if(floor >= maxFloor) return setView('win');
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 600);
                } else {
                    setHp(h => h - 1); setFeedback("💥 受到攻擊！");
                    if(hp <= 1) setTimeout(() => setView('lose'), 600);
                    else setTimeout(() => {
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 800);
                }
            };

            // --- 視圖組件 ---
            if(view === 'home') return (
                <div className="container" style={{justifyContent:'center'}}>
                    <h1 style={{textAlign:'center', color:'var(--primary)'}}>VOCAB MASTER</h1>
                    <button className="btn btn-primary" onClick={()=>setView('menu')}>溫習模式 / 地下城</button>
                    <button className="btn" onClick={()=>setView('add')}>新增單字</button>
                    <button className="btn" onClick={()=>setView('list')}>我的字庫 ({wordBank.length})</button>
                </div>
            );

            if(view === 'menu') return (
                <div className="container">
                    <h2>選擇模式</h2>
                    <button className="btn btn-outline" onClick={()=>startNormal('card')}>生字卡模式</button>
                    <button className="btn btn-outline" onClick={()=>startNormal('quiz')}>選擇題模式</button>
                    <hr style={{margin:'20px 0', border:'none', borderTop:'1px solid #ddd'}}/>
                    <h3 style={{color:'var(--danger)'}}>🏰 地下城挑戰</h3>
                    <button className="btn" onClick={()=>startDungeon('low')}>初級 (20層)</button>
                    <button className="btn" onClick={()=>startDungeon('mid')}>中級 (30層 + Boss)</button>
                    <button className="btn" onClick={()=>startDungeon('high')}>高級 (40層 + 限時)</button>
                    <button className="btn" onClick={()=>setView('home')}>返回主頁</button>
                </div>
            );

            if(view === 'add') return (
                <div className="container">
                    <h2>新增單字</h2>
                    <input placeholder="英文單字" value={newEng} onChange={e=>setNewEng(e.target.value)} />
                    <button className="btn btn-outline" onClick={autoFetch}>✨ 自動抓取翻譯</button>
                    <textarea placeholder="意思內容..." rows="5" value={newContent} onChange={e=>setNewContent(e.target.value)} />
                    <button className="btn btn-primary" onClick={()=>{
                        if(!newEng || !newContent) return alert("請填寫內容");
                        setWordBank([{eng:newEng, content:newContent, id:Date.now()}, ...wordBank]);
                        setNewEng(""); setNewContent(""); alert("已儲存");
                    }}>💾 儲存</button>
                    <button className="btn" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            if(view === 'list') return (
                <div className="container">
                    <h2>我的字庫 ({wordBank.length})</h2>
                    {wordBank.map(w => (
                        <div key={w.id} className="word-list-item">
                            <div className="word-info">
                                <span className="word-eng">{w.eng}</span>
                                <span className="word-chi">- {w.content.split('\n')[0].replace('【翻譯】: ', '')}</span>
                            </div>
                            <button style={{color:'red', border:'none', background:'none', cursor:'pointer'}} onClick={()=>setWordBank(wordBank.filter(x=>x.id!==w.id))}>×</button>
                        </div>
                    ))}
                    <button className="btn btn-primary" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            if(view === 'card' || view === 'quiz') return (
                <div className="container">
                    <p style={{textAlign:'center'}}>剩餘: {studyList.length + 1}</p>
                    <div className="card" onClick={()=>{if(view==='card') setIsFlipped(!isFlipped)}}>
                        {!isFlipped ? (
                            <h2>{view==='card' ? currentWord?.eng : currentWord?.content.split('\n')[0].replace('【翻譯】: ', '')}</h2>
                        ) : (
                            <div style={{textAlign:'left'}}>{currentWord?.content.split('\n').map((l,i)=><div key={i}>{l}</div>)}</div>
                        )}
                    </div>
                    {view === 'quiz' && !isFlipped && (
                        <div className="quiz-grid">
                            {options.map(o => <button key={o} className="btn btn-outline" onClick={()=>{setFeedback(o===currentWord.eng?"✅ 正確":"❌ 錯誤"); setIsFlipped(true);}}>{o}</button>)}
                        </div>
                    )}
                    {feedback && <div style={{textAlign:'center', fontWeight:'bold', margin:'10px'}}>{feedback}</div>}
                    <button className="btn btn-primary" onClick={()=>{
                        if(studyList.length === 0) return setView('home');
                        const next = studyList[0];
                        setStudyList(studyList.slice(1)); setCurrentWord(next); setIsFlipped(false); setFeedback("");
                        if(view==='quiz') setOptions(shuffle([next.eng, ...wordBank.filter(x=>x.eng!==next.eng).slice(0,3).map(x=>x.eng)]));
                    }}>下一個</button>
                    <button className="btn" onClick={()=>setView('home')}>離開</button>
                </div>
            );

            if(view === 'dungeon') {
                const isB = (mode==='mid' && (floor===15 || floor===30)) || (mode==='high' && (floor===20 || floor===40));
                return (
                    <div className="container">
                        <div className="dungeon-header">
                            <div>{"❤️".repeat(hp)}{"🖤".repeat(10-hp)}</div>
                            <div style={{fontSize:'0.8rem'}}>B {floor} / {maxFloor}</div>
                        </div>
                        <div style={{fontSize:'3rem', textAlign:'center'}}>{isB ? "🐲" : "👾"}</div>
                        <div className="card" onClick={()=>{}}>
                            {mode==='high' && <div className="timer-line" style={{width:timeLeft+'%'}}></div>}
                            <h2>{currentWord?.content.split('\n')[0].replace('【翻譯】: ', '')}</h2>
                            {feedback && <div style={{color:'red', fontWeight:'bold'}}>{feedback}</div>}
                        </div>
                        {isB ? (
                            <div>
                                <input placeholder="拼寫單字打敗 Boss..." value={bossIn} onChange={e=>setBossIn(e.target.value)} autoFocus />
                                <button className="btn btn-primary" onClick={()=>handleDungeonAns(bossIn.toLowerCase().trim() === currentWord.eng.toLowerCase().trim())}>發動攻擊</button>
                            </div>
                        ) : (
                            <div className="quiz-grid">
                                {options.map(o => <button key={o} className="btn btn-outline" onClick={()=>handleDungeonAns(o === currentWord.eng)}>{o}</button>)}
                            </div>
                        )}
                        <button className="btn" onClick={()=>{clearInterval(timerRef.current); setView('home')}}>🏳️ 撤退</button>
                    </div>
                );
            }

            if(view === 'win' || view === 'lose') return (
                <div className="container" style={{justifyContent:'center', textAlign:'center'}}>
                    <h1>{view==='win' ? "🎉 挑戰成功！" : "💀 挑戰失敗"}</h1>
                    <button className="btn btn-primary" onClick={()=>setView('home')}>返回主頁</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
