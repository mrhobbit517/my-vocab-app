<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v11.0 - Full Features</title>
    <style>
        :root { 
            --bg: #f4f7f6;
            --primary: #0984e3; 
            --text: #2d3436; 
            --danger: #d63031; 
            --success: #27ae60; 
            --gray: #636e72;
        }
        body { 
            background: var(--bg);
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            color: var(--text);
            overflow-x: hidden; 
        }
        .container { 
            width: 100%;
            max-width: 480px; 
            min-height: 100vh;
            margin: 0 auto; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 1;
        }
        
        .global-bg { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url("https://i.imgur.com/SwmBCNA.jpeg"); 
            background-size: cover; 
            background-position: center; 
            z-index: 0;
        }
        .dungeon-bg { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://i.imgur.com/6FeeRyP.jpeg"); 
            background-size: cover; 
            background-position: center; 
            z-index: 0; 
            display: none;
        }

        .splash-screen { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .splash-img { 
            width: 100%;
            height: 100%; object-fit: contain; 
            position: absolute; top: 0; left: 0;
        }
        .enter-btn-container { 
            position: absolute;
            bottom: 15%; width: 100%; 
            display: flex; justify-content: center; 
        }
        .btn-rpg { 
            background: #2d3436;
            color: #fff; border: 4px solid #fff;
            padding: 12px 40px; font-size: 1.5rem; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 0 4px #2d3436;
            transition: 0.1s; 
        }
        .btn-rpg:active { transform: scale(0.9);
            background: #636e72; }

        .btn { 
            background: #fff;
            border: 1px solid #ddd; padding: 14px;
            margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; 
            width: 100%; font-weight: 600;
            box-sizing: border-box; transition: 0.2s; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); background: #f0f0f0;
        }
        .btn-primary { 
            background: var(--primary);
            color: white; border: none;
            box-shadow: 0 4px 12px rgba(9,132,227,0.2); 
        }
        .btn-outline { 
            color: var(--primary);
            border: 2px solid var(--primary); background: rgba(255,255,255,0.8); 
        }
        .btn-small { padding: 8px; font-size: 0.85rem;
            margin: 5px 2px; flex: 1; }
        .speaker-btn { 
            background: #e1f0ff;
            border: none;
            border-radius: 50%; width: 44px; height: 44px; cursor: pointer; 
            display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .card { 
            background: rgba(255,255,255,0.95);
            border-radius: 24px; padding: 25px; margin: 10px 0;
            min-height: 260px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); text-align: center; 
            position: relative; border: 1px solid #eee;
        }
        .card-eng { font-size: 2.2rem; font-weight: bold; color: var(--primary);
        }
        .card-chi { font-size: 1.8rem; font-weight: bold; color: #444;
        }
        .example-box { 
            margin-top: 15px;
            padding: 12px; background: #f9f9f9; border-radius: 10px;
            border-left: 4px solid var(--primary); text-align: left; font-style: italic; 
            font-size: 0.95rem; width: 100%; box-sizing: border-box;
        }
        
        .battle-scene { 
            position: relative;
            width: 100%; height: 240px; margin: 10px 0; overflow: visible; 
            background: rgba(255, 255, 255, 0.5); border-radius: 15px;
        }
        .monster-box { position: absolute; top: 10px; right: 40px; text-align: center; z-index: 1;
        }
        .monster-img { width: 90px; height: auto; image-rendering: pixelated; transition: 0.3s;
        }
        .player-box { position: absolute; bottom: -10px; left: -20px; z-index: 2;
        }
        .player-img { width: 270px; height: auto; transition: 0.3s; object-fit: contain;
        }
        
        /* 怪物受傷動畫：融合了原本的擊飛消失，並加入了震動與濾鏡 */
        @keyframes hit-shake { 
            0% { transform: translateX(0);
            } 
            20% { transform: translateX(-15px) scale(1.1);
            filter: brightness(1.2) sepia(1) saturate(8); } 
            40% { transform: translateX(10px) scale(1.05);
            filter: brightness(1.2) sepia(1) saturate(8); }
            60% { transform: translateX(-10px) scale(1);
            filter: brightness(1.1) sepia(0.5); }
            100% { transform: scale(0) translateX(-50px);
            opacity: 0; filter: brightness(1); } 
        }
        .anim-hit { animation: hit-shake 0.6s forwards;
        }
        
        @keyframes hurt-red-filter { 
            0% { filter: brightness(1);
            } 
            50% { filter: brightness(1.2) sepia(1) saturate(8);
            } 
            100% { filter: brightness(1);
            } 
        }
        @keyframes hurt-vibrate { 
            0% { transform: translate(0, 0);
            } 
            10% { transform: translate(-4px, -2px);
            } 
            20% { transform: translate(3px, 2px);
            } 
            30% { transform: translate(-4px, 1px);
            } 
            40% { transform: translate(3px, -1px);
            } 
            50% { transform: translate(-2px, 2px);
            } 
            60% { transform: translate(2px, 1px);
            } 
            70% { transform: translate(-3px, -1px);
            } 
            80% { transform: translate(3px, 2px);
            } 
            90% { transform: translate(-1px, -2px);
            } 
            100% { transform: translate(0, 0);
            } 
        }
        .anim-hurt-combined { animation: hurt-vibrate 0.4s, hurt-red-filter 0.4s;
        }

        .timer-line { 
            position: absolute;
            top: -10px; left: 0; height: 6px; 
            background: var(--danger); transition: width 0.1s linear;
        }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;
        }
        input, textarea { 
            width: 100%;
            padding: 14px; border: 2px solid #eee; 
            border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem;
        }
        .footer-img { width: 100%; height: auto; margin-top: 20px; border-radius: 15px;
        }

        .hurt-flash { 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh; 
            box-shadow: inset 0 0 50px rgba(214, 48, 49, 0.8); pointer-events: none;
            z-index: 999; opacity: 0; 
        }
        .anim-flash { animation: flash-fade 0.5s ease;
        }
        @keyframes flash-fade { 0% { opacity: 0; } 20% { opacity: 1;
        } 100% { opacity: 0; } }

        .combo-text { 
            position: absolute;
            left: 20px; top: 30px; font-size: 1.8rem; 
            font-weight: bold; color: #ff7675; text-shadow: 2px 2px #2d3436; z-index: 10;
            animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            display: none;
        }
        @keyframes pop { 0% { transform: scale(0.5);
        } 100% { transform: scale(1); } }

        .modal-overlay { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; justify-content: center; 
            align-items: center; z-index: 1000;
        }
        .modal-content { 
            background: white;
            padding: 30px; border-radius: 20px; 
            text-align: center; width: 80%; max-width: 320px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .chest-img { 
            width: 100px;
            height: auto; cursor: pointer; 
            transition: 0.2s; object-fit: contain; 
        }
        .chest-img:hover { transform: scale(1.1);
        }

        .view-section { display: none !important; width: 100%; flex: 1; flex-direction: column;
            justify-content: center; }
        .view-section.active { display: flex !important;
        }
    </style>
</head>
<body>
    <div class="global-bg" id="globalBg"></div>
    <div class="dungeon-bg" id="dungeonBg"></div>
    <div class="hurt-flash" id="hurtFlash"></div>

    <div class="splash-screen" id="view-splash" style="display: flex;">
        <img src="https://i.imgur.com/8MUpGMJ.jpeg" class="splash-img" alt="splash" />
        <div class="enter-btn-container">
            <button class="btn-rpg" onclick="switchView('home')">Enter</button>
        </div>
    </div>

    <div class="container">
        <div id="view-home" class="view-section">
            <h1 style="text-align:center; color:var(--primary)">VOCAB DUNGEON</h1>
            <button class="btn btn-primary" onclick="switchView('menu')">開始挑戰</button>
            <button class="btn" onclick="switchView('add')">新增單字</button>
            <button class="btn" onclick="switchView('list')">字庫管理 (<span id="bankCount">0</span>)</button>
            <img src="https://i.imgur.com/6UDmnhC.png" class="footer-img" />
        </div>

        <div id="view-menu" class="view-section">
            <button class="btn" onclick="switchView('home')">← 返回</button>
            <h2>選擇模式</h2>
            <button class="btn btn-outline" onclick="startNormal('card')">生字卡 (讀音/例句)</button>
            <button class="btn btn-outline" onclick="startNormal('quiz')">選擇題模式 (看中選英)</button>
            <hr style="width:100%; border:none; border-top:1px solid #ddd; margin:20px 0"/>
            <h3 style="color:var(--danger)">🏰 地下城戰鬥</h3>
            <button class="btn" onclick="startDungeon('low')">初級 (10層)</button>
            <button class="btn" onclick="startDungeon('mid')">中級 (15層)</button>
            <button class="btn" onclick="startDungeon('high')">高級 (20層)</button>
        </div>

        <div id="view-add" class="view-section">
            <button class="btn" onclick="switchView('home')">← 返回</button>
            <h2>新增單字</h2>
            <input type="text" id="newEng" placeholder="英文單字" />
            <button class="btn btn-outline" onclick="autoFetch()">✨ 自動翻譯</button>
            <textarea id="newChi" placeholder="中文意思"></textarea>
            <textarea id="newExample" placeholder="例句" rows="3"></textarea>
            <button class="btn btn-primary" onclick="addNewWord()">💾 儲存</button>
        </div>

        <div id="view-list" class="view-section">
            <button class="btn" onclick="switchView('home')">← 返回</button>
            <h3>我的字庫 (<span id="listCount">0</span>)</h3>
            <div style="display:flex; gap:5px; margin-bottom:15px">
                <button class="btn btn-outline btn-small" onclick="exportCSV()">📤 匯出 CSV</button>
                <button class="btn btn-outline btn-small" onclick="document.getElementById('csvInput').click()">📥 匯入 CSV</button>
                <input type="file" id="csvInput" style="display:none" accept=".csv" onchange="importCSV(event)" />
            </div>
            <div id="wordListContainer" style="max-height: 400px; overflow-y: auto;"></div>
            <button class="btn" style="marginTop:20px; color:red" onclick="resetDefaultBank()">⚠️ 重置回預設單字</button>
        </div>

        <div id="view-study" class="view-section">
            <div class="card" id="studyCard" onclick="handleCardFlip()">
                <div id="card-unflipped" style="width:100%"></div>
                <div id="card-flipped" style="display:none; text-align:left; width:100%">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <strong style="font-size:1.4rem; color:var(--primary)" id="flipEng"></strong>
                        <button class="speaker-btn" style="width:36px; height:36px" id="flipSpeakBtn">🔊</button>
                    </div>
                    <hr/>
                    <strong>【中文】</strong><p id="flipChi"></p>
                    <div class="example-box"><strong>【例句】</strong><p id="flipEx"></p></div>
                </div>
            </div>
            <div id="quizOptions" class="quiz-grid" style="display:none"></div>
            <div id="studyFeedback" style="text-align:center; font-weight:bold; margin:10px"></div>
            <button class="btn btn-primary" onclick="nextStudyWord()">下一個</button>
            <button class="btn" onclick="switchView('home')">返回</button>
        </div>

        <div id="view-dungeon" class="view-section">
            <div style="background: #2d3436; color: white; padding: 12px; border-radius: 15px; display:flex; justify-content:space-between; margin-bottom: 15px">
                <span id="hpDisplay"></span>
                <span id="floorDisplay"></span>
            </div>
            <div class="battle-scene">
                <div class="timer-line" id="timerLine" style="width:100%"></div>
                <div class="combo-text" id="comboDisplay">🔥 2 Combo!</div>
                <div class="monster-box">
                    <img src="https://i.imgur.com/BbjA5GC.png" id="monsterImg" class="monster-img" />
                </div>
                <div class="player-box">
                    <img src="https://i.imgur.com/gsR29ty.png" id="playerImg" class="player-img" alt="主角" />
                </div>
            </div>
            <div class="card" style="min-height:60px; padding: 15px; margin-bottom: 10px">
                <div style="font-size:1.3rem; font-weight:bold" id="dungeonChi"></div>
            </div>
            
            <div id="dungeonQuizGrid" class="quiz-grid"></div>
            <div id="dungeonBossArea" style="display:none">
                <input type="text" id="bossInput" placeholder="拼寫單字..." />
                <button class="btn btn-primary" onclick="submitBossAnswer()">⚡ 攻擊 BOSS</button>
            </div>

            <button class="btn" style="color:#999; margin-top: 10px" onclick="clearInterval(timerInterval); switchView('home');">🏳️ 撤退</button>
        </div>

        <div id="view-end" class="view-section">
            <div style="text-align:center">
                <h1 id="endEmoji"></h1>
                <h2 id="endTitle"></h2>
            </div>
            
             <div style="background: rgba(255,255,255,0.95); padding: 15px; border-radius: 15px; marginTop: 15px; max-height: 200px; overflow-y: auto">
                <h4 style="margin: 0 0 10px 0">📊 本次戰果</h4>
                <div style="color: var(--success); margin-bottom: 5px">
                    <strong>擊殺 (<span id="killedCount">0</span>)：</strong> 
                    <span id="killedList"></span>
                </div>
                <div style="color: var(--danger)">
                    <strong>漏掉/錯過 (<span id="missedCount">0</span>)：</strong> 
                    <span id="missedList"></span>
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 20px" onclick="switchView('home')">返回</button>
        </div>
    </div>

    <div class="modal-overlay" id="chestModal">
        <div class="modal-content">
           <h3>🎉 擊敗 Boss！獲得寶箱</h3>
            <img src="https://i.imgur.com/sAsVc32.png" id="chestImg" class="chest-img" onclick="openChest()" alt="寶箱" />
            <p style="color: #636e72" id="chestTip">點擊寶箱開啟獎勵！</p>
            <button class="btn btn-primary" style="margin-top: 10px; display:none" id="chestNextBtn" onclick="closeChestModal()">前往下一關</button>
        </div>
    </div>

        let wordBank = [...initialWords];
        let currentMode = ''; 
        let currentWordIndex = 0;

        // 載入與儲存 LocalStorage
        function loadState() {
            const saved = localStorage.getItem('vocabDungeonBank');
            if (saved) {
                wordBank = JSON.parse(saved);
            }
            updateBankCounts();
        }

        function saveState() {
            localStorage.setItem('vocabDungeonBank', JSON.stringify(wordBank));
            updateBankCounts();
        }

        function updateBankCounts() {
            document.getElementById('bankCount').innerText = wordBank.length;
            document.getElementById('listCount').innerText = wordBank.length;
        }

        function resetDefaultBank() {
            if(confirm('確定要重置回預設的單字嗎？所有新增的單字都會消失。')) {
                wordBank = [...initialWords];
                saveState();
                renderWordList();
                alert('已重置成功！');
            }

        // 畫面切換：處理背景與重置
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            
            if (viewId === 'splash') {
                document.getElementById('view-splash').style.display = 'flex';
                return;
            } else {
                document.getElementById('view-splash').style.display = 'none';
            }
            
            const targetView = document.getElementById('view-' + viewId);
            if(targetView) targetView.classList.add('active');
            
            if (viewId === 'home') {
                document.getElementById('globalBg').style.display = 'block';
                document.getElementById('dungeonBg').style.display = 'none';
                clearInterval(timerInterval);
            } else if (viewId === 'dungeon') {
                document.getElementById('globalBg').style.display = 'none';
                document.getElementById('dungeonBg').style.display = 'block';

                document.getElementById('globalBg').style.display = 'block';
                document.getElementById('dungeonBg').style.display = 'none';
            }

        // ================= 全域鍵盤事件 =================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const splash = document.getElementById('view-splash');
                const isSplashVisible = splash && splash.style.display !== 'none';

        document.getElementById('bossInput').addEventListener('keypress', function(e) {

        // ================= 字庫管理 (CRUD) =================
        function renderWordList() {
            const container = document.getElementById('wordListContainer');
            container.innerHTML = '';
            wordBank.forEach((w, index) => {
                const div = document.createElement('div');
                div.style.background = '#fff';
                div.style.padding = '10px';
                div.style.marginBottom = '8px';
                div.style.borderRadius = '8px';
                div.style.border = '1px solid #ddd';
                div.style.fontSize = '0.9rem';

                    <div style="display:flex; justify-content:space-between;">
                        <strong style="color:var(--primary)">${w.eng}</strong>

                            <button class="btn btn-outline btn-small" style="padding:2px 6px" onclick="deleteWord(${index})">刪除</button>
                        </div>

                    <div style="color:#636e72">${w.chi}</div>
                `;
                container.appendChild(div);

        function deleteWord(index) {
            if(confirm('確定要刪除這個單字嗎？')) {
                wordBank.splice(index, 1);
                saveState();
                renderWordList();
            }
        }

        async function autoFetch() {
            const eng = document.getElementById('newEng').value.trim();
            if(!eng) { alert('請先輸入英文單字！'); return; }
            const api = `https://api.dictionaryapi.dev/api/v2/entries/en/${eng}`;
            try {
                const res = await fetch(api);
                const data = await res.json();
                if(data && data[0]) {
                    const meanings = data[0].meanings;
                    let defStr = '';
                    meanings.forEach(m => {
                        defStr += `[${m.partOfSpeech}] ${m.definitions[0].definition}\n`;
                    });
                    document.getElementById('newChi').value = `(API翻譯僅提供英英解析，請自行修飾中文)\n${defStr}`;
                    
                    let example = '';
                    for(let m of meanings) {
                        for(let d of m.definitions) {
                            if(d.example) { example = d.example; break; }
                        }
                        if(example) break;
                    }
                    document.getElementById('newExample').value = example || "無提供例句。";
                } else {
                    alert('找不到該單字的解析。');
                }
            } catch(e) {
                alert('網路請求失敗或API異常。');
            }
        }

        function addNewWord() {
            const eng = document.getElementById('newEng').value.trim();
            const chi = document.getElementById('newChi').value.trim();
            const example = document.getElementById('newExample').value.trim();
            if(!eng || !chi) { alert('英文與中文為必填！'); return; }
            wordBank.push({eng, chi, example});
            saveState();
            alert('儲存成功！');
            document.getElementById('newEng').value = '';
            document.getElementById('newChi').value = '';
            document.getElementById('newExample').value = '';
            switchView('home');
        }

        // ================= 匯入 / 匯出 CSV =================
        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF英文單字,中文意思,例句\n";
            wordBank.forEach(w => {
                const row = `"${w.eng}","${w.chi}","${w.example || ''}"`;
                csvContent += row + "\n";
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `vocab_dungeon_bank_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function importCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n');
                let newCount = 0;
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    const cols = rows[i].split(',');
                    if (cols.length >= 2) {
                        const eng = cols[0].replace(/"/g, '').trim();
                        const chi = cols[1].replace(/"/g, '').trim();
                        let example = cols[2] ? cols[2].replace(/"/g, '').trim() : '';
                        if (eng && chi) {
                            wordBank.push({ eng, chi, example });
                            newCount++;
                        }
                    }
                }
                saveState();
                renderWordList();
                alert(`成功匯入 ${newCount} 個單字！`);
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // ================= 普通模式 (生字卡 & 選擇題) =================
        function startNormal(mode) {
            if(wordBank.length < 4) { alert('字庫單字不足4個，無法開始！'); return; }
            currentMode = mode;
            currentWordIndex = 0;
            switchView('study');
            loadStudyWord();
        }

        function loadStudyWord() {
            cardFlipped = false;
            document.getElementById('studyFeedback').innerText = '';
            const card = document.getElementById('studyCard');
            card.style.borderColor = "#eee";
            card.style.background = "rgba(255,255,255,0.95)";
            
            if (currentWordIndex >= wordBank.length) {
                currentWordIndex = 0; 
                shuffleArray(wordBank);
            }
            
            const w = wordBank[currentWordIndex];
            
            document.getElementById('card-unflipped').innerHTML = `<div class="card-eng">${w.eng}</div><div style="color:#aaa;margin-top:10px">點擊卡片翻面</div>`;
            document.getElementById('card-unflipped').style.display = 'block';
            document.getElementById('card-flipped').style.display = 'none';
            
            document.getElementById('flipEng').innerText = w.eng;
            document.getElementById('flipChi').innerText = w.chi;
            document.getElementById('flipEx').innerText = w.example || "無提供例句。";
            
            document.getElementById('flipSpeakBtn').onclick = (e) => {
                e.stopPropagation(); 
                speak(w.eng);
            };

            if (currentMode === 'quiz') {
                document.getElementById('quizOptions').style.display = 'grid';
                generateQuizOptions(w);
            } else {
                document.getElementById('quizOptions').style.display = 'none';
            }
        }

        function handleCardFlip() {
            if (currentMode === 'card') {
                const unflipped = document.getElementById('card-unflipped');
                const flipped = document.getElementById('card-flipped');
                if(unflipped.style.display !== 'none') {
                    unflipped.style.display = 'none';
                    flipped.style.display = 'block';
                    cardFlipped = true;
                } else {
                    unflipped.style.display = 'block';
                    flipped.style.display = 'none';
                    cardFlipped = false;
                }
            }
        }

        function generateQuizOptions(correctWord) {
            const grid = document.getElementById('quizOptions');
            grid.innerHTML = '';
            const options = [correctWord];
            while(options.length < 4) {
                const randomW = wordBank[Math.floor(Math.random()*wordBank.length)];
                if(!options.find(o => o.eng === randomW.eng)) {
                    options.push(randomW);
                }
            }
            shuffleArray(options);
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn btn-outline';
                b.style.margin = '4px 0';
                b.innerText = opt.chi; 
                b.onclick = () => checkQuizAnswer(opt, correctWord, b);
                grid.appendChild(b);
            });
        }

        function checkQuizAnswer(selected, correct, btnDom) {
            const grid = document.getElementById('quizOptions');
            const buttons = grid.querySelectorAll('button');
            buttons.forEach(btn => btn.onclick = null);

            if (selected.eng === correct.eng) {
                document.getElementById('studyFeedback').innerHTML = '⭕ 正確！';
                document.getElementById('studyFeedback').style.color = 'var(--success)';
                btnDom.style.background = '#d4edda';
                btnDom.style.borderColor = 'var(--success)';
                
                document.getElementById('card-unflipped').style.display = 'none';
                document.getElementById('card-flipped').style.display = 'block';
                cardFlipped = true;
                speak(correct.eng);
            } else {
                document.getElementById('studyFeedback').innerHTML = '❌ 答錯了！正確答案是：' + correct.chi;
                document.getElementById('studyFeedback').style.color = 'var(--danger)';
                btnDom.style.background = '#f8d7da';
                btnDom.style.borderColor = 'var(--danger)';
                
                document.getElementById('card-unflipped').style.display = 'none';
                document.getElementById('card-flipped').style.display = 'block';
                cardFlipped = true;
            }
        }

        function nextStudyWord() {
            currentWordIndex++;
            loadStudyWord();
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            speechSynthesis.speak(utterance);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // ================= 地下城戰鬥模式 =================
        function startDungeon(level) {
            if(wordBank.length < 5) { alert('字庫單字不足5個，無法進行挑戰！'); return; }
            dungeonLevel = level;
            hp = 5;
            floor = 1;
            combo = 0;
            killedWords = [];
            missedWords = [];
            
            if (level === 'low') maxFloor = 10;
            if (level === 'mid') maxFloor = 15;
            if (level === 'high') maxFloor = 20;

            document.getElementById('playerImg').className = 'player-img';
            document.getElementById('monsterImg').className = 'monster-img';
            document.getElementById('monsterImg').src = getRandomMonsterImg();

            switchView('dungeon');
            loadDungeonLevel();
        }

        function loadDungeonLevel() {
            clearInterval(timerInterval);
            document.getElementById('hpDisplay').innerText = `❤️ HP: ${hp}`;
            document.getElementById('floorDisplay').innerText = `🏰 第 ${floor} / ${maxFloor} 層`;
            
            const isBossFloor = (floor === maxFloor);
            const monsterImgDom = document.getElementById('monsterImg');
            
            // 怪物與主角受傷效果還原
            monsterImgDom.className = 'monster-img';
            monsterImgDom.style.opacity = '1';
            monsterImgDom.style.transform = 'scale(1)';
            document.getElementById('playerImg').className = 'player-img';

            if (isBossFloor) {
                // Boss層特定視覺與設定
                monsterImgDom.style.width = '120px';
                monsterImgDom.style.filter = 'drop-shadow(0 0 10px rgba(214,48,49,0.8))';
                timeLeft = 15; 
                extraTime = 0; 
            } else {
                monsterImgDom.style.width = '90px';
                monsterImgDom.style.filter = 'none';
                if (dungeonLevel === 'low') timeLeft = 7;
                else if (dungeonLevel === 'mid') timeLeft = 5;
                else timeLeft = 3.5;

                timeLeft += extraTime; 
                extraTime = 0; 
            }

            const totalTime = timeLeft;
            document.getElementById('timerLine').style.width = '100%';
            document.getElementById('timerLine').style.background = 'var(--danger)';

            currentCorrectWord = wordBank[Math.floor(Math.random()*wordBank.length)];
            document.getElementById('dungeonChi').innerText = currentCorrectWord.chi;

            const grid = document.getElementById('dungeonQuizGrid');
            const bossArea = document.getElementById('dungeonBossArea');

            if (isBossFloor) {
                grid.style.display = 'none';
                bossArea.style.display = 'block';
                document.getElementById('bossInput').value = '';
                document.getElementById('dungeonChi').innerHTML = `👹 <strong>【最終BOSS】</strong><br/>請拼寫：${currentCorrectWord.chi}`;
                setTimeout(() => { document.getElementById('bossInput').focus(); }, 100);
            } else {
                grid.style.display = 'grid';
                bossArea.style.display = 'none';
                generateDungeonOptions(currentCorrectWord);
            }

            // 倒數計時器
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percent = (timeLeft / totalTime) * 100;
                document.getElementById('timerLine').style.width = percent + '%';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeOut();
                }
            }, 100);
        }

        function generateDungeonOptions(correctWord) {
            const grid = document.getElementById('dungeonQuizGrid');
            grid.innerHTML = '';
            const options = [correctWord];
            while(options.length < 4) {
                const randomW = wordBank[Math.floor(Math.random()*wordBank.length)];
                if(!options.find(o => o.eng === randomW.eng)) {
                    options.push(randomW);
                }
            }
            shuffleArray(options);
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn btn-outline';
                b.style.margin = '4px 0';
                b.innerText = opt.eng;
                b.onclick = () => checkDungeonAnswer(opt, correctWord);
                grid.appendChild(b);
            });
        }

        function checkDungeonAnswer(selected, correct) {
            clearInterval(timerInterval);
            if (selected.eng === correct.eng) {
                combo++;
                killedWords.push(correct);
                showCombo();
                triggerMonsterHitAnimation();
                speak(correct.eng);
                
                setTimeout(() => {
                    floor++;
                    if(floor > maxFloor) {
                        endGame('win');
                    } else {
                        loadDungeonLevel();
                    }
                }, 600); 
            } else {
                missedWords.push(correct);
                handleMistake();
            }
        }

        function submitBossAnswer() {
            const input = document.getElementById('bossInput').value.trim().toLowerCase();
            const correct = currentCorrectWord.eng.toLowerCase();
            clearInterval(timerInterval);

            if (input === correct) {
                killedWords.push(currentCorrectWord);
                speak(currentCorrectWord.eng);
                
                const monsterImgDom = document.getElementById('monsterImg');
                monsterImgDom.className = 'monster-img anim-hit';
                
                setTimeout(() => {
                    document.getElementById('chestModal').style.display = 'flex';
                    document.getElementById('chestTip').innerText = '點擊寶箱開啟獎勵！';
                    document.getElementById('chestNextBtn').style.display = 'none';
                    document.getElementById('chestImg').src = 'https://i.imgur.com/sAsVc32.png'; 
                }, 600);
            } else {
                missedWords.push(currentCorrectWord);
                handleMistake();
            }
        }

        function handleMistake() {
            combo = 0;
            hideCombo();
            hp--;
            document.getElementById('hpDisplay').innerText = `❤️ HP: ${hp}`;
            
            document.getElementById('playerImg').className = 'player-img anim-hurt-combined';
            triggerHurtFlash();

            setTimeout(() => {
                document.getElementById('playerImg').className = 'player-img';
                if (hp <= 0) {
                    endGame('lose');
                } else {
                    floor++;
                    if(floor > maxFloor) {
                        endGame('win');
                    } else {
                        loadDungeonLevel();
                    }
                }
            }, 600);
        }

        function handleTimeOut() {
            missedWords.push(currentCorrectWord);
            combo = 0;
            hideCombo();
            hp--;
            document.getElementById('hpDisplay').innerText = `❤️ HP: ${hp}`;
            
            document.getElementById('playerImg').className = 'player-img anim-hurt-combined';
            triggerHurtFlash();

            setTimeout(() => {
                document.getElementById('playerImg').className = 'player-img';
                if (hp <= 0) {
                    endGame('lose');
                } else {
                    floor++;
                    if(floor > maxFloor) {
                        endGame('win');
                    } else {
                        loadDungeonLevel();
                    }
                }
            }, 600);
        }

        function showCombo() {
            if (combo >= 2) {
                const dom = document.getElementById('comboDisplay');
                dom.innerText = `🔥 ${combo} Combo!`;
                dom.style.display = 'block';
            }
        }
        function hideCombo() {
            document.getElementById('comboDisplay').style.display = 'none';
        }

        function triggerHurtFlash() {
            const flash = document.getElementById('hurtFlash');
            flash.className = 'hurt-flash anim-flash';
            setTimeout(() => { flash.className = 'hurt-flash'; }, 500);
        }

        function triggerMonsterHitAnimation() {
            const monsterImgDom = document.getElementById('monsterImg');
            monsterImgDom.className = 'monster-img anim-hit';
        }

        function openChest() {
            const img = document.getElementById('chestImg');
            img.src = 'https://i.imgur.com/7Yf3Yt0.png'; 
            
            const rand = Math.random();
            if (rand < 0.5) {
                hp++;
                document.getElementById('chestTip').innerText = '你獲得了：❤️ 回復 1 點生命！';
            } else {
                extraTime = 2;
                document.getElementById('chestTip').innerText = '你獲得了：⏱️ 下一關時間延長 2 秒！';
            }
            document.getElementById('chestNextBtn').style.display = 'block';
        }

        function closeChestModal() {
            document.getElementById('chestModal').style.display = 'none';
            floor++;
            loadDungeonLevel();
        }

        function endGame(result) {
            clearInterval(timerInterval);
            saveState(); 

            document.getElementById('endEmoji').innerText = (result === 'win') ? '🎉' : '💀';
            document.getElementById('endTitle').innerText = (result === 'win') ? '挑戰成功' : '你倒下了';
            document.getElementById('killedCount').innerText = killedWords.length;
            document.getElementById('killedList').innerText = killedWords.map(w => w.eng).join(', ') || '無';
            
            document.getElementById('missedCount').innerText = missedWords.length;
            document.getElementById('missedList').innerText = missedWords.map(w => w.eng).join(', ') || '無';

            switchView('end');
        }

        // 初始化
        loadState();
    </script>
</body>
</html>
