<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabCard v8.1 - 完整地下城版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f8f9fa; --primary: #0984e3; --text: #2d3436; --gray: #636e72; --danger: #d63031; --success: #27ae60; }
        body { background: var(--bg); font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; color: var(--text); }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 10px rgba(9,132,227,0.2); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: transparent; }
        .btn-delete { color: var(--danger); border: 1px solid var(--danger); padding: 4px 12px; width: auto; font-size: 0.8rem; border-radius: 6px; }

        /* 卡片樣式 */
        .card { background: #fff; border-radius: 24px; padding: 30px; margin: 15px 0; min-height: 320px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; text-align: center; }
        .card h2 { font-size: 2.2rem; margin: 0; color: var(--primary); }
        
        /* 2x2 網格 */
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .quiz-grid .btn { margin: 0; padding: 18px 10px; }

        /* 地下城專屬 */
        .dungeon-header { display: flex; justify-content: space-between; align-items: center; background: #2d3436; color: #fff; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .hp-text { color: #ff7675; font-weight: bold; }
        .boss-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--primary); font-size: 1.2rem; text-align: center; margin: 10px 0; box-sizing: border-box; }

        /* 內容詳情 */
        .meaning-item { margin-bottom: 12px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; width: 100%; text-align: left; }
        .pos-label { background: #e1f5fe; color: #0288d1; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-right: 8px; }
        .example-text { font-size: 0.85rem; color: var(--gray); background: #f1f2f6; padding: 8px; border-radius: 8px; margin-top: 5px; font-style: italic; border-left: 3px solid #ced6e0; display: block; }

        textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; min-height: 180px; font-family: inherit; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; font-size: 1.2rem; margin-bottom: 10px; box-sizing: border-box; }
        .status-bar { font-size: 0.85rem; color: var(--primary); font-weight: bold; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [wordBank, setWordBank] = useState(() => JSON.parse(localStorage.getItem('vocab_v8_1') || '[]'));
            
            // 溫習狀態
            const [studyQueue, setStudyQueue] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);
            const [quizOptions, setQuizOptions] = useState([]);
            const [feedback, setFeedback] = useState("");

            // 地下城狀態
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [dungeonList, setDungeonList] = useState([]);
            const [bossInput, setBossInput] = useState("");

            // 新增單字狀態
            const [eng, setEng] = useState("");
            const [content, setContent] = useState("");
            const [status, setStatus] = useState("");

            useEffect(() => { localStorage.setItem('vocab_v8_1', JSON.stringify(wordBank)); }, [wordBank]);

            const speak = (t) => { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); };
            const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

            // --- 核心邏輯 ---
            const initNormalStudy = (mode) => {
                if (wordBank.length < 4 && mode === 'quiz') return alert("至少需要4個生字");
                if (wordBank.length === 0) return alert("字庫為空");
                const q = shuffle(wordBank);
                const first = q.shift();
                setStudyQueue(q);
                setCurrentWord(first);
                setIsFlipped(false);
                setFeedback("");
                if (mode === 'quiz') setQuizOptions(shuffle([first.eng, ...wordBank.filter(w=>w.eng!==first.eng).slice(0,3).map(w=>w.eng)]));
                else speak(first.eng);
                setView(mode === 'card' ? 'study_card' : 'study_quiz');
            };

            const nextNormal = (mode) => {
                if (studyQueue.length === 0) {
                    alert("本輪完成！即將重新開始。");
                    initNormalStudy(mode);
                    return;
                }
                const q = [...studyQueue];
                const word = q.shift();
                setStudyQueue(q);
                setCurrentWord(word);
                setIsFlipped(false);
                setFeedback("");
                if (mode === 'quiz') setQuizOptions(shuffle([word.eng, ...wordBank.filter(w=>w.eng!==word.eng).slice(0,3).map(w=>w.eng)]));
                else speak(word.eng);
            };

            // --- 地下城邏輯 ---
            const startDungeon = (difficulty) => {
                if (wordBank.length < 5) return alert("生字不足以生成地下城");
                let initialHp = 10;
                if (difficulty === 'mid') initialHp = 7;
                if (difficulty === 'high') initialHp = 5;

                let list = [];
                while(list.length < 50) { list = [...list, ...shuffle(wordBank)]; }
                list = list.slice(0, 50);

                setDungeonList(list);
                setHp(initialHp);
                setFloor(1);
                setCurrentWord(list[0]);
                setBossInput("");
                setFeedback("");
                setQuizOptions(shuffle([list[0].eng, ...wordBank.filter(w=>w.eng!==list[0].eng).slice(0,3).map(w=>w.eng)]));
                setView('dungeon');
            };

            const handleDungeonAnswer = (answerEng) => {
                const isCorrect = answerEng.toLowerCase().trim() === currentWord.eng.toLowerCase().trim();
                if (isCorrect) {
                    setFeedback("✅ 擊殺！");
                    setTimeout(() => {
                        if (floor === 50) return setView('dungeon_win');
                        const nextFloor = floor + 1;
                        setFloor(nextFloor);
                        const nextW = dungeonList[nextFloor - 1];
                        setCurrentWord(nextW);
                        setBossInput("");
                        setFeedback("");
                        setQuizOptions(shuffle([nextW.eng, ...wordBank.filter(w=>w.eng!==nextW.eng).slice(0,3).map(w=>w.eng)]));
                    }, 500);
                } else {
                    const newHp = hp - 1;
                    setHp(newHp);
                    setFeedback("❌ 受到攻擊！");
                    if (newHp <= 0) {
                        setTimeout(() => setView('dungeon_lose'), 500);
                    } else {
                        // 答錯也會跳下一題，但扣血
                        setTimeout(() => {
                            if (floor === 50) return setView('dungeon_win');
                            const nextFloor = floor + 1;
                            setFloor(nextFloor);
                            const nextW = dungeonList[nextFloor - 1];
                            setCurrentWord(nextW);
                            setBossInput("");
                            setFeedback("");
                            setQuizOptions(shuffle([nextW.eng, ...wordBank.filter(w=>w.eng!==nextW.eng).slice(0,3).map(w=>w.eng)]));
                        }, 800);
                    }
                }
            };

            // --- 抓取資料 (保留原本功能) ---
            const fetchFullData = async () => {
                if (!eng.trim()) return setStatus("⚠️ 請輸入單字");
                setStatus("🔍 檢索中...");
                try {
                    const [tRes, dRes] = await Promise.all([
                        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(eng)}&langpair=en|zh-TW`),
                        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(eng)}`)
                    ]);
                    const tData = await tRes.json();
                    const dData = await dRes.json();
                    let resStr = `【翻譯】: ${tData.responseData.translatedText}\n\n`;
                    if (Array.isArray(dData)) {
                        dData[0].meanings.forEach((m) => {
                            const def = m.definitions[0];
                            resStr += `[${m.partOfSpeech}] ${def.definition}\n`;
                            if (def.example) resStr += `>> ${def.example.split('.')[0]}.\n`;
                            resStr += `---\n`;
                        });
                    }
                    setContent(resStr.trim());
                    setStatus("✅ 獲取成功");
                } catch (e) { setStatus("❌ 失敗"); }
            };

            // --- UI 渲染 ---
            if (view === 'home') return (
                <div className="container">
                    <h1 style={{marginTop:'60px', textAlign:'center'}}>VOCAB CARD</h1>
                    <button className="btn btn-primary" onClick={() => setView('study_menu')}>溫習模式</button>
                    <button className="btn" onClick={() => {setView('add'); setStatus("");}}>新增生字卡</button>
                    <button className="btn" onClick={() => setView('list')}>我的字庫 ({wordBank.length})</button>
                </div>
            );

            if (view === 'study_menu') return (
                <div className="container">
                    <h1>模式選擇</h1>
                    <button className="btn btn-outline" onClick={() => initNormalStudy('card')}>生字卡模式</button>
                    <button className="btn btn-outline" onClick={() => initNormalStudy('quiz')}>選擇題模式</button>
                    <hr style={{margin:'20px 0', border:'none', borderTop:'1px solid #ddd'}} />
                    <h2 style={{color: 'var(--danger)'}}>🛡️ 地下城挑戰 (50關)</h2>
                    <button className="btn" onClick={() => startDungeon('low')}>初級地下城 (10 HP)</button>
                    <button className="btn" onClick={() => startDungeon('mid')}>中級地下城 (7 HP)</button>
                    <button className="btn" onClick={() => startDungeon('high')}>高級地下城 (5 HP)</button>
                    <button className="btn" onClick={() => setView('home')}>返回主頁</button>
                </div>
            );

            if (view === 'dungeon') return (
                <div className="container">
                    <div className="dungeon-header">
                        <span>B{floor} / 50</span>
                        <span className="hp-text">HP: {hp}</span>
                    </div>
                    <div className="card">
                        <div style={{fontSize:'3rem'}}>{floor === 50 ? "🐲" : floor === 25 ? "👹" : "👾"}</div>
                        { (floor === 25 || floor === 50) && <p style={{color:'var(--danger)', fontWeight:'bold'}}>BOSS BATTLE</p> }
                        <h2>{currentWord?.content.split('\n')[0].replace('【翻譯】: ', '')}</h2>
                        {feedback && <p style={{color: feedback.includes('✅')?'var(--success)':'var(--danger)'}}>{feedback}</p>}
                    </div>

                    { (floor === 25 || floor === 50) ? (
                        <div>
                            <input className="boss-input" autoFocus value={bossInput} onChange={e=>setBossInput(e.target.value)} placeholder="拼寫出英文單字..." />
                            <button className="btn btn-primary" onClick={() => handleDungeonAnswer(bossInput)}>發動攻擊！</button>
                        </div>
                    ) : (
                        <div className="quiz-grid">
                            {quizOptions.map(o => (
                                <button key={o} className="btn btn-outline" onClick={() => handleDungeonAnswer(o)}>{o}</button>
                            ))}
                        </div>
                    )}
                </div>
            );

            if (view === 'dungeon_lose') return (
                <div className="container" style={{textAlign:'center', justifyContent:'center'}}>
                    <h1 style={{color:'var(--danger)', fontSize:'3rem'}}>失敗</h1>
                    <p>你在第 {floor} 層力盡倒下...</p>
                    <button className="btn btn-primary" onClick={() => setView('home')}>返回村莊</button>
                </div>
            );

            if (view === 'dungeon_win') return (
                <div className="container" style={{textAlign:'center', justifyContent:'center'}}>
                    <h1 style={{color:'var(--success)', fontSize:'3rem'}}>通關</h1>
                    <p>你征服了 50 層地下城！</p>
                    <button className="btn btn-primary" onClick={() => setView('home')}>功成身退</button>
                </div>
            );

            // 保持原本的生字卡模式
            if (view === 'study_card' || view === 'study_quiz') return (
                <div className="container">
                    <div style={{textAlign:'center', fontSize:'0.8rem', color:'var(--gray)'}}>剩餘: {studyQueue.length + 1}</div>
                    <div className="card" onClick={() => view === 'study_card' && setIsFlipped(!isFlipped)}>
                        {!isFlipped ? (
                            <h2>{view === 'study_card' ? currentWord?.eng : currentWord?.content.split('\n')[0].replace('【翻譯】: ', '')}</h2>
                        ) : (
                            <div style={{width:'100%', textAlign:'left'}}>
                                <div style={{textAlign:'center', marginBottom:'15px'}}><strong style={{fontSize:'1.8rem', color: 'var(--primary)'}}>{currentWord?.eng}</strong></div>
                                {currentWord?.content.split('\n').map((line, i) => (
                                    line.startsWith('[') ? <div key={i} className="meaning-item"><span className="pos-label">{line.split(']')[0].replace('[','')}</span>{line.split(']')[1]}</div> :
                                    line.startsWith('>>') ? <div key={i} className="example-text">{line.replace('>>','Ex:')}</div> :
                                    line.startsWith('【') ? <div key={i} style={{color: 'var(--primary)', fontWeight: 'bold', marginBottom:'8px'}}>{line}</div> : null
                                ))}
                                <button className="btn" style={{marginTop:'15px'}} onClick={(e)=>{e.stopPropagation(); speak(currentWord.eng);}}>🔊 朗讀</button>
                            </div>
                        )}
                    </div>
                    {view === 'study_quiz' && !isFlipped && (
                        <div className="quiz-grid">
                            {quizOptions.map(o => (
                                <button key={o} className="btn btn-outline" onClick={() => { setFeedback(o === currentWord.eng ? "✅ 正確" : "❌ 錯誤"); setIsFlipped(true); if(o===currentWord.eng) speak(o); }}>{o}</button>
                            ))}
                        </div>
                    )}
                    {feedback && <div style={{textAlign:'center', fontWeight:'bold', padding:'10px', color: feedback.includes('✅')?'var(--success)':'var(--danger)'}}>{feedback}</div>}
                    <button className="btn btn-primary" onClick={() => nextNormal(view === 'study_card' ? 'card' : 'quiz')}>下一個 ➔</button>
                    <button className="btn" onClick={() => setView('home')}>離開</button>
                </div>
            );

            if (view === 'add') return (
                <div className="container">
                    <h1>新增單字</h1>
                    <div className="status-bar">{status}</div>
                    <input value={eng} onChange={e => setEng(e.target.value)} placeholder="輸入英文..." />
                    <button className="btn btn-outline" onClick={fetchFullData}>✨ 一鍵抓取資料</button>
                    <textarea value={content} onChange={e => setContent(e.target.value)} placeholder="資料內容..." />
                    <button className="btn btn-primary" onClick={() => {
                        if(!eng || !content) return;
                        setWordBank([{ eng: eng.trim(), content, id: Date.now() }, ...wordBank]);
                        setEng(""); setContent(""); setStatus("💾 已儲存");
                    }}>💾 儲存</button>
                    <button className="btn" onClick={() => setView('home')}>返回</button>
                </div>
            );

            if (view === 'list') return (
                <div className="container">
                    <h1>字庫 ({wordBank.length})</h1>
                    {wordBank.map(w => (
                        <div key={w.id} style={{background:'#fff', padding:'15px', borderRadius:'15px', marginBottom:'10px', display:'flex', justifyContent:'space-between', alignItems:'center', border:'1px solid #eee'}}>
                            <div><strong>{w.eng}</strong><div style={{fontSize:'0.8rem', color:'#636e72'}}>{w.content.split('\n')[0]}</div></div>
                            <button className="btn-delete" onClick={() => setWordBank(wordBank.filter(x => x.id !== w.id))}>移除</button>
                        </div>
                    ))}
                    <button className="btn" onClick={() => setView('home')}>返回</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
