<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v11.0 - RPG Styled</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { 
            --bg: #f4f7f6; 
            --primary: #0984e3; 
            --text: #2d3436; 
            --danger: #d63031; 
            --success: #27ae60; 
            --gray: #636e72;
            /* 新增 RPG 邊框變量 */
            --rpg-border: #2d3436;
            --rpg-shadow: #ffffff;
        }
        body { background: var(--bg); font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; z-index: 1; }
        
        /* 背景樣式 */
        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://i.imgur.com/SwmBCNA.jpeg");
            background-size: cover; background-position: center; z-index: 0;
        }
        .dungeon-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://i.imgur.com/Rhq2R6d.png");
            background-size: cover; background-position: center; z-index: 0;
        }

        /* 啟動畫面 */
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center;
        }
        .splash-img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
        .enter-btn-container { position: absolute; bottom: 15%; width: 100%; display: flex; justify-content: center; }

        /* RPG 風格按鍵與邊框通用樣式 */
        .rpg-border-style {
            border: 4px solid var(--rpg-border);
            border-radius: 16px;
            box-shadow: inset 0 0 0 2px var(--rpg-shadow), 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn { 
            background: #fff; 
            border: 4px solid var(--rpg-border); 
            padding: 14px; 
            margin: 8px 0; 
            cursor: pointer; 
            font-size: 1.1rem; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: 800; 
            box-sizing: border-box; 
            transition: 0.1s; 
            box-shadow: inset 0 0 0 2px #fff;
            -webkit-tap-highlight-color: transparent;
            color: var(--rpg-border);
        }
        .btn:active { transform: scale(0.96); background: #eee; }
        .btn-primary { background: var(--primary); color: white; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3); border-color: #06528e; }
        .btn-outline { color: var(--primary); border: 4px solid var(--primary); background: rgba(255,255,255,0.9); }
        .btn-small { padding: 8px; font-size: 0.85rem; margin: 5px 2px; flex: 1; border-width: 3px; }
        
        .btn-rpg {
            background: #2d3436; color: #fff; border: 4px solid #fff;
            padding: 12px 40px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            border-radius: 8px;
            box-shadow: 0 0 0 4px #2d3436; transition: 0.1s;
        }

        .card { 
            background: rgba(255,255,255,0.95); 
            border: 5px solid var(--rpg-border);
            border-radius: 20px; 
            padding: 25px; 
            margin: 10px 0; 
            min-height: 200px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-shadow: inset 0 0 0 3px #fff, 0 8px 20px rgba(0,0,0,0.2); 
            text-align: center; 
            position: relative; 
        }
        
        .card-eng { font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        .card-chi { font-size: 1.8rem; font-weight: bold; color: #444; }
        
        /* 戰鬥畫面樣式 */
        .battle-scene { 
            position: relative; 
            width: 100%; 
            height: 240px; 
            margin: 15px 0; 
            background: rgba(0,0,0,0.1);
            border: 6px solid var(--rpg-border);
            border-radius: 15px;
            box-shadow: inset 0 0 0 3px rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .monster-box { position: absolute; top: 10px; right: 40px; text-align: center; z-index: 1; }
        .monster-img { width: 90px; height: auto; image-rendering: pixelated; transition: 0.3s; }
        .player-box { position: absolute; bottom: -10px; left: -20px; z-index: 2; }
        .player-img { width: 270px; height: auto; transition: 0.3s; }
        
        @keyframes hit-shake { 0% { transform: translateX(0); } 20% { transform: translateX(-15px) scale(1.1); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }
        .anim-hit { animation: hit-shake 0.5s forwards; }
        @keyframes hurt-red { 0% { filter: brightness(1); } 50% { filter: brightness(1.2) sepia(1) saturate(8); transform: translateY(10px); } 100% { filter: brightness(1); } }
        .anim-hurt { animation: hurt-red 0.4s; }
        
        .timer-line { position: absolute; top: 0; left: 0; height: 8px; background: var(--danger); transition: width 0.1s linear; z-index: 10; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        
        input, textarea { 
            width: 100%; padding: 14px; 
            border: 4px solid var(--rpg-border); 
            border-radius: 12px; 
            margin-bottom: 10px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background: #fff;
            box-shadow: inset 0 0 0 2px #fff;
        }

        .hp-bar-container {
            background: var(--rpg-border); 
            color: white; 
            padding: 10px 15px; 
            border: 4px solid #fff;
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px;
            box-shadow: 0 0 0 3px var(--rpg-border);
        }

        .speaker-btn { background: #e1f0ff; border: 3px solid var(--primary); border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .example-box { margin-top: 15px; padding: 12px; background: #f9f9f9; border-radius: 10px; border-left: 6px solid var(--primary); text-align: left; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        .footer-img { width: 100%; height: auto; margin-top: 20px; border-radius: 15px; border: 4px solid var(--rpg-border); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 資產定義[cite: 1]
        const monsterImages = [
            "https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png",
            "https://i.imgur.com/ToQhBZL.png", "https://i.imgur.com/72Hr4rn.png", "https://i.imgur.com/3jsF7It.png",
            "https://i.imgur.com/4TfXx0t.png", "https://i.imgur.com/bI7Y6tX.png"
        ];
        const bossImages = ["https://i.imgur.com/LNZ46Uc.png", "https://i.imgur.com/ArFodUT.png"];
        const playerImg = "https://i.imgur.com/49PQ8zR.png";
        const splashImg = "https://i.imgur.com/8MUpGMJ.jpeg";

        // 預設單字庫[cite: 1]
        const initialWords = [
            {eng:"apple", chi:"蘋果", example:"An apple a day keeps the doctor away."},
            {eng:"book", chi:"書", example:"I like to read a book before bed."},
            {eng:"cat", chi:"貓", example:"The cat is sleeping on the sofa."},
            {eng:"dog", chi:"狗", example:"My dog loves to play with a ball."},
            {eng:"egg", chi:"蛋", example:"I had a boiled egg for breakfast."},
            {eng:"fish", chi:"魚", example:"There are many colorful fish in the sea."},
            {eng:"girl", chi:"女孩", example:"The little girl is wearing a red dress."},
            {eng:"house", chi:"房子", example:"We live in a big white house."},
            {eng:"ice", chi:"冰", example:"Put some ice in my drink, please."},
            {eng:"jump", chi:"跳", example:"The kids like to jump on the bed."},
            {eng:"kite", chi:"風箏", example:"The wind is perfect for flying a kite."},
            {eng:"lion", chi:"獅子", example:"The lion is the king of the jungle."},
            {eng:"moon", chi:"月亮", example:"The moon shines brightly at night."},
            {eng:"nest", chi:"鳥巢", example:"The bird built a nest in the tree."},
            {eng:"orange", chi:"橙子", example:"This orange is very sweet and juicy."},
            {eng:"pen", chi:"筆", example:"Can I borrow your pen for a moment?"},
            {eng:"queen", chi:"女王", example:"The queen lives in a beautiful palace."},
            {eng:"river", chi:"河流", example:"We went fishing by the river."},
            {eng:"sun", chi:"太陽", example:"The sun rises in the east."},
            {eng:"tree", chi:"樹", example:"The apple tree is full of fruit."},
            {eng:"umbrella", chi:"雨傘", example:"Don't forget your umbrella, it's raining."},
            {eng:"violin", chi:"小提琴", example:"She plays the violin very well."},
            {eng:"water", chi:"水", example:"We should drink plenty of water."},
            {eng:"xylophone", chi:"木琴", example:"The child is learning to play the xylophone."},
            {eng:"yellow", chi:"黃色", example:"The sunflower is bright yellow."},
            {eng:"zoo", chi:"動物園", example:"We saw many animals at the zoo."},
            {eng:"ball", chi:"球", example:"Throw the ball to me!"},
            {eng:"cake", chi:"蛋糕", example:"She baked a chocolate cake for my birthday."},
            {eng:"door", chi:"門", example:"Please close the door behind you."},
            {eng:"elephant", chi:"大象", example:"The elephant has a very long trunk."},
            {eng:"flower", chi:"花", example:"This flower smells wonderful."},
            {eng:"garden", chi:"花園", example:"My grandmother grows roses in her garden."},
            {eng:"hat", chi:"帽子", example:"Take off your hat inside the house."},
            {eng:"island", chi:"島", example:"They spent their holiday on a tropical island."},
            {eng:"juice", chi:"果汁", example:"Would you like some orange juice?"},
            {eng:"king", chi:"國王", example:"The king ruled the country for many years."},
            {eng:"lamp", chi:"燈", example:"Turn on the lamp, it's getting dark."},
            {eng:"milk", chi:"牛奶", example:"A glass of warm milk helps me sleep."},
            {eng:"night", chi:"夜晚", example:"The stars are beautiful tonight."},
            {eng:"ocean", chi:"海洋", example:"The ocean is vast and deep."}
        ].map((w, i) => ({ ...w, id: Date.now() + i }));

        const App = () => {
            const [view, setView] = useState('splash');
            const [wordBank, setWordBank] = useState([]);
            const [studyList, setStudyList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(20);
            const [mode, setMode] = useState('');
            const [bossIn, setBossIn] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const [monsterAnim, setMonsterAnim] = useState("");
            const [mImg, setMImg] = useState(monsterImages[0]);
            const timerRef = useRef(null);
            const fileInputRef = useRef(null);
            const [newEng, setNewEng] = useState("");
            const [newChi, setNewChi] = useState("");
            const [newExample, setNewExample] = useState("");

            // 初始化與持久化
            useEffect(() => {
                const saved = localStorage.getItem('vocab_v10_final_v2');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setWordBank(parsed.length > 0 ? parsed : initialWords);
                    } catch (e) { setWordBank(initialWords); }
                } else {
                    setWordBank(initialWords);
                }
            }, []);

            useEffect(() => {
                if (wordBank.length > 0) {
                    localStorage.setItem('vocab_v10_final_v2', JSON.stringify(wordBank));
                }
            }, [wordBank]);

            const speak = (text) => {
                if(!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                window.speechSynthesis.speak(u);
            };

            const shuffle = (a) => [...a].sort(() => Math.random() - 0.5);

            // CSV 功能
            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,英文,中文,例句\n" 
                    + wordBank.map(w => `"${w.eng}","${w.chi}","${w.example || ''}"`).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "my_vocab_list.csv");
                document.body.appendChild(link);
                link.click();
            };

            const importCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const lines = text.split("\n").slice(1);
                    const newWords = lines.map((line, i) => {
                        const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        if (parts.length < 2) return null;
                        return {
                            eng: parts[0].replace(/"/g, '').trim(),
                            chi: parts[1].replace(/"/g, '').trim(),
                            example: parts[2] ? parts[2].replace(/"/g, '').trim() : "",
                            id: Date.now() + i
                        };
                    }).filter(x => x && x.eng);
                    if (newWords.length > 0) {
                        setWordBank([...newWords, ...wordBank]);
                        alert(`成功匯入 ${newWords.length} 個單字！`);
                    }
                };
                reader.readAsText(file);
            };

            const autoFetch = async () => {
                if(!newEng) return;
                try {
                    const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(newEng)}&langpair=en|zh-TW`);
                    const tData = await tRes.json();
                    setNewChi(tData.responseData.translatedText);
                    const dRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(newEng)}`);
                    const dData = await dRes.json();
                    if(Array.isArray(dData)) {
                        const ex = dData[0].meanings[0].definitions.find(d => d.example)?.example;
                        setNewExample(ex || "No example found.");
                    }
                } catch(e) { alert("抓取失敗"); }
            };

            // 模式切換
            const startNormal = (m) => {
                if(wordBank.length < 4) return alert("單字不足4個");
                const q = shuffle(wordBank);
                setCurrentWord(q[0]); setStudyList(q.slice(1));
                setIsFlipped(false); setFeedback("");
                if(m === 'quiz') setOptions(shuffle([q[0].eng, ...wordBank.filter(x=>x.eng!==q[0].eng).slice(0,3).map(x=>x.eng)]));
                setView(m);
            };

            const startDungeon = (diff) => {
                if(wordBank.length < 4) return alert("單字不足4個");
                let mf = diff==='low'?20 : diff==='mid'?30 : 40;
                let list = []; while(list.length < mf) list = [...list, ...shuffle(wordBank)];
                list = list.slice(0, mf);
                setMode(diff); setMaxFloor(mf); setHp(10); setFloor(1); setStudyList(list);
                loadDungeonLevel(1, list[0], diff);
                setView('dungeon');
            };

            const loadDungeonLevel = (f, word, m) => {
                if(!word) return;
                setCurrentWord(word); setBossIn(""); setFeedback(""); setMonsterAnim("");
                const isB = (m==='mid' && (f===15 || f===30)) || (m==='high' && (f===20 || f===40));
                setMImg(isB ? bossImages[Math.floor(Math.random()*bossImages.length)] : monsterImages[Math.floor(Math.random()*monsterImages.length)]);
                if(!isB) setOptions(shuffle([word.eng, ...wordBank.filter(x=>x.eng!==word.eng).slice(0,3).map(x=>x.eng)]));
                clearInterval(timerRef.current);
                if(m==='high') {
                    setTimeLeft(100);
                    timerRef.current = setInterval(() => {
                        setTimeLeft(p => { if(p <= 0) { handleDungeonAns(false); return 0; } return p-2.5; });
                    }, 100);
                }
            };

            const handleDungeonAns = (correct) => {
                clearInterval(timerRef.current);
                if(correct) {
                    setMonsterAnim("anim-hit");
                    setFeedback("⚔️ SUCCESS!");
                    speak(currentWord?.eng);
                    setTimeout(() => {
                        if(floor >= maxFloor) return setView('win');
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 500);
                } else {
                    setMonsterAnim("anim-hurt");
                    setHp(h => h - 1);
                    setFeedback("💥 DAMAGED!");
                    if(hp <= 1) setTimeout(() => setView('lose'), 600);
                    else setTimeout(() => {
                        const nextF = floor + 1; setFloor(nextF);
                        loadDungeonLevel(nextF, studyList[nextF-1], mode);
                    }, 800);
                }
            };

            // 啟動畫面渲染
            if(view === 'splash') return (
                <div className="splash-screen">
                    <img src={splashImg} className="splash-img" alt="splash" />
                    <div className="enter-btn-container">
                        <button className="btn-rpg" onClick={() => setView('home')}>Enter</button>
                    </div>
                </div>
            );

            return (
                <div style={{minHeight: '100vh'}}>
                    {view === 'dungeon' ? <div className="dungeon-bg"></div> : <div className="global-bg"></div>}
                    
                    <div className="container">
                        {view === 'home' && (
                            <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center'}}>
                                <h1 style={{textAlign:'center', color:'var(--primary)', textShadow:'2px 2px #fff'}}>VOCAB DUNGEON</h1>
                                <button className="btn btn-primary" onClick={()=>setView('menu')}>開始挑戰</button>
                                <button className="btn" onClick={()=>setView('add')}>新增單字</button>
                                <button className="btn" onClick={()=>setView('list')}>字庫管理 ({wordBank.length})</button>
                                <img src="https://i.imgur.com/6UDmnhC.png" className="footer-img" />
                            </div>
                        )}

                        {view === 'menu' && (
                            <div>
                                <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                                <div className="card" style={{minHeight:'auto', marginBottom:'20px'}}><h2>選擇模式</h2></div>
                                <button className="btn btn-outline" onClick={()=>startNormal('card')}>生字卡 (讀音/例句)</button>
                                <button className="btn btn-outline" onClick={()=>startNormal('quiz')}>選擇題模式 (看中選英)</button>
                                <hr style={{width:'100%', border:'none', borderTop:'4px solid var(--rpg-border)', margin:'20px 0'}}/>
                                <h3 style={{color:'var(--danger)', textAlign:'center'}}>🏰 地下城戰鬥</h3>
                                <button className="btn" onClick={()=>startDungeon('low')}>初級 (20層)</button>
                                <button className="btn" onClick={()=>startDungeon('mid')}>中級 (30層)</button>
                                <button className="btn" onClick={()=>startDungeon('high')}>高級 (40層)</button>
                            </div>
                        )}

                        {view === 'add' && (
                            <div>
                                <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                                <div className="card" style={{minHeight:'auto', marginBottom:'20px'}}><h2>新增單字</h2></div>
                                <input placeholder="英文單字" value={newEng} onChange={e=>setNewEng(e.target.value)} />
                                <button className="btn btn-outline" onClick={autoFetch}>✨ 自動翻譯</button>
                                <textarea placeholder="中文意思" value={newChi} onChange={e=>setNewChi(e.target.value)} />
                                <textarea placeholder="例句" rows="3" value={newExample} onChange={e=>setNewExample(e.target.value)} />
                                <button className="btn btn-primary" onClick={()=>{
                                    if(!newEng || !newChi) return alert("內容不全");
                                    setWordBank([{eng:newEng, chi:newChi, example:newExample, id:Date.now()}, ...wordBank]);
                                    setNewEng(""); setNewChi(""); setNewExample(""); alert("儲存成功");
                                }}>💾 儲存</button>
                            </div>
                        )}

                        {view === 'list' && (
                            <div>
                                <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                                <div className="card" style={{minHeight:'auto', marginBottom:'20px'}}><h3>我的字庫 ({wordBank.length})</h3></div>
                                <div style={{display:'flex', gap:'5px', marginBottom:'15px'}}>
                                    <button className="btn btn-outline btn-small" onClick={exportCSV}>📤 匯出 CSV</button>
                                    <button className="btn btn-outline btn-small" onClick={()=>fileInputRef.current.click()}>📥 匯入 CSV</button>
                                    <input type="file" ref={fileInputRef} style={{display:'none'}} accept=".csv" onChange={importCSV} />
                                </div>
                                <div style={{maxHeight:'60vh', overflowY:'auto'}}>
                                    {wordBank.map(w => (
                                        <div key={w.id} style={{background:'rgba(255,255,255,0.9)', padding:'12px', borderRadius:'12px', marginBottom:'8px', display:'flex', alignItems:'center', border:'3px solid var(--rpg-border)'}}>
                                            <div style={{flex:1}}><strong>{w.eng}</strong> - {w.chi}</div>
                                            <button className="speaker-btn" style={{width:'32px', height:'32px', fontSize:'0.9rem'}} onClick={()=>speak(w.eng)}>🔊</button>
                                            <button style={{color:'red', border:'none', background:'none', marginLeft:'10px', fontSize:'1.2rem'}} onClick={()=>setWordBank(wordBank.filter(x=>x.id!==w.id))}>×</button>
                                        </div>
                                    ))}
                                </div>
                                <button className="btn" style={{marginTop:'20px', color:'red'}} onClick={()=>{if(confirm('確定重置字庫嗎？')) { localStorage.removeItem('vocab_v10_final_v2'); location.reload(); }}}>⚠️ 重置回預設單字</button>
                            </div>
                        )}

                        {(view === 'card' || view === 'quiz') && (
                            <div>
                                <div className="card" onClick={()=>{if(view==='card') setIsFlipped(!isFlipped)}}>
                                    {!isFlipped ? (
                                        <div>
                                            {view === 'quiz' ? <div className="card-chi">{currentWord?.chi}</div> : (
                                                <>
                                                    <div className="card-eng">{currentWord?.eng}</div>
                                                    <button className="speaker-btn" onClick={(e)=>{e.stopPropagation(); speak(currentWord?.eng);}}>🔊</button>
                                                </>
                                            )}
                                        </div>
                                    ) : (
                                        <div style={{textAlign:'left', width:'100%'}}>
                                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                                <strong style={{fontSize:'1.4rem', color:'var(--primary)'}}>{currentWord?.eng}</strong>
                                                <button className="speaker-btn" style={{width:'36px', height:'36px'}} onClick={()=>speak(currentWord?.eng)}>🔊</button>
                                            </div>
                                            <hr style={{border:'2px solid var(--rpg-border)'}}/>
                                            <strong>【中文】</strong><p>{currentWord?.chi}</p>
                                            <div className="example-box"><strong>【例句】</strong><p>{currentWord?.example}</p></div>
                                        </div>
                                    )}
                                </div>
                                {view === 'quiz' && !isFlipped && (
                                    <div className="quiz-grid">
                                        {options.map(o => <button key={o} className="btn btn-outline" onClick={()=>{setFeedback(o===currentWord?.eng?"✅ 正確":"❌ 錯誤"); setIsFlipped(true); speak(currentWord?.eng);}}>{o}</button>)}
                                    </div>
                                )}
                                {feedback && <div className="card" style={{minHeight:'auto', padding:'10px', margin:'10px 0', borderColor: feedback.includes("✅") ? 'var(--success)' : 'var(--danger)'}}><strong>{feedback}</strong></div>}
                                <button className="btn btn-primary" onClick={()=>{
                                    if(studyList.length === 0) return setView('home');
                                    const next = studyList[0];
                                    setStudyList(studyList.slice(1)); setCurrentWord(next); setIsFlipped(false); setFeedback("");
                                    if(view==='quiz') setOptions(shuffle([next.eng, ...wordBank.filter(x=>x.eng!==next.eng).slice(0,3).map(x=>x.eng)]));
                                }}>下一個</button>
                                <button className="btn" onClick={()=>setView('home')}>返回</button>
                            </div>
                        )}

                        {view === 'dungeon' && (
                            <div>
                                <div className="hp-bar-container">
                                    <span>{"❤️".repeat(hp)}</span>
                                    <span>B{floor}/{maxFloor}</span>
                                </div>
                                <div className="battle-scene">
                                    {mode==='high' && <div className="timer-line" style={{width:timeLeft+'%'}}></div>}
                                    <div className="monster-box">
                                        <img src={mImg} className={`monster-img ${monsterAnim}`} />
                                    </div>
                                    <div className="player-box">
                                        <img src={playerImg} className="player-img" />
                                    </div>
                                </div>
                                <div className="card" style={{minHeight:'60px', padding: '15px', marginBottom: '15px', borderColor: 'var(--primary)'}}>
                                    <div style={{fontSize:'1.4rem', fontWeight:'bold'}}>{currentWord?.chi}</div>
                                </div>
                                {((mode==='mid' && (floor===15 || floor===30)) || (mode==='high' && (floor===20 || floor===40))) ? (
                                    <div>
                                        <input placeholder="拼寫單字..." value={bossIn} onChange={e=>setBossIn(e.target.value)} autoFocus />
                                        <button className="btn btn-primary" onClick={()=>handleDungeonAns(bossIn.toLowerCase().trim() === currentWord?.eng.toLowerCase().trim())}>⚡ 攻擊 BOSS</button>
                                    </div>
                                ) : (
                                    <div className="quiz-grid">
                                        {options.map(o => <button key={o} className="btn btn-outline" onClick={()=>handleDungeonAns(o === currentWord?.eng)}>{o}</button>)}
                                    </div>
                                )}
                                <button className="btn" style={{color:'#999', marginTop: '10px', borderWidth:'2px'}} onClick={()=>{clearInterval(timerRef.current); setView('home')}}>🏳️ 撤退</button>
                            </div>
                        )}

                        {(view === 'win' || view === 'lose') && (
                            <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center', textAlign:'center'}}>
                                <div className="card">
                                    <h1 style={{fontSize:'4rem'}}>{view==='win'?"🎉":"💀"}</h1>
                                    <h2>{view==='win'?"挑戰成功":"你倒下了"}</h2>
                                    <button className="btn btn-primary" onClick={()=>setView('home')}>返回村莊</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
