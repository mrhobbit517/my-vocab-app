<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Dungeon v10.10</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #636e72; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }
        
        .container { 
            width: 100%; max-width: 480px; min-height: 100vh; 
            margin: 0 auto; padding: 20px; box-sizing: border-box; 
            display: flex; flex-direction: column; 
        }

        /* 介面背景圖設定 */
        .bg-themed {
            background-image: url('https://i.imgur.com/SwmBCNA.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 啟動畫面 */
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center;
        }
        .splash-img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
        .enter-btn-container { position: absolute; bottom: 15%; width: 100%; display: flex; justify-content: center; }
        .btn-rpg {
            background: #2d3436; color: #fff; border: 4px solid #fff;
            padding: 12px 40px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 0 4px #2d3436;
        }

        /* 既有組件樣式 (微調透明度以增加閱讀性) */
        .btn { background: rgba(255, 255, 255, 0.9); border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: rgba(255, 255, 255, 0.7); }
        .card { background: rgba(255, 255, 255, 0.92); border-radius: 24px; padding: 25px; margin: 10px 0; min-height: 260px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        /* 戰鬥畫面專用 */
        .battle-scene { position: relative; width: 100%; height: 240px; margin: 10px 0; }
        .monster-box { position: absolute; top: 10px; right: 40px; text-align: center; }
        .monster-img { width: 90px; height: auto; image-rendering: pixelated; }
        .player-box { position: absolute; bottom: -10px; left: -20px; }
        .player-img { width: 270px; height: auto; }
        
        .timer-line { position: absolute; top: -10px; left: 0; height: 6px; background: var(--danger); transition: width 0.1s linear; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; background: rgba(255, 255, 255, 0.9); }
        .footer-img { width: 100%; height: auto; margin-top: 20px; border-radius: 15px; }
        .speaker-btn { background: #e1f0ff; border: none; border-radius: 50%; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const monsterImages = ["https://i.imgur.com/BbjA5GC.png", "https://i.imgur.com/IWc1B7P.png", "https://i.imgur.com/Y7WZlES.png", "https://i.imgur.com/ToQhBZL.png", "https://i.imgur.com/72Hr4rn.png", "https://i.imgur.com/3jsF7It.png", "https://i.imgur.com/4TfXx0t.png", "https://i.imgur.com/bI7Y6tX.png"];
        const bossImages = ["https://i.imgur.com/LNZ46Uc.png", "https://i.imgur.com/ArFodUT.png"];
        const playerImg = "https://i.imgur.com/49PQ8zR.png";
        const splashImg = "https://i.imgur.com/8MUpGMJ.jpeg";

        const App = () => {
            const [view, setView] = useState('splash');
            const [wordBank, setWordBank] = useState([]);
            const [studyList, setStudyList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(20);
            const [mode, setMode] = useState('');
            const [bossIn, setBossIn] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const [mImg, setMImg] = useState(monsterImages[0]);
            const timerRef = useRef(null);
            const fileInputRef = useRef(null);
            const [newEng, setNewEng] = useState("");
            const [newChi, setNewChi] = useState("");
            const [newExample, setNewExample] = useState("");

            useEffect(() => {
                const saved = localStorage.getItem('vocab_v10_final_v2');
                if (saved) setWordBank(JSON.parse(saved));
                else setWordBank([{eng:"apple", chi:"蘋果", id:1}]); 
            }, []);

            const speak = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; window.speechSynthesis.speak(u); };
            const shuffle = (a) => [...a].sort(() => Math.random() - 0.5);

            const startDungeon = (diff) => {
                let mf = diff==='low'?20 : diff==='mid'?30 : 40;
                setMode(diff); setMaxFloor(mf); setHp(10); setFloor(1);
                const list = Array(mf).fill(0).map(() => wordBank[Math.floor(Math.random()*wordBank.length)]);
                setStudyList(list);
                loadLevel(1, list[0], diff);
                setView('dungeon');
            };

            const loadLevel = (f, word, m) => {
                setCurrentWord(word); setBossIn(""); setFeedback("");
                setMImg(monsterImages[Math.floor(Math.random()*monsterImages.length)]);
                setOptions(shuffle([word.eng, "orange", "banana", "grape"])); // 簡化示範
                if(m==='high') { setTimeLeft(100); clearInterval(timerRef.current); timerRef.current = setInterval(()=>setTimeLeft(p=>p-2), 100); }
            };

            const handleAns = (correct) => {
                if(correct) { if(floor>=maxFloor) setView('win'); else { setFloor(f=>f+1); loadLevel(floor+1, studyList[floor], mode); }}
                else { setHp(h=>h-1); if(hp<=1) setView('lose'); }
            };

            // 啟動畫面
            if(view === 'splash') return (
                <div className="splash-screen">
                    <img src={splashImg} className="splash-img" />
                    <div className="enter-btn-container">
                        <button className="btn-rpg" onClick={() => setView('home')}>Enter</button>
                    </div>
                </div>
            );

            // 判斷是否需要背景
            const useBg = view !== 'dungeon';
            const containerClass = `container ${useBg ? 'bg-themed' : ''}`;

            return (
                <div className={containerClass}>
                    {view === 'home' && (
                        <div style={{marginTop:'auto', marginBottom:'auto'}}>
                            <h1 style={{textAlign:'center', background:'rgba(255,255,255,0.8)', padding:'10px', borderRadius:'10px'}}>VOCAB DUNGEON</h1>
                            <button className="btn btn-primary" onClick={()=>setView('menu')}>開始挑戰</button>
                            <button className="btn" onClick={()=>setView('list')}>字庫管理</button>
                        </div>
                    )}

                    {view === 'menu' && (
                        <div>
                            <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                            <h2 style={{background:'rgba(255,255,255,0.7)', display:'inline-block', padding:'5px 10px'}}>選擇難度</h2>
                            <button className="btn" onClick={()=>startDungeon('low')}>初級 (20F)</button>
                            <button className="btn" onClick={()=>startDungeon('mid')}>中級 (30F)</button>
                            <button className="btn" onClick={()=>startDungeon('high')}>高級 (40F)</button>
                        </div>
                    )}

                    {view === 'list' && (
                        <div>
                            <button className="btn" onClick={()=>setView('home')}>← 返回</button>
                            <h3>單字列表</h3>
                            {wordBank.map(w=><div key={w.id} className="btn" style={{textAlign:'left'}}>{w.eng} - {w.chi}</div>)}
                        </div>
                    )}

                    {view === 'dungeon' && (
                        <div>
                            <div style={{background: '#2d3436', color: 'white', padding: '10px', borderRadius: '10px', display:'flex', justifyContent:'space-between'}}>
                                <span>{"❤️".repeat(hp)}</span> <span>B{floor}/{maxFloor}</span>
                            </div>
                            <div className="battle-scene">
                                {mode==='high' && <div className="timer-line" style={{width:timeLeft+'%'}}></div>}
                                <div className="monster-box"><img src={mImg} className="monster-img" /></div>
                                <div className="player-box"><img src={playerImg} className="player-img" /></div>
                            </div>
                            <div className="card"><h3>{currentWord?.chi}</h3></div>
                            <div className="quiz-grid">
                                {options.map(o=><button key={o} className="btn btn-outline" onClick={()=>handleAns(o===currentWord?.eng)}>{o}</button>)}
                            </div>
                        </div>
                    )}

                    {(view === 'win' || view === 'lose') && (
                        <div style={{textAlign:'center', background:'rgba(255,255,255,0.8)', padding:'20px', borderRadius:'20px', marginTop:'50px'}}>
                            <h1>{view==='win'?"SUCCESS":"FAILED"}</h1>
                            <button className="btn btn-primary" onClick={()=>setView('home')}>返回主頁</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
