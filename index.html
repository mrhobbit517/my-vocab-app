<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabCard v9.2 - Final Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #636e72; --card: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; color: var(--text); }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .btn { background: var(--card); border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(9,132,227,0.2); }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: transparent; }
        
        /* 新增介面 */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.9rem; font-weight: bold; color: var(--gray); margin-bottom: 8px; }
        .input-field { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 14px; font-size: 1.1rem; box-sizing: border-box; background: white; }
        .input-field:focus { border-color: var(--primary); outline: none; }
        
        /* 字庫列表 */
        .word-list-item { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .word-info { flex: 1; }
        .word-eng { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        .word-chi { font-size: 0.95rem; color: var(--gray); margin-left: 10px; }
        .btn-del { color: var(--danger); border: none; background: none; font-size: 1.2rem; cursor: pointer; padding: 0 10px; }

        /* 地下城 UI */
        .dungeon-header { background: #2d3436; color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .hp-bar { color: #ff7675; font-size: 1.2rem; margin-bottom: 5px; }
        .card { background: #fff; border-radius: 24px; padding: 30px; margin: 15px 0; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; text-align: center; position: relative; overflow: hidden; }
        .timer-line { position: absolute; top: 0; left: 0; height: 5px; background: var(--danger); transition: width 0.1s linear; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultWords = [
            {eng:"apple", content:"【翻譯】: 蘋果"}, {eng:"book", content:"【翻譯】: 書"}, {eng:"cat", content:"【翻譯】: 貓"},
            {eng:"dog", content:"【翻譯】: 狗"}, {eng:"egg", content:"【翻譯】: 蛋"}, {eng:"fish", content:"【翻譯】: 魚"},
            {eng:"girl", content:"【翻譯】: 女孩"}, {eng:"house", content:"【翻譯】: 房子"}, {eng:"ice", content:"【翻譯】: 冰"},
            {eng:"jump", content:"【翻譯】: 跳"}, {eng:"kite", content:"【翻譯】: 風箏"}, {eng:"lion", content:"【翻譯】: 獅子"},
            {eng:"moon", content:"【翻譯】: 月亮"}, {eng:"nest", content:"【翻譯】: 鳥巢"}, {eng:"orange", content:"【翻譯】: 橙子"},
            {eng:"pen", content:"【翻譯】: 筆"}, {eng:"queen", content:"【翻譯】: 女王"}, {eng:"river", content:"【翻譯】: 河流"},
            {eng:"sun", content:"【翻譯】: 太陽"}, {eng:"tree", content:"【翻譯】: 樹"}, {eng:"umbrella", content:"【翻譯】: 雨傘"},
            {eng:"violin", content:"【翻譯】: 小提琴"}, {eng:"water", content:"【翻譯】: 水"}, {eng:"xylophone", content:"【翻譯】: 木琴"},
            {eng:"yellow", content:"【翻譯】: 黃色"}, {eng:"zoo", content:"【翻譯】: 動物園"}, {eng:"ball", content:"【翻譯】: 球"},
            {eng:"cake", content:"【翻譯】: 蛋糕"}, {eng:"door", content:"【翻譯】: 門"}, {eng:"elephant", content:"【翻譯】: 大象"},
            {eng:"flower", content:"【翻譯】: 花"}, {eng:"garden", content:"【翻譯】: 花園"}, {eng:"hat", content:"【翻譯】: 帽子"},
            {eng:"island", content:"【翻譯】: 島"}, {eng:"juice", content:"【翻譯】: 果汁"}, {eng:"king", content:"【翻譯】: 國王"},
            {eng:"lamp", content:"【翻譯】: 燈"}, {eng:"milk", content:"【翻譯】: 牛奶"}, {eng:"night", content:"【翻譯】: 夜晚"}
        ].map((w, i) => ({ ...w, id: Date.now() + i }));

        const App = () => {
            const [view, setView] = useState('home');
            const [wordBank, setWordBank] = useState(() => {
                const saved = localStorage.getItem('vocab_v9_2');
                return saved ? JSON.parse(saved) : defaultWords;
            });
            
            // 地下城狀態
            const [mode, setMode] = useState('');
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(20);
            const [dungeonList, setDungeonList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [quizOptions, setQuizOptions] = useState([]);
            const [bossInput, setBossInput] = useState("");
            const [feedback, setFeedback] = useState("");
            const [timeLeft, setTimeLeft] = useState(100);
            const timerRef = useRef(null);

            // 新增單字狀態
            const [eng, setEng] = useState("");
            const [content, setContent] = useState("");

            useEffect(() => { localStorage.setItem('vocab_v9_2', JSON.stringify(wordBank)); }, [wordBank]);

            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            const startDungeon = (diff) => {
                let mf = diff === 'low' ? 20 : diff === 'mid' ? 30 : 40;
                let list = [];
                while(list.length < mf) { list = [...list, ...shuffle(wordBank)]; }
                list = list.slice(0, mf);
                setMode(diff); setMaxFloor(mf); setDungeonList(list); setHp(10); setFloor(1);
                loadLevel(1, list[0], diff); setView('dungeon');
            };

            const loadLevel = (f, word, m) => {
                setCurrentWord(word); setBossInput(""); setFeedback("");
                const isBoss = (m === 'mid' && (f === 15 || f === 30)) || (m === 'high' && (f === 20 || f === 40));
                if (!isBoss) setQuizOptions(shuffle([word.eng, ...wordBank.filter(w=>w.eng!==word.eng).slice(0,3).map(w=>w.eng)]));
                
                clearInterval(timerRef.current);
                if (m === 'high') {
                    setTimeLeft(100);
                    timerRef.current = setInterval(() => {
                        setTimeLeft(p => {
                            if (p <= 0) { handleAnswer(false); return 0; }
                            return p - 2;
                        });
                    }, 100);
                }
            };

            const handleAnswer = (correct) => {
                clearInterval(timerRef.current);
                if (correct) {
                    setFeedback("⚔️ 擊敗成功！");
                    setTimeout(() => {
                        if (floor >= maxFloor) return setView('dungeon_win');
                        const nextF = floor + 1; setFloor(nextF);
                        loadLevel(nextF, dungeonList[nextF-1], mode);
                    }, 600);
                } else {
                    setHp(h => h - 1); setFeedback("💥 受到攻擊！");
                    if (hp <= 1) setTimeout(() => setView('dungeon_lose'), 600);
                    else setTimeout(() => {
                        const nextF = floor + 1; setFloor(nextF);
                        loadLevel(nextF, dungeonList[nextF-1], mode);
                    }, 800);
                }
            };

            // 視圖切換
            if (view === 'home') return (
                <div className="container" style={{justifyContent:'center'}}>
                    <h1 style={{textAlign:'center', color:'var(--primary)'}}>VOCAB MASTER</h1>
                    <button className="btn btn-primary" onClick={() => setView('study_menu')}>溫習模式 / 地下城</button>
                    <button className="btn" onClick={() => setView('add')}>新增單字</button>
                    <button className="btn" onClick={() => setView('list')}>我的字庫 ({wordBank.length})</button>
                </div>
            );

            if (view === 'add') return (
                <div className="container">
                    <h2>新增生字</h2>
                    <div className="form-group">
                        <label className="form-label">英文</label>
                        <input className="input-field" value={eng} onChange={e=>setEng(e.target.value)} />
                    </div>
                    <div className="form-group">
                        <label className="form-label">中文解釋</label>
                        <textarea className="input-field" style={{minHeight:'100px'}} value={content} onChange={e=>setContent(e.target.value)} />
                    </div>
                    <button className="btn btn-primary" onClick={()=>{
                        if(!eng || !content) return alert("請填寫內容");
                        setWordBank([{eng, content, id:Date.now()}, ...wordBank]);
                        setEng(""); setContent(""); alert("已儲存");
                    }}>儲存單字</button>
                    <button className="btn" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            if (view === 'list') return (
                <div className="container">
                    <h2>我的字庫</h2>
                    {wordBank.map(w => (
                        <div key={w.id} className="word-list-item">
                            <div className="word-info">
                                <span className="word-eng">{w.eng}</span>
                                <span className="word-chi">- {w.content.split('\n')[0].replace('【翻譯】: ', '')}</span>
                            </div>
                            <button className="btn-del" onClick={()=>setWordBank(wordBank.filter(x=>x.id!==w.id))}>×</button>
                        </div>
                    ))}
                    <button className="btn btn-primary" onClick={()=>setView('home')}>返回主頁</button>
                </div>
            );

            if (view === 'study_menu') return (
                <div className="container">
                    <h2>選擇模式</h2>
                    <button className="btn btn-outline" onClick={()=>{const q=shuffle(wordBank); setCurrentWord(q[0]); setDungeonList(q.slice(1)); setView('study_card');}}>生字卡</button>
                    <hr/>
                    <h3 style={{color:'var(--danger)'}}>🏰 地下城挑戰</h3>
                    <button className="btn" onClick={()=>startDungeon('low')}>初級 (20關)</button>
                    <button className="btn" onClick={()=>startDungeon('mid')}>中級 (30關 + Boss)</button>
                    <button className="btn" onClick={()=>startDungeon('high')}>高級 (40關 + 限時)</button>
                    <button className="btn" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            if (view === 'dungeon') {
                const isBoss = (mode === 'mid' && (floor === 15 || floor === 30)) || (mode === 'high' && (floor === 20 || floor === 40));
                return (
                    <div className="container">
                        <div className="dungeon-header">
                            <div className="hp-bar">{"❤️".repeat(hp)}{"🖤".repeat(10-hp)}</div>
                            <div style={{fontSize:'0.8rem'}}>B {floor} / {maxFloor}</div>
                        </div>
                        <div style={{fontSize:'3rem', textAlign:'center'}}>{isBoss ? "🐲" : "👾"}</div>
                        <div className="card">
                            {mode === 'high' && <div className="timer-line" style={{width: timeLeft + '%'}}></div>}
                            <h2>{currentWord?.content.split('\n')[0].replace('【翻譯】: ', '')}</h2>
                            {feedback && <div style={{color:'red', fontWeight:'bold'}}>{feedback}</div>}
                        </div>
                        {isBoss ? (
                            <div className="quiz-grid">
                                <input className="input-field" value={bossInput} onChange={e=>setBossInput(e.target.value)} placeholder="拼寫單字..." />
                                <button className="btn btn-primary" onClick={()=>handleAnswer(bossInput.toLowerCase().trim() === currentWord.eng.toLowerCase().trim())}>攻擊</button>
                            </div>
                        ) : (
                            <div className="quiz-grid">
                                {quizOptions.map(o => <button key={o} className="btn btn-outline" onClick={()=>handleAnswer(o === currentWord.eng)}>{o}</button>)}
                            </div>
                        )}
                        <button className="btn" onClick={()=>{clearInterval(timerRef.current); setView('home')}}>🏳️ 撤退</button>
                    </div>
                );
            }

            // 勝利/失敗視圖
            if (view === 'dungeon_win' || view === 'dungeon_lose') return (
                <div className="container" style={{justifyContent:'center', textAlign:'center'}}>
                    <h1>{view === 'dungeon_win' ? "🎉 挑戰成功！" : "💀 你倒下了..."}</h1>
                    <button className="btn btn-primary" onClick={()=>setView('home')}>返回主頁</button>
                </div>
            );

            // 簡單卡片模式
            if (view === 'study_card') return (
                <div className="container">
                    <div className="card" onClick={()=>setIsFlipped(!isFlipped)}>
                        {!isFlipped ? <h2>{currentWord?.eng}</h2> : <p>{currentWord?.content}</p>}
                    </div>
                    <button className="btn btn-primary" onClick={()=>{
                        if(dungeonList.length===0) return setView('home');
                        setCurrentWord(dungeonList[0]); setDungeonList(dungeonList.slice(1)); setIsFlipped(false);
                    }}>下一個</button>
                    <button className="btn" onClick={()=>setView('home')}>返回</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
