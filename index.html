<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabCard v9.0 - Dungeon Master</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #f8f9fa; --primary: #0984e3; --text: #2d3436; --danger: #d63031; --success: #27ae60; --gray: #b2bec3; }
        body { background: var(--bg); font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .btn { background: #fff; border: 1px solid #ddd; padding: 14px; margin: 8px 0; cursor: pointer; font-size: 1rem; border-radius: 12px; width: 100%; font-weight: 600; box-sizing: border-box; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-outline { color: var(--primary); border: 2px solid var(--primary); background: transparent; }
        
        /* 地下城專屬 UI */
        .dungeon-top { background: #2d3436; color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .hp-container { display: flex; gap: 4px; font-size: 1.2rem; transition: 0.3s; }
        .heart.lost { filter: grayscale(1); opacity: 0.3; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .progress-bar { height: 8px; background: #444; border-radius: 4px; margin-top: 10px; position: relative; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--success); transition: width 0.3s; }
        
        .monster-box { font-size: 4rem; text-align: center; margin: 10px 0; min-height: 80px; }
        .card { background: #fff; border-radius: 20px; padding: 25px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border: 1px solid #eee; text-align: center; position: relative; }
        
        /* 倒計時 */
        .timer-bar { position: absolute; top: 0; left: 0; height: 5px; background: var(--danger); width: 100%; transition: width linear; }

        .boss-tag { background: var(--danger); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        .boss-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--danger); font-size: 1.2rem; text-align: center; margin: 10px 0; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        
        /* 其他原本樣式 */
        .list-row { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; min-height: 150px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [wordBank, setWordBank] = useState(() => JSON.parse(localStorage.getItem('vocab_v9') || '[]'));
            
            // 地下城狀態
            const [mode, setMode] = useState(''); // low, mid, high
            const [hp, setHp] = useState(10);
            const [floor, setFloor] = useState(1);
            const [maxFloor, setMaxFloor] = useState(20);
            const [dungeonList, setDungeonList] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [quizOptions, setQuizOptions] = useState([]);
            const [bossInput, setBossInput] = useState("");
            const [isShake, setIsShake] = useState(false);
            const [timeLeft, setTimeLeft] = useState(100);
            const timerRef = useRef(null);

            // 基礎溫習狀態
            const [studyQueue, setStudyQueue] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [eng, setEng] = useState("");
            const [content, setContent] = useState("");

            useEffect(() => { localStorage.setItem('vocab_v9', JSON.stringify(wordBank)); }, [wordBank]);

            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            // --- 地下城核心 ---
            const startDungeon = (diff) => {
                if (wordBank.length < 5) return alert("生字不足，請先新增單字");
                let mf = 20;
                if (diff === 'mid') mf = 30;
                if (diff === 'high') mf = 40;

                let list = [];
                while(list.length < mf) { list = [...list, ...shuffle(wordBank)]; }
                list = list.slice(0, mf);

                setMode(diff);
                setMaxFloor(mf);
                setDungeonList(list);
                setHp(10);
                setFloor(1);
                loadLevel(1, list[0], diff);
                setView('dungeon');
            };

            const loadLevel = (f, word, currentMode) => {
                setCurrentWord(word);
                setBossInput("");
                setFeedback("");
                const isBoss = (currentMode === 'mid' && (f === 15 || f === 30)) || (currentMode === 'high' && (f === 20 || f === 40));
                
                if (!isBoss) {
                    setQuizOptions(shuffle([word.eng, ...wordBank.filter(w=>w.eng!==word.eng).slice(0,3).map(w=>w.eng)]));
                }

                // 高級模式計時器
                clearInterval(timerRef.current);
                if (currentMode === 'high') {
                    setTimeLeft(100);
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 0) {
                                clearInterval(timerRef.current);
                                handleAnswer(false); // 超時扣血
                                return 0;
                            }
                            return prev - 2; // 5秒 = 每100ms扣2%
                        });
                    }, 100);
                }
            };

            const handleAnswer = (isCorrect) => {
                clearInterval(timerRef.current);
                if (isCorrect) {
                    setFeedback("⚔️ 擊敗怪物！");
                    setTimeout(() => nextLevel(), 600);
                } else {
                    setHp(prev => prev - 1);
                    setIsShake(true);
                    setFeedback("💥 受到攻擊！");
                    setTimeout(() => setIsShake(false), 500);
                    if (hp <= 1) {
                        setTimeout(() => setView('dungeon_lose'), 600);
                    } else {
                        setTimeout(() => nextLevel(), 800);
                    }
                }
            };

            const nextLevel = () => {
                if (floor >= maxFloor) return setView('dungeon_win');
                const nextF = floor + 1;
                setFloor(nextF);
                loadLevel(nextF, dungeonList[nextF-1], mode);
            };

            // --- 其他原本功能 (不變) ---
            const fetchAPI = async () => {
                try {
                    const [t, d] = await Promise.all([
                        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(eng)}&langpair=en|zh-TW`),
                        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(eng)}`)
                    ]);
                    const tJ = await t.json(); const dJ = await d.json();
                    let s = `【翻譯】: ${tJ.responseData.translatedText}\n\n`;
                    if(Array.isArray(dJ)) dJ[0].meanings.forEach(m => {
                        s += `[${m.partOfSpeech}] ${m.definitions[0].definition}\n`;
                        if(m.definitions[0].example) s += `>> ${m.definitions[0].example.split('.')[0]}.\n`;
                        s += `---\n`;
                    });
                    setContent(s.trim());
                } catch(e) { alert("API 獲取失敗"); }
            };

            const speak = (t) => { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); };

            // --- 渲染組件 ---
            if (view === 'home') return (
                <div className="container">
                    <h1 style={{marginTop:'50px', textAlign:'center', color: 'var(--primary)'}}>VOCAB MASTER</h1>
                    <button className="btn btn-primary" onClick={() => setView('study_menu')}>溫習與地下城</button>
                    <button className="btn" onClick={() => setView('add')}>新增單字</button>
                    <button className="btn" onClick={() => setView('list')}>我的字庫 ({wordBank.length})</button>
                </div>
            );

            if (view === 'study_menu') return (
                <div className="container">
                    <h1>選擇模式</h1>
                    <button className="btn btn-outline" onClick={() => { 
                        const q = shuffle(wordBank); setCurrentWord(q[0]); setStudyQueue(q.slice(1)); setView('study_card'); setIsFlipped(false);
                    }}>生字卡模式</button>
                    <button className="btn btn-outline" onClick={() => {
                        const q = shuffle(wordBank); setCurrentWord(q[0]); setStudyQueue(q.slice(1)); setQuizOptions(shuffle([q[0].eng, ...wordBank.filter(x=>x.eng!==q[0].eng).slice(0,3).map(x=>x.eng)])); setView('study_quiz'); setFeedback("");
                    }}>選擇題模式</button>
                    
                    <hr style={{margin:'20px 0', border:'none', borderTop:'1px solid #ddd'}} />
                    <h2 style={{color: 'var(--danger)'}}>🛡️ 地下城挑戰</h2>
                    <button className="btn" onClick={() => startDungeon('low')}>初級 (20關 / 無Boss)</button>
                    <button className="btn" onClick={() => startDungeon('mid')}>中級 (30關 / 有Boss)</button>
                    <button className="btn" onClick={() => startDungeon('high')}>高級 (40關 / Boss+限時)</button>
                    <button className="btn" onClick={() => setView('home')}>返回主頁</button>
                </div>
            );

            if (view === 'dungeon') {
                const isBoss = (mode === 'mid' && (floor === 15 || floor === 30)) || (mode === 'high' && (floor === 20 || floor === 40));
                const monsters = ["👾", "👹", "💀", "👻", "🦇", "🕷️", "🦂"];
                return (
                    <div className="container">
                        <div className={`dungeon-top ${isShake ? 'shake' : ''}`}>
                            <div className="hp-container">
                                {[...Array(10)].map((_, i) => (
                                    <span key={i} className={`heart ${i >= hp ? 'lost' : ''}`}>❤️</span>
                                ))}
                            </div>
                            <div className="progress-bar">
                                <div className="progress-inner" style={{width: `${(floor/maxFloor)*100}%`}}></div>
                            </div>
                            <div style={{display:'flex', justifyContent:'space-between', fontSize:'0.8rem', marginTop:'5px'}}>
                                <span>🗺️ 深度: {floor} / {maxFloor}</span>
                                <span>{mode.toUpperCase()} MODE</span>
                            </div>
                        </div>

                        <div className="monster-box">
                            {isBoss ? "🐲" : monsters[floor % monsters.length]}
                        </div>

                        <div className="card">
                            {mode === 'high' && <div className="timer-bar" style={{width: `${timeLeft}%`}}></div>}
                            {isBoss && <div className="boss-tag">BOSS BATTLE</div>}
                            <h2>{currentWord?.content.split('\n')[0].replace('【翻譯】: ', '')}</h2>
                            {feedback && <div style={{color: feedback.includes('⚔️')?'var(--success)':'var(--danger)', fontWeight:'bold'}}>{feedback}</div>}
                        </div>

                        {isBoss ? (
                            <div style={{marginTop:'10px'}}>
                                <input className="boss-input" autoFocus value={bossInput} onChange={e=>setBossInput(e.target.value)} placeholder="拼寫出英文..." onKeyDown={e=>e.key==='Enter' && handleAnswer(bossInput.toLowerCase().trim() === currentWord.eng.toLowerCase().trim())} />
                                <button className="btn btn-primary" onClick={() => handleAnswer(bossInput.toLowerCase().trim() === currentWord.eng.toLowerCase().trim())}>攻擊 Boss！</button>
                            </div>
                        ) : (
                            <div className="quiz-grid">
                                {quizOptions.map(o => (
                                    <button key={o} className="btn btn-outline" onClick={() => handleAnswer(o === currentWord.eng)}>{o}</button>
                                ))}
                            </div>
                        )}
                        <button className="btn" style={{marginTop:'20px', color: '#999'}} onClick={() => { clearInterval(timerRef.current); setView('home'); }}>🏳️ 離開地下城</button>
                    </div>
                );
            }

            // --- 其他視圖 (省略重複邏輯，保持原本功能) ---
            if (view === 'dungeon_lose') return <div className="container" style={{textAlign:'center', justifyContent:'center'}}><h1>戰敗</h1><p>你在第 {floor} 層力竭倒下...</p><button className="btn btn-primary" onClick={()=>setView('home')}>回村莊</button></div>;
            if (view === 'dungeon_win') return <div className="container" style={{textAlign:'center', justifyContent:'center'}}><h1>🎉 征服達成！</h1><p>成功攻略 {maxFloor} 層地下城！</p><button className="btn btn-primary" onClick={()=>setView('home')}>接受榮譽</button></div>;

            if (view === 'add') return (
                <div className="container">
                    <h1>新增單字</h1>
                    <input value={eng} onChange={e=>setEng(e.target.value)} placeholder="英文單字..." />
                    <button className="btn btn-outline" onClick={fetchAPI}>✨ 自動抓取</button>
                    <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="內容..." />
                    <button className="btn btn-primary" onClick={()=>{setWordBank([{eng:eng.trim(), content, id:Date.now()}, ...wordBank]); setView('home');}}>儲存</button>
                    <button className="btn" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            if (view === 'list') return (
                <div className="container">
                    <h1>字庫 ({wordBank.length})</h1>
                    {wordBank.map(w => (
                        <div key={w.id} className="list-row">
                            <div><strong>{w.eng}</strong></div>
                            <button className="btn" style={{width:'auto', color:'red'}} onClick={()=>setWordBank(wordBank.filter(x=>x.id!==w.id))}>移除</button>
                        </div>
                    ))}
                    <button className="btn" onClick={()=>setView('home')}>返回</button>
                </div>
            );

            // 生字卡模式 (原本功能)
            if (view === 'study_card' || view === 'study_quiz') return (
                <div className="container">
                    <p style={{textAlign:'center'}}>剩餘: {studyQueue.length + 1}</p>
                    <div className="card" onClick={() => view === 'study_card' && setIsFlipped(!isFlipped)}>
                        {!isFlipped ? <h2>{view === 'study_card' ? currentWord?.eng : currentWord?.content.split('\n')[0].replace('【翻譯】: ', '')}</h2> : 
                        <div style={{textAlign:'left'}}>{currentWord?.content.split('\n').map((l,i)=><div key={i}>{l}</div>)}</div>}
                    </div>
                    {view === 'study_quiz' && !isFlipped && (
                        <div className="quiz-grid">
                            {quizOptions.map(o => <button key={o} className="btn btn-outline" onClick={()=>{setFeedback(o===currentWord.eng?"✅":"❌"); setIsFlipped(true);}}>{o}</button>)}
                        </div>
                    )}
                    <button className="btn btn-primary" onClick={()=>{
                        if(studyQueue.length===0) return setView('home');
                        const n = studyQueue[0]; setStudyQueue(studyQueue.slice(1)); setCurrentWord(n); setIsFlipped(false); setFeedback("");
                        if(view==='study_quiz') setQuizOptions(shuffle([n.eng, ...wordBank.filter(x=>x.eng!==n.eng).slice(0,3).map(x=>x.eng)]));
                    }}>下一個</button>
                    <button className="btn" onClick={()=>setView('home')}>離開</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
